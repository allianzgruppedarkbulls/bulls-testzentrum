<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz Zentrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background-color: black; 
            font-family: 'Almendra', serif; color: white; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* DEIN EINGESTELLTES BILD */
        #main-bull-logo { 
            width: 750px; 
            max-width: 100vw; 
            filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); 
            z-index: 1;
        }

        /* BUTTONS LINKS */
        .side-l { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 40px; z-index: 100; }
        .tab-l { padding: 35px 15px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 0 12px 12px 0; width: 55px; color: black; font-family: 'Almendra'; text-align: center; }
        #btn-login { background: #39d353; box-shadow: 0 0 20px #39d353; }
        #btn-rekrut { background: #ffd600; box-shadow: 0 0 20px #ffd600; }

        /* BUTTONS RECHTS */
        .side-r { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .tab-r { padding: 25px 10px; font-size: 15px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 12px 0 0 12px; width: 45px; color: black; font-family: 'Almendra'; text-align: center; }
        #tab-yt { background: #ff8c00; }
        #tab-hist { background: #5b5bff; color: white; }
        #tab-web { background: #00cfd1; }

        /* MODALS */
        .overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-card { background: #111; padding: 25px; border: 2px solid #ff3131; border-radius: 15px; width: 450px; max-width: 90%; text-align: center; box-shadow: 0 0 50px red; }
        
        h2 { color: #ff3131; margin-top: 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 16px; text-align: center; box-sizing: border-box; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #39d353; border: none; color: black; font-weight: bold; cursor: pointer; font-size: 20px; font-family: 'Almendra'; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <img src="bulls_start.jpg" id="main-bull-logo">

    <div class="side-l">
        <button class="tab-l" id="btn-login" onclick="openModal('loginMod')">LOGIN</button>
        <button class="tab-l" id="btn-rekrut" onclick="openModal('regMod')">REKRUTIERUNG</button>
    </div>

    <div class="side-r">
        <button class="tab-r" id="tab-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="tab-r" id="tab-hist" onclick="alert('Historie folgt')">HISTORIES</button>
        <button class="tab-r" id="tab-web" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>

    <div id="loginMod" class="overlay">
        <div class="modal-card">
            <h2>Allianz Login</h2>
            <input type="text" id="logName" placeholder="BENUTZERNAME">
            <input type="password" id="logPin" placeholder="PIN">
            <button class="submit-btn" onclick="doLogin()">BETRETEN</button>
            <p onclick="closeModals()" style="color:#555; cursor:pointer; margin-top:15px;">Abbrechen</p>
        </div>
    </div>

    <div id="regMod" class="overlay">
        <div class="modal-card">
            <h2>Rekrutierung</h2>
            <div class="grid-2">
                <input type="text" id="regCowTime" placeholder="Dabei seit">
                <input type="text" id="regKD" placeholder="Deine KD">
            </div>
            <input type="text" id="regAware" placeholder="Wie auf uns aufmerksam geworden?">
            <input type="text" id="regAge" placeholder="Dein Alter">
            <input type="text" id="regFreq" placeholder="Wie viel spielst du am Tag?">
            <select id="regReason">
                <option value="" disabled selected>Grund der Anmeldung...</option>
                <option value="Nur zu Besuch / Gast">bin in einer anderen allisnz und nur zu besuch / als Gast</option>
                <option value="Bestrebung einer Mitgliedschaft">bestrebung einer mitgliedschaft</option>
            </select>
            <input type="text" id="regInGame" placeholder="Anmeldenamen (wie im Game)">
            <input type="password" id="regPin1" placeholder="PIN wählen">
            <input type="password" id="regPin2" placeholder="PIN wiederholen">
            <button class="submit-btn" style="background: #ff3131; color: white;" onclick="doRegister()">ABSCHICKEN</button>
            <p onclick="closeModals()" style="color:#555; cursor:pointer; margin-top:15px;">Abbrechen</p>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=1188820112';
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1502735246335021267/fpxXtWr5QgSny6rfJzGHKnhYskehC9vDMEl3CvUzjgbBOuKBd8KGzUhCRfvd2KmWcnND';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0hFHFAj4COvIECS0MmZDs-KfIl2qnIksFWI1I_xn8gQr01PiVgYfQAXKPnr9UmU5Dyw/exec';

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none'); }

        async function doLogin() {
            const n = document.getElementById("logName").value.trim().toLowerCase();
            const p = document.getElementById("logPin").value.trim();
            const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            const user = rows.find(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                return c[0].toLowerCase() === n && c[2] === p;
            });
            if(user) {
                const c = user.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                localStorage.setItem('bulls_user', c[0]);
                localStorage.setItem('bulls_role', c[3]);
                window.location.href = "dashboard.html";
            } else { alert("Zutritt verweigert!"); }
        }

        async function doRegister() {
            const name = document.getElementById('regInGame').value.trim();
            const pin = document.getElementById('regPin1').value.trim();
            const pin2 = document.getElementById('regPin2').value.trim();
            const cowTime = document.getElementById('regCowTime').value.trim();
            const kd = document.getElementById('regKD').value.trim();
            const aware = document.getElementById('regAware').value.trim();
            const age = document.getElementById('regAge').value.trim();
            const freq = document.getElementById('regFreq').value.trim();
            const reason = document.getElementById('regReason').value;

            if(!name || !pin) return alert("Bitte Namen und PIN eingeben!");
            if(pin !== pin2) return alert("Die PINs sind nicht gleich!");

            // 1. AN GOOGLE TABELLE SENDEN (Aktion: registerUser)
            try {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: "registerUser", 
                        name: name, 
                        pin: pin 
                    })
                });

                // 2. AN DISCORD SENDEN
                const discordMsg = {
                    content: `🚨 **NEUE REKRUTIERUNG** 🚨\n\n**Name:** ${name}\n**Alter:** ${age}\n**KD:** ${kd}\n**CoW Zeit:** ${cowTime}\n**Spielt:** ${freq}\n**Grund:** ${reason}\n\n_System: Automatisch als Gast eingetragen._`
                };
                fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(discordMsg) });

                // 3. LOGIN & WEITERLEITUNG
                localStorage.setItem('bulls_user', name);
                localStorage.setItem('bulls_role', 'Gast');
                alert("Erfolgreich registriert! Willkommen bei den Bulls.");
                window.location.href = "dashboard.html";

            } catch (e) {
                alert("Fehler bei der Datenbankverbindung.");
            }
        }
    </script>
</body>
</html>
