<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz Zentrale V12.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* HINTERGRUND-RIEGEL: Verhindert Chaos, zwingt Bilder in den Hintergrund */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: black; font-family: 'Almendra', serif; color: white;
            overflow: hidden;
        }
        
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; 
            display: none;
        }
        
        /* Startzustand: bulls_start.jpg aktiv, bulls_dashboard.jpg versteckt */
        #bg0 { display: block; opacity: 0.7; }
        #bg1 { display: none; opacity: 0.4; }

        /* --- DEIN V12.1 PANZER-DESIGN --- */
        #start-portal { 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; position: relative; z-index: 10;
        }
        
        #emblem-container { 
            position: relative; z-index: 5; 
            width: 600px; max-width: 80vw; 
            padding: 20px; 
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.7); 
            border: 1px solid rgba(255, 0, 0, 0.2);
            background: rgba(0,0,0,0.6);
        }
        #emblem-container img { width: 100%; display: block; }

        /* Seitliche Buttons LINKS */
        .side-menu-left { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 40px; z-index: 20; }
        .side-tab-left { padding: 30px 10px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 0 10px 10px 0; width: 45px; color: black; font-family: 'Almendra'; }
        #side-login { background: #39d353; box-shadow: 0 0 20px rgba(57, 211, 83, 0.4); }
        #side-reg { background: #ffd600; box-shadow: 0 0 20px rgba(255, 214, 0, 0.4); }

        /* Seitliche Buttons RECHTS */
        .side-menu-right { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        .side-tab-right { padding: 25px 8px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 10px 0 0 10px; width: 40px; color: black; font-family: 'Almendra'; }
        #side-yt { background: #ff8c00; }
        #side-hist { background: #5b5bff; color: white; }
        #side-web { background: #00cfd1; }

        /* Login Modal */
        .overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .login-box { background: #111; padding: 30px; border: 2px solid #ff3131; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 0 50px red; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; text-align: center; }
        .login-btn { width: 100%; padding: 15px; background: #39d353; border: none; color: black; font-weight: bold; cursor: pointer; font-size: 20px; font-family: 'Almendra'; }

        /* Dashboard-Bereich (wird nach Login sichtbar) */
        #dashboard { display: none; }
        #dashboard h1 { color: #ff3131; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

<img id="bg0" class="bg-fixed">
<img id="bg1" class="bg-fixed">

<div id="start-portal">
    <div class="side-menu-left">
        <button class="side-tab-left" id="side-login" onclick="document.getElementById('loginModal').style.display='flex'">LOGIN</button>
        <button class="side-tab-left" id="side-reg" onclick="window.open('https://darkbulls.jimdofree.com/registrierung/')">REGISTRIEREN</button>
    </div>

    <div id="emblem-container">
        <img src="bulls_start.jpg" alt="Dark Bulls V12.1">
    </div>

    <div class="side-menu-right">
        <button class="side-tab-right" id="side-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="side-tab-right" id="side-hist">HISTORIES</button>
        <button class="side-tab-right" id="side-web" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="loginModal" class="overlay">
    <div class="login-box">
        <h2 style="color: #ff3131; margin-top: 0;">ANMELDUNG</h2>
        <input type="text" id="nameIn" placeholder="NAME">
        <input type="password" id="pinIn" placeholder="PIN">
        <button class="login-btn" onclick="checkAuth()">BETRETEN</button>
        <p onclick="document.getElementById('loginModal').style.display='none'" style="color:#666; cursor:pointer; margin-top:15px;">Abbrechen</p>
    </div>
</div>

<div id="dashboard">
    <h1>Dashboard geladen</h1>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=1188820112';

    // FIX: Setzt Bilder beim Laden mit Cache-Buster, damit sie frisch kommen
    window.onload = function() {
        const time = new Date().getTime();
        document.getElementById('bg0').src = 'bulls_start.jpg?t=' + time;
        document.getElementById('bg1').src = 'bulls_dashboard.jpg?t=' + time;
        loadData();
    };

    async function loadData() {
        try {
            const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                return { name: c[0], pin: c[2], role: c[3] };
            });
        } catch(e) { alert("Fehler beim Datenabgleich."); }
    }

    function checkAuth() {
        const n = document.getElementById("nameIn").value.trim().toLowerCase();
        const p = document.getElementById("pinIn").value.trim();
        if(!n || !p) return;

        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);
        if(u) {
            // Hintergrund wechseln
            document.getElementById("bg0").style.display = "none";
            document.getElementById("bg1").style.display = "block";
            
            // Seite umschalten
            document.getElementById("start-portal").style.display = "none";
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
        } else {
            alert("Login falsch!");
        }
    }
</script>
</body>
</html>
