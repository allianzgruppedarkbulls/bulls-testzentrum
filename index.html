<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz System V12.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: 'Almendra', serif; }

        /* HINTERGRUND-SYSTEM */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            z-index: -1; transition: opacity 0.5s ease;
        }
        
        /* Hier setzen wir die Bilder direkt als Background-Image ein */
        #bg0 { 
            background-image: url('page0.jpg'); 
            opacity: 1; 
        }
        #bg1 { 
            background-image: url('page1.jpg'); 
            opacity: 0; 
        }

        /* STARTSEITE DESIGN */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        #logo-container img { width: 700px; max-width: 80vw; filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.7)); }

        .side-bar { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .left { left: 0; }
        .right { right: 0; }

        .bar-btn { 
            padding: 35px 10px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; 
            writing-mode: vertical-rl; text-orientation: upright; font-family: 'Almendra'; 
            border-radius: 0 10px 10px 0; color: black;
        }
        #btn-login { background: #39d353; }
        #btn-reg { background: #ffd600; }
        .info-btn { background: #444; color: white; border-radius: 10px 0 0 10px; writing-mode: vertical-rl; text-orientation: upright; padding: 20px 8px; cursor: pointer; }

        /* MODALS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .login-card { background: #111; border: 2px solid #ff3131; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: black; border: 1px solid #444; color: #39d353; font-family: 'Almendra'; font-size: 20px; text-align: center; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: #39d353; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* DASHBOARD */
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; z-index: 20; color: white; }
        #top-nav { background: rgba(0,0,0,0.8); padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 2px solid #ff3131; }
        .panel { background: rgba(0,0,0,0.9); border: 1px solid #444; padding: 15px; width: 250px; border-radius: 10px; position: absolute; }
        #p-perso { left: 30px; top: 100px; }
        #p-black { left: 30px; top: 350px; }
        #p-admin { right: 30px; top: 100px; }
        .panel h2 { color: #ff3131; margin-top: 0; font-size: 20px; text-decoration: underline; }
        .panel button { width: 100%; padding: 10px; margin: 5px 0; background: #39d353; border: none; font-weight: bold; cursor: pointer; font-family: 'Almendra'; }
    </style>
</head>
<body>

<div id="bg0" class="bg-layer"></div>
<div id="bg1" class="bg-layer"></div>

<div id="start">
    <div class="side-bar left">
        <div class="bar-btn" id="btn-login" onclick="openLogin()">LOGIN</div>
        <div class="bar-btn" id="btn-reg" onclick="window.open('https://darkbulls.jimdofree.com/registrierung/')">REGISTRIEREN</div>
    </div>
    
    <div id="logo-container">
        <img src="bulls_start.jpg">
    </div>

    <div class="side-bar right">
        <div class="info-btn" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</div>
        <div class="info-btn" style="background: #5b5bff;">HISTORIES</div>
    </div>
</div>

<div id="loginModal" class="overlay">
    <div class="login-card">
        <h2 style="color:#ff3131">ALLIANZ LOGIN</h2>
        <input type="text" id="nameIn" placeholder="NAME">
        <input type="password" id="pinIn" placeholder="PIN">
        <button class="submit-btn" onclick="checkLogin()">IDENTIFIZIEREN</button>
        <p onclick="closeLogin()" style="color:#555; cursor:pointer; margin-top:15px;">Abbrechen</p>
    </div>
</div>

<div id="dashboard">
    <div id="top-nav">
        <div id="userInfo" style="color:#ff3131; font-weight:bold; font-size: 20px;"></div>
        <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 15px; cursor:pointer; font-family:'Almendra';">LOGOUT</button>
    </div>

    <div class="panel" id="p-perso">
        <h2>Persönlich</h2>
        <button>Pin ändern</button>
        <button>Support Chat</button>
    </div>
    
    <div class="panel" id="p-black">
        <h2>Black Liste</h2>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="p-admin" style="display:none;">
        <h2>Admin</h2>
        <button>User Verwaltung</button>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=1188820112';

    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

    async function checkLogin() {
        const name = document.getElementById('nameIn').value.trim().toLowerCase();
        const pin = document.getElementById('pinIn').value.trim();

        try {
            const response = await fetch(SHEET_URL + '&t=' + new Date().getTime());
            const text = await response.text();
            const rows = text.split('\n').slice(1);

            let found = false;
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, "").trim());
                if(cols[0].toLowerCase() === name && cols[2] === pin) {
                    found = true;
                    loginSuccess(cols[0], cols[3]);
                }
            });

            if(!found) alert("Zugriff verweigert!");
        } catch(e) { alert("Datenfehler!"); }
    }

    function loginSuccess(name, role) {
        // Hintergrund wechseln
        document.getElementById('bg0').style.opacity = '0';
        document.getElementById('bg1').style.opacity = '1';
        
        document.getElementById('start').style.display = 'none';
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userInfo').innerText = name + " [" + role + "]";
        
        if(role === "Admin") document.getElementById('p-admin').style.display = 'block';
    }
</script>
</body>
</html>
