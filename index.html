<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz Zentrale</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background-color: black; 
            font-family: 'Almendra', serif; color: white; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        #main-bull-logo { 
            width: 750px; 
            max-width: 100vw; 
            filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); 
            z-index: 1;
        }

        /* Side Menus */
        .side-l { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 40px; z-index: 100; }
        .tab-l { padding: 35px 15px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 0 12px 12px 0; width: 55px; color: black; font-family: 'Almendra'; text-align: center; transition: 0.3s; }
        #btn-login { background: #39d353; box-shadow: 0 0 20px #39d353; }
        #btn-rekrut { background: #ffd600; box-shadow: 0 0 20px #ffd600; }
        .tab-l:hover { width: 70px; filter: brightness(1.2); }

        .side-r { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .tab-r { padding: 25px 10px; font-size: 15px; font-weight: bold; border: none; cursor: pointer; writing-mode: vertical-rl; text-orientation: upright; border-radius: 12px 0 0 12px; width: 45px; color: black; font-family: 'Almendra'; text-align: center; transition: 0.3s; }
        #tab-yt { background: #ff8c00; }
        #tab-hist { background: #5b5bff; color: white; }
        #tab-web { background: #00cfd1; }
        .tab-r:hover { width: 60px; filter: brightness(1.2); }

        /* Modals & Overlay */
        .overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-card { 
            background: #111; 
            padding: 25px; 
            border: 2px solid #ff3131; 
            border-radius: 15px; 
            width: 450px; 
            max-width: 90%; 
            text-align: center; 
            box-shadow: 0 0 50px red; 
        }
        
        h2 { color: #ff3131; margin-top: 0; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 16px; text-align: center; box-sizing: border-box; outline: none; border-radius: 4px; }
        .submit-btn { width: 100%; padding: 15px; border: none; color: black; font-weight: bold; cursor: pointer; font-size: 20px; font-family: 'Almendra'; margin-top: 15px; border-radius: 5px; text-transform: uppercase; }

        .hist-box { border: 2px solid #fff; padding: 25px; text-align: left; background: #000; min-height: 400px; border-radius: 5px; overflow-y: auto; max-height: 60vh; }

        /* SPERR-OVERLAY STYLE */
        #lockOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #050505; z-index: 9999; justify-content: center; align-items: center; 
            flex-direction: column; text-align: center; padding: 20px;
        }
        #adminTrigger { font-size: 100px; color: #ff3131; cursor: default; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,49,49,0.6); user-select: none; }
    </style>
</head>
<body>

    <img src="bulls_start.jpg" id="main-bull-logo">

    <div class="side-l">
        <button class="tab-l" id="btn-login" onclick="openModal('loginMod')">LOGIN</button>
        <button class="tab-l" id="btn-rekrut" onclick="openModal('regMod')">REKRUTIERUNG</button>
    </div>

    <div class="side-r">
        <button class="tab-r" id="tab-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="tab-r" id="tab-hist" onclick="openHistory()">HISTORIES</button>
        <button class="tab-r" id="tab-web" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>

    <div id="loginMod" class="overlay">
        <div class="modal-card">
            <h2 style="color:#ff3131;">Allianz Login</h2>
            <input type="text" id="logName" placeholder="BENUTZERNAME">
            <input type="password" id="logPin" placeholder="PIN">
            <button class="submit-btn" style="background: #39d353;" onclick="doLogin()">BETRETEN</button>
            <p onclick="closeModals()" style="color:#555; cursor:pointer; margin-top:15px;">Abbrechen</p>
        </div>
    </div>

    <div id="regMod" class="overlay">
        <div class="modal-card">
            <h2>Rekrutierung</h2>
            <div class="grid-2">
                <input type="text" id="regCowTime" placeholder="Dabei seit">
                <input type="text" id="regKD" placeholder="Deine KD">
            </div>
            <input type="text" id="regAware" placeholder="Wie auf uns aufmerksam geworden?">
            <input type="text" id="regAge" placeholder="Dein Alter">
            <input type="text" id="regTestNum" placeholder="Testspiel-Nummer">
            <input type="text" id="regFreq" placeholder="Wie viel spielst du am Tag?">
            <select id="regReason">
                <option value="" disabled selected>Grund der Anmeldung...</option>
                <option value="Nur zu Besuch / Gast">Bin nur zu Besuch / Gast</option>
                <option value="Bestrebung einer Mitgliedschaft">Bestrebung einer Mitgliedschaft</option>
            </select>
            <input type="text" id="regInGame" placeholder="Anmeldenamen (wie im Game)">
            <input type="password" id="regPin1" placeholder="PIN wählen">
            <input type="password" id="regPin2" placeholder="PIN wiederholen">
            <button class="submit-btn" style="background: #ff3131; color: white;" onclick="doRegister()">ABSCHICKEN</button>
            <p onclick="closeModals()" style="color:#555; cursor:pointer; margin-top:15px;">Abbrechen</p>
        </div>
    </div>

    <div id="histMod" class="overlay">
        <div class="modal-card" style="width: 900px; max-width: 95vw;">
            <h1 style="color: #ff0000; font-size: 40px; margin-bottom: 20px;">Die Entstehung der Dark Bulls</h1>
            <div class="hist-box">
                <h3 id="hist-title" style="color: #fff; margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px;"></h3>
                <p id="hist-text" style="font-size: 17px; color: #fff; line-height: 1.4; white-space: pre-wrap;"></p>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px; margin-top: 20px;">
                <button class="submit-btn" style="background: #ffd600; flex: 1; margin: 0;" onclick="prevHist()">Zurück</button>
                <button class="submit-btn" style="background: #39d353; flex: 1; margin: 0;" onclick="closeModals()">Schließen</button>
                <button class="submit-btn" style="background: #ffd600; flex: 1; margin: 0;" onclick="nextHist()">Vor</button>
            </div>
        </div>
    </div>

    <div id="lockOverlay">
        <div id="adminTrigger" onclick="secretAdminClick()">⚠️</div>
        <h1 style="color:#ff3131; text-transform:uppercase; letter-spacing:5px; font-size:40px; margin-bottom:10px;">System-Sperre active</h1>
        <div style="width:100px; height:2px; background:#ff3131; margin-bottom:30px;"></div>
        <p id="userLockMsg" style="color:#39d353; font-size:24px; max-width:700px; line-height:1.6; font-style:italic;">
            Der Panzer wird gerade gewartet...
        </p>
        <div id="secretAdminBox" style="display:none; margin-top:20px;">
            <input type="password" id="adminOverridePin" placeholder="ADMIN CODE">
            <button class="submit-btn" style="background:#ff3131; color:#fff;" onclick="overrideLock()">EINLOGGEN</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = window.BULLS_CONFIG.SCRIPT_URL; 
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=1188820112';
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1502735246335021267/fpxXtWr5QgSny6rfJzGHKnhYskehC9vDMEl3CvUzjgbBOuKBd8KGzUhCRfvd2KmWcnND';
        const HIST_GID = '1142818833';

        let historyData = [];
        let currentHistIndex = 0;
        let clickCount = 0;
        let masterGateCode = "BULLS2026"; // Fallback-Sicherheit

        // AUTOMATISCHER STATUS CHECK BEIM LADEN
        window.onload = async function() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getGlobalSettings");
                const settings = await response.json();
                
                // Holt den aktuellen Hintertür-Code direkt aus der Datenbank
                if (settings.masterCode) {
                    masterGateCode = settings.masterCode;
                }

                if (settings.wartung === true) {
                    document.getElementById('lockOverlay').style.display = 'flex';
                    document.getElementById('userLockMsg').innerText = settings.msg;
                }
            } catch(e) { console.log("Wartungscheck offline."); }
        };

        function secretAdminClick() {
            clickCount++;
            if (clickCount === 5) {
                document.getElementById('secretAdminBox').style.display = 'block';
                document.getElementById('adminTrigger').style.color = '#39d353'; 
            }
        }

        function overrideLock() {
            if (document.getElementById('adminOverridePin').value === masterGateCode) { 
                document.getElementById('lockOverlay').style.display = 'none';
            } else {
                alert("ZUGRIFF VERWEIGERT!");
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none'); }

       // LOGIN LOGIK KORRIGIERT FÜR NEUE MATRIX
        async function doLogin() {
            const n = document.getElementById("logName").value.trim().toLowerCase();
            const p = document.getElementById("logPin").value.trim();
            if(!n || !p) return alert("Bitte Daten eingeben!");

            try {
                const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                let userFound = null;
                rows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                    // c[0] = Name, c[2] = PIN (Spalte C)
                    if(c[0] && c[0].toLowerCase() === n && c[2] === p) { userFound = c; }
                });

                if(userFound) {
                    localStorage.setItem('bulls_user', userFound[0]);             // Spalte A (Name)
                    localStorage.setItem('bulls_role', userFound[3]);             // Spalte D (Rolle)
                    localStorage.setItem('bulls_extra', userFound[4] || "");      // KORREKTUR: Spalte E (Zusätzliche Rolle)
                    window.location.href = "dashboard.html";
                } else { alert("Login fehlgeschlagen! Name oder PIN falsch."); }
            } catch(e) { alert("Serverfehler beim Anmeldevorgang!"); }
        }

        // REKRUTIERUNG LOGIK
        async function doRegister() {
    const name = document.getElementById('regInGame').value.trim();
    const pin = document.getElementById('regPin1').value.trim();
    const pin2 = document.getElementById('regPin2').value.trim();
    const kd = document.getElementById('regKD').value.trim();
    const testNum = document.getElementById('regTestNum').value.trim(); // NEU
    const reason = document.getElementById('regReason').value;

            if(!name || !pin) return alert("Bitte Namen und PIN eingeben!");
            if(pin !== pin2) return alert("Die PINs stimmen nicht überein!");

            try {
                // Sende an Google Script
                fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: "registerUser", name: name, pin: pin }) 
                });
                
                // Sende an Discord
                const discordMsg = {
                    content: `🚨 **NEUE REKRUTIERUNG** 🚨\n**Name:** ${name}\n**KD:** ${kd}\n**Grund:** ${reason}`
                };
                fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(discordMsg) });

                localStorage.setItem('bulls_user', name);
                localStorage.setItem('bulls_role', 'Anwärter');
                localStorage.setItem('bulls_extra', '');
                alert("Registrierung erfolgreich! Willkommen bei den Bulls.");
                window.location.href = "dashboard.html";
            } catch (e) { alert("Registrierungsfehler!"); }
        }

        // HISTORIES LOGIK
        async function openHistory() {
            openModal('histMod');
            if (historyData.length === 0) {
                try {
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=${HIST_GID}&t=${new Date().getTime()}`);
                    const text = await res.text();
                    const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim()));
                    historyData = [];
                    for (let col = 0; col < rows[0].length; col++) {
                        let pageText = "";
                        for (let row = 1; row < rows.length; row++) { 
                            if (rows[row][col]) pageText += rows[row][col] + "\n"; 
                        }
                        if (rows[0][col]) historyData.push({ title: rows[0][col], content: pageText });
                    }
                    renderHist();
                } catch(e) { console.error("History konnte nicht geladen werden."); }
            }
        }

        function renderHist() {
            if (historyData[currentHistIndex]) {
                document.getElementById('hist-title').innerText = historyData[currentHistIndex].title;
                document.getElementById('hist-text').innerText = historyData[currentHistIndex].content;
            }
        }
        function nextHist() { if (currentHistIndex < historyData.length - 1) { currentHistIndex++; renderHist(); } }
        function prevHist() { if (currentHistIndex > 0) { currentHistIndex--; renderHist(); } }
    </script>
</body>
</html>
