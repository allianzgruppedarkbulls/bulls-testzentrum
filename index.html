<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz System V12.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* FIX: Hintergrund-Bilder festnageln mit neuen Namen */
        html, body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; display: none;
        }
        
        /* Startzustand: bulls_start.jpg aktiv */
        #bg0 { display: block; opacity: 0.7; } 
        /* Dashboardzustand: bulls_dashboard.jpg aktiv */
        #bg1 { display: none; opacity: 0.4; }

        /* DEIN DESIGN STARTSEITE */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        
        #loginBar { position: absolute; left: 0; top: 35%; transform: translateY(-50%); background: #39d353; padding: 30px 5px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 45px; text-align: center; }
        #regBar { position: absolute; left: 0; top: 65%; transform: translateY(-50%); background: #ffd600; padding: 25px 5px; font-size: 14px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 45px; text-align: center; }
        
        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .info-btn { padding: 15px 5px; font-size: 15px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 10px 0 0 10px; width: 40px; text-align: center; color: black; min-height: 100px; }
        #btn-yt { background: #ff8c00; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; }

        /* MODAL DESIGN */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .dark-modal { background: #1a1a1a; padding: 30px; width: 400px; max-width: 90vw; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 50px rgba(255,0,0,0.4); }
        .dark-modal input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; text-align: center; }
        .logbtn { padding: 15px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; font-size: 18px; border-radius: 5px; color: black; width: 100%; }

        /* DASHBOARD DESIGN */
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; padding-top: 60px; }
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; z-index: 100; background: rgba(0,0,0,0.8); box-sizing: border-box; }
        
        .panel { display: none; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .panel.visible { display: block; opacity: 1; transform: translateY(0); }
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; text-align: center; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; }

        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 40px; top: 80px; }
            #blacklistPanel { left: 40px; top: 380px; }
            #admin { right: 40px; top: 120px; }
        }
    </style>
</head>
<body>

<img src="bulls_start.jpg" id="bg0" class="bg-fixed">
<img src="bulls_dashboard.jpg" id="bg1" class="bg-fixed">

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="window.open('https://darkbulls.jimdofree.com/registrierung/')">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button class="info-btn" id="btn-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="info-btn" id="btn-hist">HISTORIES</button>
        <button class="info-btn" id="btn-web" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="dark-modal">
        <h1 style="color:#ff3131">Anmeldung</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <button class="logbtn" style="background:#39d353" onclick="doLogin()">Anmelden</button>
        <p onclick="document.getElementById('pinModal').style.display='none'" style="cursor:pointer; color:#555; margin-top:10px;">Abbrechen</p>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:15px; border-radius:5px;">LOGOUT</button>
    </div>
    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button>Pin ändern</button>
        <button>Support Chat</button>
    </div>
    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button>Anschauen</button>
    </div>
    <div id="admin" class="panel">
        <h2>Admin</h2>
        <button>User-Verwaltung</button>
    </div>
</div>

<script>
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';
    let users = [];

    window.onload = function() {
        const time = new Date().getTime();
        // Hier laden wir beide Bilder direkt beim Start
        document.getElementById('bg0').src = 'bulls_start.jpg?t=' + time;
        document.getElementById('bg1').src = 'bulls_dashboard.jpg?t=' + time;
        loadData();
    };

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}&t=${new Date().getTime()}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    name: c[0].replace(/"/g,"").trim(), 
                    pin: c[2].replace(/"/g,"").trim(), 
                    role: c[3].replace(/"/g,"").trim() 
                };
            });
        } catch(e) { console.log("Fehler beim Laden der User-Daten"); }
    }

    function doLogin() {
        const nInput = document.getElementById("nameInput").value.trim().toLowerCase();
        const pInput = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === nInput && x.pin === pInput);
        
        if (u) {
            // FIX: Erst das Bild für Seite 2 SICHTBAR machen, dann Seite 1 ausblenden
            const bgDashboard = document.getElementById("bg1");
            const bgStart = document.getElementById("bg0");
            
            bgDashboard.style.display = "block"; 
            bgDashboard.style.opacity = "0.4"; // Deine gewünschte Helligkeit
            bgStart.style.display = "none";

            document.getElementById("pinModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;

            // Panels einblenden
            document.querySelectorAll('.panel').forEach(p => {
                if(u.role === "Admin" || p.id === "personal" || (p.id === "blacklistPanel" && u.role !== "Gast")) {
                    p.style.display = "block";
                    setTimeout(() => p.classList.add('visible'), 200);
                }
            });
        } else { 
            alert("Zutritt verweigert! Name oder PIN falsch."); 
        }
    }
</script>
    }
</script>
</body>
</html>
