<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - TEST-SYSTEM V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #login-container { text-align: center; z-index: 10; background: rgba(20, 20, 20, 0.9); padding: 40px; border: 2px solid #333; border-radius: 15px; box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); width: 350px; }
        #logo-start { width: 100%; max-width: 300px; filter: drop-shadow(0 0 20px red); margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; text-align: center; }
        .btn-login { width: 100%; padding: 15px; background: #39d353; border: none; color: black; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 20px; border-radius: 5px; transition: 0.3s; }
        .btn-login:hover { background: #2eb846; box-shadow: 0 0 15px #39d353; }
        
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #333; border-top: 4px solid #ff3131; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="color: #ff3131; margin-top: 15px;">System wird geladen...</p>
    </div>

    <div id="login-container">
        <img src="bulls_start.jpg" id="logo-start" alt="Dark Bulls">
        <h2 style="color: #ff3131; margin-top: 0;">ZENTRALE</h2>
        <input type="text" id="nameInput" placeholder="DEIN NAME">
        <input type="password" id="pinInput" placeholder="DEIN PIN">
        <button class="btn-login" onclick="startAuth()">LOGIN</button>
    </div>

    <script>
        const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
        const GID_USERS = '1188820112';

        async function startAuth() {
            const n = document.getElementById("nameInput").value.trim().toLowerCase();
            const p = document.getElementById("pinInput").value.trim();
            
            if(!n || !p) return alert("Bitte Name und PIN eingeben!");

            document.getElementById("loading-screen").style.display = "flex";

            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}&t=${new Date().getTime()}`);
                const text = await res.text();
                const users = text.split('\n').slice(1).map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/["']/g, "").trim());
                    return { name: c[0], pin: c[2], role: c[3] };
                });

                const user = users.find(u => u.name.toLowerCase() === n && u.pin === p);

                if(user) {
                    // WICHTIG: Wir speichern die Daten im Browser-Speicher (Session)
                    localStorage.setItem('bulls_name', user.name);
                    localStorage.setItem('bulls_role', user.role);
                    localStorage.setItem('bulls_auth', 'true');

                    // WEITERLEITUNG ZUM HAUPTDECK (D2)
                    window.location.href = "test_dashboard.html"; 
                } else {
                    alert("Zugriff verweigert! Daten falsch.");
                    document.getElementById("loading-screen").style.display = "none";
                }
            } catch (e) {
                alert("Verbindungsfehler zur Cloud!");
                document.getElementById("loading-screen").style.display = "none";
            }
        }
    </script>
</body>
</html>
