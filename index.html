<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Almendra'; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #bg { position: fixed; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.7; }
        .login-box { background: rgba(0,0,0,0.8); padding: 30px; border: 2px solid #ff3131; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 0 50px red; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #39d353; border: 1px solid #444; text-align: center; font-size: 20px; font-family: 'Almendra'; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #39d353; border: none; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 20px; }
    </style>
</head>
<body>
    <img src="bulls_start.jpg" id="bg">
    <div class="login-box">
        <img src="bulls_start.jpg" style="width:100%; margin-bottom:10px;">
        <input type="text" id="u" placeholder="NAME">
        <input type="password" id="p" placeholder="PIN">
        <button onclick="login()">BETRETEN</button>
    </div>
    <script>
        async function login() {
            const n = document.getElementById("u").value.trim().toLowerCase();
            const p = document.getElementById("p").value.trim();
            const res = await fetch('https://docs.google.com/spreadsheets/d/1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ/gviz/tq?tqx=out:csv&gid=1188820112');
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            const user = rows.find(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                return c[0].toLowerCase() === n && c[2] === p;
            });
            if(user) {
                const c = user.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                localStorage.setItem('bulls_user', c[0]);
                localStorage.setItem('bulls_role', c[3]);
                window.location.href = "dashboard.html";
            } else { alert("Falsch!"); }
        }
    </script>
</body>
</html>
