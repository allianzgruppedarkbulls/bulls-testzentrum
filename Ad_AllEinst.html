<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - SYSTEM ZENTRALE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            width: 550px; background-color: #0f0f0f; border: 2px solid #333; 
            border-radius: 15px; padding: 40px; box-shadow: 0 0 60px 15px rgba(255, 49, 49, 0.2); 
            text-align: center;
        }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 40px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }

        .nav-btn {
            width: 100%; padding: 22px; margin-bottom: 20px; background: #111; border: 1px solid #ff3131;
            color: #ff3131; font-family: 'Almendra'; font-size: 21px; font-weight: bold;
            text-transform: uppercase; border-radius: 10px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 15px; box-sizing: border-box;
        }
        .nav-btn:hover { background: #ff3131; color: #000; box-shadow: 0 0 35px rgba(255, 49, 49, 0.6); transform: scale(1.02); }
        .icon { font-size: 26px; }
        .btn-back { display: block; margin-top: 40px; color: #666; text-decoration: none; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        .btn-back:hover { color: #fff; }

        /* MULTI-CHECKBOX POP-UP OVERLAY (MODAL FOR EDITING) */
        .matrix-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        .matrix-content-box {
            width: 750px; max-width: 95vw; background: #0f0f0f; border: 2px solid #ff3131;
            border-radius: 15px; padding: 30px; box-shadow: 0 0 50px rgba(255, 49, 49, 0.4); box-sizing: border-box;
        }

        /* WIE USER VERWALTUNG: LISTEN STYLES */
        .rights-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; text-align: left; max-height: 50vh; overflow-y: auto; padding-right: 5px; }
        .rights-item { display: flex; justify-content: space-between; align-items: center; background: #151515; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .rights-info { display: flex; flex-direction: column; }
        .rights-info strong { color: #fff; font-size: 18px; }
        .rights-info small { color: #555; }
        .rights-actions { display: flex; align-items: center; gap: 15px; }

        /* STATUS BUTTONS (AKTIV / DEAKTIVIERT) */
        .status-toggle { padding: 8px 15px; font-family: 'Almendra'; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; text-transform: uppercase; min-width: 120px; text-align: center; font-size: 14px; }
        .status-active { background: #2fb145; color: #000; }
        .status-disabled { background: #ff3131; color: #fff; }
        
        .edit-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px 15px; font-family: 'Almendra'; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .edit-btn:hover { background: #ff3131; color: #000; border-color: #ff3131; }

        /* GRID FÜR HAKEN IM MODAL */
        .roles-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 25px 0; }
        .role-option { display: flex; align-items: center; gap: 10px; background: #151515; padding: 12px; border: 1px solid #333; border-radius: 6px; color: #dbdee1; cursor: pointer; }
        .role-option:hover { border-color: #ff3131; }
        .matrix-cb { width: 20px; height: 20px; accent-color: #ff3131; cursor: pointer; }

        .save-matrix-btn { background: #39d353; color: black; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; font-family: 'Almendra'; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .save-matrix-btn:hover { background: #2fb145; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>System Zentrale</h1>

    <button class="nav-btn" onclick="window.location.href='Ad_Wartung.html'">
        <span class="icon">⚠️</span> Wartungsarbeiten
    </button>

    <button class="nav-btn" onclick="window.location.href='Ad_VorVer.html'">
        <span class="icon">⚙️</span> Dropdown Pflege
    </button>

    <button class="nav-btn" onclick="openMatrixModal()">
        <span class="icon">🎛️</span> Dashboard Rechte
    </button>

    <a href="dashboard.html" class="btn-back">Zurück zum Hauptmenü</a>
</div>

<div id="matrixModal" class="matrix-overlay">
    <div class="matrix-content-box" style="width: 800px;">
        <h2 style="color: #ff3131; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 15px;">
            🎛️ Dashboard-Zentralsteuerung & Berechtigungen
        </h2>
        <p style="color: #aaa; font-size: 16px;">
            Schalte Elemente global aktiv/inaktiv oder klicke auf "Bearbeiten", um Rollenrechte festzulegen.
        </p>

        <div class="rights-list" id="rightsListContainer">
            <div style="text-align:center; padding:30px; color:#f0b232; font-style:italic;">Verbinde zum HQ-Server... 🔄</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 25px; border-top: 1px solid #333; padding-top: 20px;">
            <button class="nav-btn" style="width: auto; padding: 12px 30px; font-size: 16px; margin: 0; border-color: #666; color: #666;" onclick="closeMatrixModal()">
                Schließen
            </button>
            <button class="save-matrix-btn" onclick="saveGlobalMatrixData()">
                ÄNDERUNGEN VERSIEGELN 💾
            </button>
        </div>
    </div>
</div>

<div id="editModal" class="matrix-overlay" style="z-index: 10000; background: rgba(0,0,0,0.8);">
    <div class="matrix-content-box">
        <h3 id="editElementName" style="color: #ff3131; margin-top:0; text-transform:uppercase;">Element bearbeiten</h3>
        <p style="color:#666; margin-bottom: 20px;">Wähle aus, wer diesen Button auf dem Dashboard sehen darf:</p>
        
        <div class="roles-grid" id="rolesGridContainer"></div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
            <button class="edit-btn" style="background:#555;" onclick="closeEditModal()">Übernehmen</button>
        </div>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    const ALL_ROLES_LIST = ["Anwärter", "Gast", "Mitglied", "Kampfdivision", "Offizier", "Admin", "Buchhalter", "Moderator", "Statistiker", "elo", "support", "Ausbilder"];
    let localMatrixCache = [];
    let currentEditingItemId = null;

    function openMatrixModal() {
        document.getElementById("matrixModal").style.display = "flex";
        loadDashboardMatrixHTML();
    }

    function closeMatrixModal() {
        document.getElementById("matrixModal").style.display = "none";
    }

    async function loadDashboardMatrixHTML() {
        try {
            const res = await fetch(API + "?action=getDashboardMatrix");
            localMatrixCache = await res.json();
            renderRightsList();
        } catch (e) {
            document.getElementById("rightsListContainer").innerHTML = `<div style="text-align:center; color:#ff3131; padding:20px; font-weight:bold;">Fehler beim Laden der Berechtigungen!</div>`;
        }
    }

    function renderRightsList() {
        const container = document.getElementById("rightsListContainer");
        container.innerHTML = "";

        if (!localMatrixCache || localMatrixCache.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#aaa;">Keine Elemente gefunden. Initialisiere Tabelle im Sheet...</div>`;
            return;
        }

        localMatrixCache.forEach(item => {
            let itemDiv = document.createElement("div");
            itemDiv.className = "rights-item";

            let isAktiv = item.status === "Aktiv";
            let statusClass = isAktiv ? "status-active" : "status-disabled";
            let statusText = isAktiv ? "Sichtbar" : "Deaktiviert";

            itemDiv.innerHTML = `
                <div class="rights-info">
                    <strong>${item.name}</strong>
                    <small>ID: ${item.id} | Rollen: ${item.allowed.length > 0 ? item.allowed.join(", ") : "Keine"}</small>
                </div>
                <div class="rights-actions">
                    <button class="status-toggle ${statusClass}" onclick="toggleItemStatus('${item.id}')">${statusText}</button>
                    <button class="edit-btn" onclick="openEditModal('${item.id}')">Bearbeiten</button>
                </div>
            `;
            container.appendChild(itemDiv);
        });
    }

    function toggleItemStatus(id) {
        let item = localMatrixCache.find(i => i.id === id);
        if (item) {
            item.status = item.status === "Aktiv" ? "Deaktiviert" : "Aktiv";
            renderRightsList();
        }
    }

    function openEditModal(id) {
        currentEditingItemId = id;
        let item = localMatrixCache.find(i => i.id === id);
        if (!item) return;

        document.getElementById("editElementName").innerText = `${item.name} - Berechtigungen`;
        const grid = document.getElementById("rolesGridContainer");
        grid.innerHTML = "";

        ALL_ROLES_LIST.forEach(role => {
            let isChecked = item.allowed.includes(role) ? "checked" : "";
            let label = document.createElement("label");
            label.className = "role-option";
            label.innerHTML = `
                <input type="checkbox" class="matrix-cb" data-role="${role}" ${isChecked} onchange="updateLocalRoles('${id}')">
                <span>${role}</span>
            `;
            grid.appendChild(label);
        });

        document.getElementById("editModal").style.display = "flex";
    }

    function updateLocalRoles(id) {
        let item = localMatrixCache.find(i => i.id === id);
        if (!item) return;

        const checkboxes = document.querySelectorAll("#rolesGridContainer .matrix-cb");
        let activeRoles = [];
        checkboxes.forEach(cb => {
            if (cb.checked) activeRoles.push(cb.getAttribute("data-role"));
        });
        item.allowed = activeRoles;
    }

    function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
        renderRightsList(); // Hauptliste mit aktualisierten Rollen-Texten neu zeichnen
    }

    async function saveGlobalMatrixData() {
        document.getElementById("rightsListContainer").innerHTML = `<div style="text-align:center; padding:30px; color:#f0b232; font-style:italic;">Versiegele Änderungen in der Cloud... 🔄</div>`;

        let payloadMatrix = localMatrixCache.map(item => {
            return {
                id: item.id,
                status: item.status,
                allowed: item.allowed.join(", ")
            };
        });

        try {
            await fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveDashboardMatrix",
                    matrix: payloadMatrix
                })
            });
            alert("Dashboard-Berechtigungen erfolgreich im Google Sheet versiegelt! ⚙️");
            loadDashboardMatrixHTML();
        } catch (e) {
            alert("Fehler beim Versiegeln der Matrix!");
            loadDashboardMatrixHTML();
        }
    }
</script>
</body>
</html>
