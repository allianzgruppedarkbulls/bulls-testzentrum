<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - WARTUNGSZENTRALE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 650px; background-color: #0f0f0f; border: 1px solid #333; border-radius: 15px; padding: 40px; box-shadow: 0 0 70px 15px rgba(255, 49, 49, 0.25); text-align: center; }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }

        .admin-section { background: #000; padding: 20px; border-radius: 10px; border: 1px solid #222; margin-bottom: 25px; text-align: left; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h3 { margin: 0; color: #5dade2; font-size: 20px; text-transform: uppercase; }
        
        input[type="text"] { width: 100%; background: #050505; border: 1px solid #444; color: #39d353; padding: 12px; font-family: 'Almendra'; border-radius: 5px; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: #ff3131; }

        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; border: 1px solid #444; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        
        /* Rot für Sperre, Grün für News */
        input:checked + .slider.red { background-color: #ff3131; }
        input:checked + .slider.green { background-color: #39d353; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-save { width: 100%; padding: 20px; background: #39d353; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 22px; text-transform: uppercase; margin-top: 20px; box-shadow: 0 4px 15px rgba(57, 211, 83, 0.3); }
        .btn-save:hover { background: #fff; transform: scale(1.02); }
        .btn-back { display: block; margin-top: 30px; color: #666; text-decoration: none; text-transform: uppercase; font-size: 16px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <h1>Wartungsarbeiten</h1>

    <div class="admin-section">
        <div class="flex-row">
            <h3>Harte System-Sperre</h3>
            <label class="switch"><input type="checkbox" id="wartungToggle"><span class="slider red"></span></label>
        </div>
        <p style="color:#888; font-size:13px; margin-top:-10px; margin-bottom:15px;">Riegelt den Login für alle Member ab.</p>
        <input type="text" id="lockMsg" placeholder="Nachricht bei Sperre (Zutritt verweigert...)">
        <input type="text" id="masterCode" placeholder="Master-Code für Hintertür" style="margin-top:10px; border-color:#555;">
    </div>

    <div class="admin-section">
        <div class="flex-row">
            <h3>Geplante Wartung</h3>
            <label class="switch"><input type="checkbox" id="newsToggle"><span class="slider green"></span></label>
        </div>
        <p style="color:#888; font-size:13px; margin-top:-10px; margin-bottom:15px;">Zeigt eine Meldung im Dashboard an (Wegklickbar).</p>
        <input type="text" id="newsMsg" placeholder="Z.B. Wartung heute von 20:00 - 22:00 Uhr">
    </div>

    <button class="btn-save" onclick="saveSettings()">KONFIGURATION SPEICHERN</button>
    <a href="dashboard.html" class="btn-back">ZURÜCK ZUM HAUPTMENÜ</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    // LÄDT DIE AKTUELLEN EINSTELLUNGEN BEIM ÖFFNEN
    async function loadSettings() {
        try {
            const res = await fetch(API + "?action=getGlobalSettings");
            const s = await res.json();
            
            // Schalter setzen
            document.getElementById("wartungToggle").checked = s.wartung;
            document.getElementById("newsToggle").checked = s.newsActive;
            
            // Texte setzen
            document.getElementById("lockMsg").value = s.msg || "";
            document.getElementById("masterCode").value = s.masterCode || "BULLS2026";
            document.getElementById("newsMsg").value = s.newsMsg || "";
        } catch(e) { console.error("Ladefehler!"); }
    }

    async function saveSettings() {
        const btn = document.querySelector('.btn-save');
        btn.innerText = "ÜBERTRAGE...";
        
        const data = {
            action: "saveGlobalSettings",
            wartung: document.getElementById("wartungToggle").checked,
            msg: document.getElementById("lockMsg").value,
            masterCode: document.getElementById("masterCode").value,
            newsActive: document.getElementById("newsToggle").checked,
            newsMsg: document.getElementById("newsMsg").value
        };

        try {
            const response = await fetch(API, { method: "POST", body: JSON.stringify(data) });
            const res = await response.json();
            if(res.ok) {
                alert("✓ SYSTEM ERFOLGREICH AKTUALISIERT!");
            }
            btn.innerText = "KONFIGURATION SPEICHERN";
        } catch(e) { 
            alert("❌ FEHLER BEIM SPEICHERN!"); 
            btn.innerText = "KONFIGURATION SPEICHERN";
        }
    }

    window.onload = loadSettings;
</script>
</body>
</html>
