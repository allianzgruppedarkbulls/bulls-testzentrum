<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - SYSTEM ZENTRALE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            width: 500px; background-color: #0f0f0f; border: 2px solid #333; 
            border-radius: 15px; padding: 40px; box-shadow: 0 0 60px 15px rgba(255, 49, 49, 0.2); 
            text-align: center;
        }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 40px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }

        /* Große Navigations-Buttons in Rot-Schimmer */
        .nav-btn {
            width: 100%;
            padding: 25px;
            margin-bottom: 20px;
            background: #111;
            border: 1px solid #ff3131;
            color: #ff3131;
            font-family: 'Almendra';
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn:hover {
            background: #ff3131;
            color: #000;
            box-shadow: 0 0 35px rgba(255, 49, 49, 0.6);
            transform: scale(1.03);
        }

        .icon { font-size: 28px; }

        .btn-back { display: block; margin-top: 40px; color: #666; text-decoration: none; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <h1>System Zentrale</h1>

    <button class="nav-btn" onclick="window.location.href='Ad_Wartung.html'">
        <span class="icon">⚠️</span> Wartungsarbeiten
    </button>

    <button class="nav-btn" onclick="window.location.href='Ad_VorVer.html'">
        <span class="icon">⚙️</span> Dropdown Pflege
    </button>

    <a href="dashboard.html" class="btn-back">Zurück zum Hauptmenü</a>
</div>
</body>
</html>
