<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - SYSTEM-STEUERUNG</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { 
            width: 650px; background-color: #0f0f0f; border: 1px solid #333; 
            border-radius: 15px; padding: 40px; box-shadow: 0 0 70px 15px rgba(255, 49, 49, 0.25); 
            text-align: center;
        }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }

        .setting-row {
            background: #000; padding: 20px; border-radius: 10px; border: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .setting-info { text-align: left; }
        .setting-info h3 { margin: 0; color: #5dade2; font-size: 18px; }
        
        /* Dropdown Button Design */
        .btn-link { 
            width: 100%; padding: 15px; background: #333; color: #fff; border: 1px solid #444;
            border-radius: 8px; cursor: pointer; font-family: 'Almendra'; font-size: 18px;
            text-transform: uppercase; margin-bottom: 25px; transition: 0.3s; display: block; text-decoration: none;
        }
        .btn-link:hover { background: #ff3131; color: #fff; border-color: #fff; }

        .btn-save {
            width: 100%; padding: 20px; background: #39d353; color: #000; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Almendra';
            font-size: 22px; text-transform: uppercase; margin-top: 10px;
        }
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; border: 1px solid #444; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff3131; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-back { display: block; margin-top: 30px; color: #666; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>PANZER-STEUERUNG</h1>

    <a href="Ad_VorVer.html" class="btn-link">⚙️ Dropdown-Listen bearbeiten</a>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Wartungsmodus / Sperre</h3>
            <p style="color: #888; font-size: 13px; margin: 5px 0 0;">Riegelt den gesamten Panzer ab.</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="wartungToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
        <div class="setting-info"><h3>Sperr-Nachricht</h3></div>
        <input type="text" id="lockMsg" style="width:100%; background:#000; border:1px solid #444; color:#39d353; padding:12px; font-family:'Almendra'; border-radius:5px; margin-top:10px;" placeholder="Z.B. Panzer wird gerade betankt. Ab 20 Uhr wieder einsatzbereit!">
    </div>

    <button class="btn-save" onclick="saveSettings()">SYSTEM AKTUALISIEREN</button>
    <a href="dashboard.html" class="btn-back">ZURÜCK</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    async function saveSettings() {
        const data = {
            action: "saveGlobalSettings",
            wartung: document.getElementById("wartungToggle").checked,
            msg: document.getElementById("lockMsg").value
        };
        try {
            await fetch(API, { method: "POST", body: JSON.stringify(data) });
            alert("✓ SYSTEM-KONFIGURATION GESPEICHERT!");
        } catch(e) { alert("❌ FUNKSTÖRUNG!"); }
    }
</script>
</body>
</html>
