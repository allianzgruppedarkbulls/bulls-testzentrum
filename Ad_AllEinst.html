<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - SYSTEM-STEUERUNG</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container { 
            width: 650px; background-color: #0f0f0f; border: 1px solid #333; 
            border-radius: 15px; padding: 40px; box-shadow: 0 0 50px rgba(57, 211, 83, 0.2); 
            position: relative;
        }

        h1 { 
            color: #39d353; text-align: center; text-transform: uppercase; margin-bottom: 30px; 
            letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(57, 211, 83, 0.4);
        }

        .setting-row {
            background: #111; padding: 20px; border-radius: 8px; border: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .setting-info { flex: 1; margin-right: 20px; }
        .setting-info h3 { margin: 0; color: #5dade2; font-size: 18px; }
        .setting-info p { margin: 5px 0 0; color: #666; font-size: 14px; }

        /* Schalter / Toggle */
        .switch {
            position: relative; display: inline-block; width: 60px; height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #39d353; }
        input:checked + .slider:before { transform: translateX(26px); }

        textarea, input[type="text"] {
            width: 100%; background: #000; border: 1px solid #444; color: #39d353; 
            padding: 12px; font-family: 'Almendra'; font-size: 16px; border-radius: 5px; 
            margin-top: 10px; box-sizing: border-box; outline: none;
        }

        .btn-save {
            width: 100%; padding: 18px; background: #39d353; color: #000; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Almendra';
            font-size: 20px; text-transform: uppercase; margin-top: 30px; transition: 0.3s;
        }
        .btn-save:hover { background: #fff; transform: scale(1.02); }

        .btn-back { display: block; text-align: center; margin-top: 25px; color: #666; text-decoration: none; text-transform: uppercase; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>ALLG. EINSTELLUNGEN</h1>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Wartungsmodus</h3>
            <p>Sperrt den Zugriff für normale Mitglieder.</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="wartungToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
        <div class="setting-info">
            <h3>Globaler News-Banner</h3>
            <p>Erscheint bei allen Usern auf dem Dashboard.</p>
        </div>
        <input type="text" id="newsBanner" placeholder="Z.B. Großer Angriff heute um 20:00 Uhr!">
    </div>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Panzer Version</h3>
            <p>Aktuelle Software-Revision</p>
        </div>
        <span style="color: #39d353; font-weight: bold;">v3.1-FLASH</span>
    </div>

    <button class="btn-save" onclick="saveSettings()">KONFIGURATION SPEICHERN</button>
    
    <a href="dashboard.html" class="btn-back">ZURÜCK ZUM HAUPTMENÜ</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    async function saveSettings() {
        const settings = {
            action: "saveGlobalSettings",
            wartung: document.getElementById("wartungToggle").checked,
            news: document.getElementById("newsBanner").value
        };

        try {
            await fetch(API, { method: "POST", body: JSON.stringify(settings) });
            alert("✓ SYSTEM-KONFIGURATION AKTUALISIERT!");
        } catch(e) {
            alert("❌ FEHLER BEIM SPEICHERN!");
        }
    }

    // Hier könnten wir beim Laden die aktuellen Werte aus dem Sheet holen
    window.onload = async () => {
        console.log("Lade aktuelle Konfiguration...");
    };
</script>
</body>
</html>
