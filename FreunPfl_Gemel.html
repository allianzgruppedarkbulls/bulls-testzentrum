<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - GEMELDETE FÄLLE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 1000px; background-color: #0f0f0f; border: 1px solid #444; border-radius: 10px; padding: 30px; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .queue-table { width: 100%; border-collapse: collapse; background: #000; margin-bottom: 20px; }
        .queue-table th { background: #1a1a1a; color: #5dade2; padding: 12px; border: 1px solid #333; text-align: left; }
        .queue-table td { padding: 12px; border: 1px solid #222; color: #39d353; font-size: 16px; }
        
        .btn-process { background: #f1c40f; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: 'Almendra'; font-weight: bold; }
        .btn-process:hover { background: #fff; }

        /* Modal / Bearbeitungsfenster */
        #processModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0f0f0f; border: 2px solid #f1c40f; padding: 30px; border-radius: 10px; width: 600px; max-height: 90vh; overflow-y: auto; }
        
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .modal-field { display: flex; flex-direction: column; }
        .modal-field label { color: #f1c40f; font-size: 14px; margin-bottom: 5px; }
        .modal-field input, .modal-field textarea { background: #000; border: 1px solid #444; color: #fff; padding: 8px; font-family: 'Almendra'; }

        .modal-btns { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .btn-approve { background: #39d353; color: #000; flex: 1; padding: 10px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; }
        .btn-reject { background: #ff3131; color: #fff; flex: 1; padding: 10px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; }
        .btn-close { background: #444; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }

        .btn-back { display: block; width: 180px; margin: 20px auto 0; background: #444; color: #fff; padding: 10px; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Warteschlange: Neue Meldungen</h1>
    
    <table class="queue-table">
        <thead>
            <tr>
                <th>Datum</th>
                <th>Spieler (ID|Name)</th>
                <th>Verstoß</th>
                <th>Melder</th>
                <th>Aktion</th>
            </tr>
        </thead>
        <tbody id="queueBody">
            <tr><td colspan="5" style="text-align:center;">Lade gemeldete Fälle...</td></tr>
        </tbody>
    </table>

    <a href="dashboard.html" class="btn-back">ZURÜCK</a>
</div>

<div id="processModal">
    <div class="modal-content">
        <h2 style="color:#f1c40f; margin-top:0;">Fall bearbeiten</h2>
        <div class="modal-grid">
            <div class="modal-field"><label>Zielperson</label><input type="text" id="mTarget"></div>
            <div class="modal-field"><label>Allianz</label><input type="text" id="mAlli"></div>
            <div class="modal-field"><label>Verstoß</label><input type="text" id="mVerstoss"></div>
            <div class="modal-field"><label>Punkte</label><input type="text" id="mPunkte"></div>
            <div class="modal-field"><label>Map</label><input type="text" id="mMap"></div>
            <div class="modal-field"><label>Melder</label><input type="text" id="mMelder" readonly></div>
        </div>
        <div class="modal-field" style="margin-top:10px;">
            <label>Beschreibung</label>
            <textarea id="mDesc" rows="4"></textarea>
        </div>
        
        <div class="modal-btns">
            <button class="btn-reject" onclick="handleAction('reject')">Löschen</button>
            <button class="btn-approve" onclick="handleAction('approve')">Freigeben (Blacklist)</button>
        </div>
        <button class="btn-close" style="width:100%; margin-top:10px;" onclick="closeModal()">Abbrechen</button>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let currentQueue = [];
    let activeIndex = -1;

    async function loadQueue() {
        try {
            const res = await fetch(API + "?action=listMeldungen");
            currentQueue = await res.json();
            const body = document.getElementById("queueBody");
            body.innerHTML = "";

            if(currentQueue.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Keine neuen Meldungen vorhanden.</td></tr>';
                return;
            }

            currentQueue.forEach((m, i) => {
                body.innerHTML += `
                    <tr>
                        <td>${new Date(m.datum).toLocaleDateString()}</td>
                        <td>${m.target}</td>
                        <td>${m.verstoss}</td>
                        <td>${m.melder}</td>
                        <td><button class="btn-process" onclick="openModal(${i})">Bearbeiten</button></td>
                    </tr>
                `;
            });
        } catch(e) { console.error("Fehler beim Laden"); }
    }

    function openModal(index) {
        activeIndex = index;
        const m = currentQueue[index];
        document.getElementById("mTarget").value = m.target;
        document.getElementById("mAlli").value = m.alli || "";
        document.getElementById("mVerstoss").value = m.verstoss;
        document.getElementById("mPunkte").value = m.punkte || "";
        document.getElementById("mMap").value = m.map || "";
        document.getElementById("mMelder").value = m.melder;
        document.getElementById("mDesc").value = m.beschreibung || "";
        document.getElementById("processModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("processModal").style.display = "none";
    }

    async function handleAction(type) {
        const confirmMsg = type === 'approve' ? "In Blacklist verschieben?" : "Meldung endgültig löschen?";
        if(!confirm(confirmMsg)) return;

        const data = {
            action: type === 'approve' ? "approveMeldung" : "rejectMeldung",
            target: document.getElementById("mTarget").value,
            alli: document.getElementById("mAlli").value,
            verstoss: document.getElementById("mVerstoss").value,
            punkte: document.getElementById("mPunkte").value,
            map: document.getElementById("mMap").value,
            desc: document.getElementById("mDesc").value,
            melder: document.getElementById("mMelder").value,
            index: activeIndex // Wichtig für das Script zum Finden der Zeile
        };

        try {
            await fetch(API, { method: "POST", body: JSON.stringify(data) });
            alert("Erledigt!");
            closeModal();
            loadQueue();
        } catch(e) { alert("Fehler bei der Verarbeitung"); }
    }

    window.onload = loadQueue;
</script>
</body>
</html>
