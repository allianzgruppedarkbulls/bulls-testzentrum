<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK BULLS - GRUPPENFUNK</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: white; font-family: 'Almendra', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation */
        .funk-nav { display: flex; justify-content: space-between; align-items: center; background: #0c0c0e; border-bottom: 2px solid #ff3131; padding: 10px 20px; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.2); }
        .nav-links { display: flex; gap: 15px; }
        .nav-link-btn { background: #111; border: 1px solid #333; color: #888; font-family: 'Almendra'; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .nav-link-btn:hover { color: #fff; border-color: #ff3131; }
        .nav-link-btn.active { background: #ff3131; color: #000; border-color: #ff3131; font-weight: bold; box-shadow: 0 0 15px rgba(255, 49, 49, 0.4); }
        .logout-btn { background: #ff0000; color: #fff; border: none; padding: 8px 15px; font-family: 'Almendra'; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* Container */
        .chat-container { flex: 1; display: flex; max-width: 1400px; width: 100%; margin: 0 auto; background: rgba(10, 10, 10, 0.95); border-left: 1px solid #222; border-right: 1px solid #222; overflow: hidden; }
        
        /* Linke Spalte: Kanäle & Erstellung */
        .side-bar { width: 320px; background: #0b0b0c; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .action-btn-box { padding: 15px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #1a1a1a; }
        .admin-btn { background: #111; border: 1px solid #ff8c00; color: #ff8c00; padding: 10px; font-family: 'Almendra'; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .admin-btn:hover { background: #ff8c00; color: #000; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: 0.2s; }
        .chat-item:hover { background: #151515; border-left: 3px solid #ff3131; }
        .chat-item.active { background: #1c1515; border-left: 3px solid #ff3131; }
        .chat-item.muted-chan { border-left: 3px solid #555 !important; opacity: 0.6; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; }
        .chat-meta-sub { font-size: 12px; color: #666; font-family: sans-serif; }

        /* Mittlere Spalte: Haupt-Chat */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0c0c0e; border-bottom: 1px solid #222; }
        .dc-link-btn { background: #5865F2; color: white; border: none; padding: 6px 12px; font-family: sans-serif; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .manage-btn { background: #222; border: 1px solid #ff8c00; color: #ff8c00; padding: 6px 12px; font-family: 'Almendra'; font-size: 13px; border-radius: 4px; cursor: pointer; }

        .stream-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .mute-notice { background: rgba(255,0,0,0.2); border: 1px solid red; color: #ff8282; padding: 10px; text-align: center; font-weight: bold; border-radius: 6px; margin-bottom: 10px; font-family: sans-serif; }

        /* Eingabe & Frösche */
        .input-bar { display: flex; gap: 12px; padding: 20px; background: #0c0c0e; border-top: 1px solid #222; align-items: center; position: relative; }
        .input-bar input { flex: 1; background: #151515; border: 1px solid #ff3131; padding: 15px; color: #fff; font-family: sans-serif; font-size: 15px; border-radius: 6px; }
        .frog-trigger-btn { background: #151515; border: 1px solid #ff3131; font-size: 22px; cursor: pointer; padding: 11px; border-radius: 6px; }
        .send-btn { background: #ff8c00; color: #000; border: none; padding: 15px 35px; font-family: 'Almendra'; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        /* Rechte Spalte: Mitglieder-Liste */
        .member-sidebar { width: 220px; background: #0b0b0c; border-left: 1px solid #222; display: flex; flex-direction: column; padding: 15px; }
        .member-title { color: #ff3131; font-size: 16px; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .member-list-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-family: sans-serif; font-size: 14px; }

        /* Modals / Overlays für Erstellung und Bearbeitung */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .dark-modal { background: #111; padding: 25px; width: 450px; max-width: 90vw; border: 2px solid #ff3131; border-radius: 8px; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .dark-modal h2 { margin-top: 0; color: #ff3131; }
        .dark-modal input, .dark-modal select { width: 100%; padding: 10px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: sans-serif; box-sizing: border-box; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-family: sans-serif; font-size: 14px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border: none; font-family: 'Almendra'; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 4px; }

        /* Nachrichten-Design */
        .msg-line { display: flex; flex-direction: column; background: #111; border-left: 3px solid #ff3131; padding: 10px 15px; border-radius: 0 6px 6px 0; max-width: 85%; align-self: flex-start; }
        .msg-line.me { border-left: none; border-right: 3px solid #39d353; border-radius: 6px 0 0 6px; background: #161a16; align-self: flex-end; }
        .msg-meta { font-size: 13px; margin-bottom: 4px; display: flex; gap: 10px; }
        .meta-user { color: #ff3131; font-weight: bold; }
        .msg-line.me .meta-user { color: #39d353; }
        .meta-time { color: #666; }
        .msg-text { font-family: sans-serif; font-size: 15px; line-height: 1.4; color: #eee; word-break: break-word; }
        .msg-text img.chat-pepe { max-width: 40px; max-height: 40px; display: inline-block; vertical-align: middle; }

        /* Frosch Box */
        .frog-box { position: absolute; bottom: 85px; right: 20px; width: 360px; height: 340px; background: #0f0f11; border: 2px solid #39d353; border-radius: 8px; display: none; flex-direction: column; box-shadow: 0 0 25px rgba(57, 211, 83, 0.4); z-index: 2000; }
        .frog-header { background: #161a16; padding: 8px 12px; font-weight: bold; color: #39d353; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .frog-tabs { display: flex; background: #111; border-bottom: 1px solid #222; }
        .frog-tab-btn { flex: 1; padding: 8px 5px; font-family: 'Almendra'; font-size: 13px; background: none; border: none; color: #666; cursor: pointer; text-align: center; }
        .frog-tab-btn.active { color: #39d353; border-bottom: 2px solid #39d353; background: #161a16; font-weight: bold; }
        .frog-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; overflow-y: auto; }
        .frog-item { cursor: pointer; border: 1px solid #222; padding: 5px; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #151515; height: 55px; }
        .frog-item img { width: 35px; height: 35px; object-fit: contain; }
    </style>
</head>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIXKlIvApuZH1po2w1Hjzc03v8IhMiVnE40h6BRTuXbaWPHj1n0DwtO6DKVJo6-fCYxQ/exec'; 
        const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
        const GID_USERS = '1188820112';
        const GID_CHAT = '274206006';

        let myName = localStorage.getItem('bulls_user') || "TestUser";
        let myRole = "Gast"; 
        let users = [];
        let allChatData = [];
        let currentFrogTab = 'classic';
        
        // Lokale simulierte Datenbank für deine dynamischen Räume (wird im Echtbetrieb via localStorage oder erweiterter Tabelle gehalten)
        let channelsDatabase = JSON.parse(localStorage.getItem('bulls_dynamic_channels')) || [
            { id: "ALLIANZ-CHAT", name: "Allianz-Chat Hauptfunk", creator: "System", dc: "", access: "allBulls", members: [], imagesAllowed: true, status: "active", isMuted: false }
        ];

        let currentChannelId = "";

        const FROG_DATABASE = {
            classic: [
                { code: "[pepeFrog]", url: "https://openmoji.org/data/color/svg/1F438.svg" },
                { code: "[pepeEZ]", url: "https://openmoji.org/data/color/svg/1F60E.svg" },
                { code: "[pepeSmile]", url: "https://openmoji.org/data/color/svg/1F642.svg" },
                { code: "[pepeWink]", url: "https://openmoji.org/data/color/svg/1F609.svg" }
            ],
            hype: [
                { code: "[pepeFire]", url: "https://openmoji.org/data/color/svg/1F525.svg" },
                { code: "[pepeRocket]", url: "https://openmoji.org/data/color/svg/1F680.svg" },
                { code: "[pepeFlex]", url: "https://openmoji.org/data/color/svg/1F4AA.svg" },
                { code: "[pepeParty]", url: "https://openmoji.org/data/color/svg/1F973.svg" }
            ],
            sad: [
                { code: "[pepeJail]", url: "https://openmoji.org/data/color/svg/1F6A8.svg" },
                { code: "[pepeSad]", url: "https://openmoji.org/data/color/svg/1F343.svg" },
                { code: "[pepeClown]", url: "https://openmoji.org/data/color/svg/1F0CF.svg" },
                { code: "[pepeWarning]", url: "https://openmoji.org/data/color/svg/26A0.svg" }
            ]
        };

        window.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("userDisplay").innerText = `🔑 Funker: ${myName}`;
            buildFrogMenu();
            
            // Enter-Taste fängt Senden ab
            document.getElementById("groupMessageInput").addEventListener("keydown", function(e) {
                if (e.key === "Enter") { e.preventDefault(); sendGroupMessage(); }
            });

            await loadUserData();
            await loadChatHistory();
            
            setInterval(loadChatHistory, 4000);
            setInterval(loadUserData, 10000);
        });

        // BENUTZER- UND ROLLENDATEN LADEN
        async function loadUserData() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}&t=${new Date().getTime()}`);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                users = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cl = (s) => s ? s.replace(/["']/g, "").trim() : "";
                    return { name: cl(c[0]), pin: cl(c[2]), role: cl(c[3]), lastActive: cl(c[4]) };
                });
                
                let me = users.find(u => u.name.toLowerCase() === myName.toLowerCase());
                if(me) {
                    myRole = me.role;
                    document.getElementById("userDisplay").innerText = `🔑 Funker: ${me.name} (${me.role})`;
                }
                renderChannelList();
            } catch(e) { console.error("User-Update fehlgeschlagen"); }
        }

        // CHATVERLAUF LADEN
        async function loadChatHistory() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_CHAT}&t=${new Date().getTime()}`);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                allChatData = rows.map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim()));
                
                renderStream();
            } catch(e) { console.error("Chat-Update fehlgeschlagen"); }
        }

       // KANALLISTE LINKS RENDERN (MIT DRAG & DROP SORTIERUNG)
function renderChannelList() {
    const listEl = document.getElementById("groupChannelList");
    listEl.innerHTML = "";

    channelsDatabase.forEach((chan, index) => {
        // Zugriffsberechtigungs-Logik
        let hasAccess = false;
        if (myRole === "Admin" || chan.creator === myName) {
            hasAccess = true;
        } else if (chan.access === "allPlayers") {
            hasAccess = true;
        } else if (chan.access === "allBulls" && myRole !== "Gast") {
            hasAccess = true;
        } else if (chan.access === "select" && chan.members.includes(myName)) {
            hasAccess = true;
        }

        if (!hasAccess) return;

        let isActive = currentChannelId === chan.id ? "active" : "";
        let isMutedStyle = chan.isMuted ? "muted-chan" : "";
        let labelSub = chan.status === "archived" ? "🔒 Archiviert" : (chan.isMuted ? "🤐 FUNKSTILLE" : "📡 Aktiv");

        // Erstelle das Element als Drag-Objekt (Neu mit draggable, index und dem ☰ Griff)
        let itemHtml = `
            <div class="chat-item ${isActive} ${isMutedStyle}" 
                 draggable="true" 
                 data-index="${index}"
                 onclick="selectChannel('${chan.id}')"
                 style="cursor: grab;">
                <div class="chat-name-row" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>☰ ⚔️ ${chan.name}</span>
                </div>
                <div class="chat-meta-sub">${labelSub}</div>
            </div>`;
            
        listEl.insertAdjacentHTML('beforeend', itemHtml);
    });

    // Drag & Drop Event-Listener aktivieren
    addDragAndDropListeners();
}

// DRAG & DROP LOGIK WIE IN DISCORD
function addDragAndDropListeners() {
    const items = document.querySelectorAll('#groupChannelList .chat-item');
    let dragSrcEl = null;

    items.forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrcEl = this;
            this.style.opacity = '0.4';
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        });

        item.addEventListener('dragover', function(e) {
            if (e.preventDefault) { e.preventDefault(); }
            return false;
        });

        item.addEventListener('dragenter', function() {
            this.style.borderTop = '2px solid #ff8c00'; // Orangefarbene Linie zeigt an, wo der Kanal landet
        });

        item.addEventListener('dragleave', function() {
            this.style.borderTop = 'none';
        });

        item.addEventListener('drop', function(e) {
            if (e.stopPropagation) { e.stopPropagation(); }
            
            if (dragSrcEl !== this) {
                let fromIndex = parseInt(dragSrcEl.getAttribute('data-index'));
                let toIndex = parseInt(this.getAttribute('data-index'));
                
                // Array-Element im Speicher an die neue Position schieben
                const targetChannel = channelsDatabase.splice(fromIndex, 1)[0];
                channelsDatabase.splice(toIndex, 0, targetChannel);
                
                // Neue Reihenfolge im LocalStorage sichern
                localStorage.setItem('bulls_dynamic_channels', JSON.stringify(channelsDatabase));
                
                // Liste sofort neu zeichnen
                renderChannelList();
            }
            return false;
        });

        item.addEventListener('dragend', function() {
            this.style.opacity = '1';
            items.forEach(i => i.style.borderTop = 'none');
        });
    });
}

        // KANAL AUSWÄHLEN
        function selectChannel(id) {
            currentChannelId = id;
            let chan = channelsDatabase.find(c => c.id === id);
            if(!chan) return;

            document.getElementById("activeChannelLabel").innerText = `Trupp: ${chan.name}`;
            
            // Discord Button
            const dcBtn = document.getElementById("discordLinkBtn");
            if(chan.dc) { dcBtn.href = chan.dc; dcBtn.style.display = "inline-block"; } else { dcBtn.style.display = "none"; }

            // Verwalten Button (Nur für Ersteller oder Admins)
            const manageBtn = document.getElementById("manageChannelBtn");
            if(chan.creator === myName || myRole === "Admin") { manageBtn.style.display = "inline-block"; } else { manageBtn.style.display = "none"; }

            // Mute / Archiv Status prüfen für Inputs
            const inputField = document.getElementById("groupMessageInput");
            const sendBtn = document.getElementById("groupSendBtn");
            const muteNotice = document.getElementById("muteNoticeBox");

            if(chan.status === "archived") {
                inputField.disabled = true; sendBtn.disabled = true;
                inputField.placeholder = "Kanal ist archiviert..."; muteNotice.style.display = "none";
            } else if(chan.isMuted && myRole !== "Admin" && chan.creator !== myName) {
                inputField.disabled = true; sendBtn.disabled = true;
                inputField.placeholder = "Funkstille aktiv..."; muteNotice.style.display = "block";
            } else {
                inputField.disabled = false; sendBtn.disabled = false;
                inputField.placeholder = "Funkspruch absenden..."; muteNotice.style.display = "none";
            }

            renderStream();
            renderMembers();
            renderChannelList();
        }

        // NACHRICHTEN STREAM LINKS EFFEKTIV ANZEIGEN
        function renderStream() {
            if(!currentChannelId) return;
            const stream = document.getElementById("groupStreamArea");
            let chan = channelsDatabase.find(c => c.id === currentChannelId);

            let html = "";
            allChatData.forEach(c => {
                if(c[2] === currentChannelId) {
                    let isMe = c[1] === myName ? "me" : "";
                    // Prüfen ob Bilder/Frösche im Kanal verboten sind
                    let processedMsg = (chan && !chan.imagesAllowed) ? cleanFrogCodes(c[3]) : parseFrogEmojis(c[3]);
                    let timeDisplay = c[0] ? c[0].split(" ")[1] || "" : "";

                    html += `
                        <div class="msg-line ${isMe}">
                            <div class="msg-meta"><span class="meta-user">${c[1]}</span><span class="meta-time">${timeDisplay}</span></div>
                            <div class="msg-text">${processedMsg}</div>
                        </div>`;
                }
            });

            if(html) { stream.innerHTML = html; stream.scrollTop = stream.scrollHeight; } 
            else { stream.innerHTML = `<div style="text-align:center; color:#666; padding-top:50px;">Bisher keine Funksprüche auf diesem Kanal. 📡</div>`; }
        }

        // RECHTE SPALTE MITGLIEDER ANZEIGEN
        function renderMembers() {
            const box = document.getElementById("channelMemberBox");
            box.innerHTML = "";
            let chan = channelsDatabase.find(c => c.id === currentChannelId);
            if(!chan) return;

            let displayedUsers = [];
            if(chan.access === "allPlayers") { displayedUsers = users; } 
            else if(chan.access === "allBulls") { displayedUsers = users.filter(u => u.role !== "Gast"); } 
            else { displayedUsers = users.filter(u => chan.members.includes(u.name) || u.role === "Admin" || u.name === chan.creator); }

            displayedUsers.forEach(u => {
                let lastDate = new Date(u.lastActive);
                let isOnline = (new Date() - lastDate) < 300000;
                box.innerHTML += `<div><span style="display:inline-block; width:6px; height:6px; background:${isOnline ? '#39d353':'#444'}; border-radius:50%; margin-right:6px;"></span>${u.name} <small style="color:#555">(${u.role})</small></div>`;
            });
        }

       // SENDE FUNKTION AN GOOGLE-BACKEND & DISCORD VIA WEBHOOK
async function sendGroupMessage() {
    const input = document.getElementById("groupMessageInput");
    const msg = input.value.trim();
    if(!msg || !currentChannelId) return;

    // Lokales schnelles Feedback im Browser-Chat
    const stream = document.getElementById("groupStreamArea");
    let chan = channelsDatabase.find(c => c.id === currentChannelId);
    let processedMsg = (chan && !chan.imagesAllowed) ? cleanFrogCodes(msg) : parseFrogEmojis(msg);

    stream.innerHTML += `
        <div class="msg-line me">
            <div class="msg-meta"><span class="meta-user">${myName}</span><span class="meta-time">gesendet...</span></div>
            <div class="msg-text">${processedMsg}</div>
        </div>`;
    stream.scrollTop = stream.scrollHeight;
    input.value = "";

    // 1. Abfahrt zum Google-Sheet Backend
    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "sendChat", absender: myName, kanalID: currentChannelId, nachricht: msg })
        });
    } catch(e) { console.error("Google-Upload Error"); }

    // 2. ABFAHRT ZU DISCORD (Wenn ein gültiger Webhook-Link im Feld steht)
    if (chan && chan.dc && (chan.dc.includes("discord.com/api/webhooks") || chan.dc.includes("discordapp.com/api/webhooks"))) {
        try {
            await fetch(chan.dc, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: `${myName} (Bulls Funk)`,
                    avatar_url: "https://openmoji.org/data/color/svg/1F438.svg", // Frosch als Avatar bei Discord
                    content: msg
                })
            });
        } catch(e) { console.error("Discord-Webhook Error. Link evtl. kein echter Webhook?"); }
    }

    loadChatHistory();
}

        // MODAL LOGIKEN & KANAL ERSTELLUNG
        function openCreateModal() {
            document.getElementById("createModal").style.display = "flex";
            const zone = document.getElementById("playerSelectionZone");
            zone.innerHTML = "";
            users.forEach(u => {
                if(u.name !== myName) {
                    zone.innerHTML += `<div class="checkbox-row"><input type="checkbox" name="selectedPlayers" value="${u.name}"> <label>${u.name}</label></div>`;
                }
            });
        }

        function toggleAccessSelection() {
            const select = document.getElementById("newChanAccess").value;
            document.getElementById("playerSelectionZone").style.display = select === "select" ? "block" : "none";
        }

        function submitCreateChannel() {
            let name = document.getElementById("newChanName").value.trim();
            let dc = document.getElementById("newChanDC").value.trim();
            let access = document.getElementById("newChanAccess").value;
            let imgAllowed = document.getElementById("newChanImages").checked;
            
            if(!name) return alert("Bitte Namen eingeben!");

            let selectedMembers = [];
            if(access === "select") {
                document.querySelectorAll('input[name="selectedPlayers"]:checked').forEach(cb => selectedMembers.push(cb.value));
            }

            let id = "GROUP-" + name.toUpperCase().replace(/\s+/g, "_") + "-" + Math.floor(Math.random()*1000);

            let newChan = { id: id, name: name, creator: myName, dc: dc, access: access, members: selectedMembers, imagesAllowed: imgAllowed, status: "active", isMuted: false };
            channelsDatabase.push(newChan);
            saveChannelsLocal();

            closeModal('createModal');
            selectChannel(id);
        }

        // BEARBEITEN LOGIK (MUTTE, ARCHIV, LÖSCHEN)
        function openEditModal() {
            let chan = channelsDatabase.find(c => c.id === currentChannelId);
            if(!chan) return;
            document.getElementById("editChanDC").value = chan.dc;
            document.getElementById("editChanStatus").value = chan.status;
            document.getElementById("editChanMute").checked = chan.isMuted;
            document.getElementById("editModal").style.display = "flex";
        }

        function submitEditChannel() {
            let chan = channelsDatabase.find(c => c.id === currentChannelId);
            if(!chan) return;
            chan.dc = document.getElementById("editChanDC").value.trim();
            chan.status = document.getElementById("editChanStatus").value;
            chan.isMuted = document.getElementById("editChanMute").checked;
            
            saveChannelsLocal();
            closeModal('editModal');
            selectChannel(currentChannelId);
        }

        function archiveChannelShortcut() {
            let chan = channelsDatabase.find(c => c.id === currentChannelId);
            if(chan) { chan.status = "archived"; saveChannelsLocal(); closeModal('editModal'); selectChannel(currentChannelId); }
        }

        function deleteChannelShortcut() {
            if(confirm("Kanal endgültig vernichten?")) {
                channelsDatabase = channelsDatabase.filter(c => c.id !== currentChannelId);
                saveChannelsLocal();
                closeModal('editModal');
                currentChannelId = "";
                location.reload();
            }
        }

        function saveChannelsLocal() { localStorage.setItem('bulls_dynamic_channels', JSON.stringify(channelsDatabase)); renderChannelList(); }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

      // FROSCH FUNKTIONEN
        function buildFrogMenu() {
            const grid = document.getElementById("frogGrid"); if (!grid) return; grid.innerHTML = "";
            FROG_DATABASE[currentFrogTab].forEach(frog => {
                let div = document.createElement("div"); div.className = "frog-item";
                div.onclick = () => { document.getElementById("groupMessageInput").value += " " + frog.code + " "; toggleFrogBox(); document.getElementById("groupMessageInput").focus(); };
                div.innerHTML = `<img src="${frog.url}">`; grid.appendChild(div);
            });
        }
        function switchFrogTab(t) { currentFrogTab = t; document.querySelectorAll('.frog-tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); buildFrogMenu(); }
        function toggleFrogBox() { const b = document.getElementById("frogBox"); b.style.display = b.style.display === "flex" ? "none" : "flex"; }
        
        function parseFrogEmojis(t) { 
            if(!t) return ""; 
            let ct = t; 
            // Hier auch direkt Bild-Links automatisch als HTML-Bild konvertieren
            const urlRegex = /(https?:\/\/[^\s]+?\.(?:jpg|png|gif|jpeg))/gi;
            ct = ct.replace(urlRegex, '<img src="$1" style="max-width:200px; border-radius:8px; display:block; margin:5px 0;">');
            
            Object.values(FROG_DATABASE).flat().forEach(f => { ct = ct.replace(new RegExp(f.code.replace('[','\\[').replace(']','\\]'), 'g'), `<img class="chat-pepe" src="${f.url}">`); }); 
            return ct; 
        }

        function cleanFrogCodes(t) { if(!t) return ""; let ct = t; Object.values(FROG_DATABASE).flat().forEach(f => { ct = ct.replace(new RegExp(f.code.replace('[','\\[').replace(']','\\]'), 'g'), ""); }); return ct; }

        // BÜROKLAMMER-UPLOAD FUNKTION
        async function uploadToImageHost(input) {
            const file = input.files[0];
            if (!file) return;

            const inputField = document.getElementById('groupMessageInput');
            const originalText = inputField.value;
            inputField.value = "Bild wird hochgeladen...";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=ef635a5c19211b235d25056e97c5192b', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    inputField.value = originalText + " " + data.data.url + " ";
                } else {
                    alert("Upload fehlgeschlagen!");
                    inputField.value = originalText;
                }
            } catch (e) {
                alert("Fehler bei der Verbindung zum Bild-Server.");
                inputField.value = originalText;
            }
        }
    </script>
