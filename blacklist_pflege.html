<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PFLEGE - DARK BULLS BLACK LISTE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; }
        .container { width: 1000px; margin: auto; background-color: #0f0f0f; border: 1px solid #444; border-radius: 10px; padding: 25px; }
        
        h1 { color: #ff3131; text-align: center; text-transform: uppercase; margin-top: 0; }
        
        /* Tabelle für die Liste */
        .list-section { margin-bottom: 40px; border: 1px solid #333; border-radius: 5px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: #000; }
        th { background: #111; color: #5dade2; padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        tr:hover td { background: #1a1a1a; color: #ff3131; }

        /* Maske (Detail-Ansicht) */
        #editMask { display: none; border-top: 2px solid #ff3131; padding-top: 20px; }
        .section-title { color: #5dade2; font-style: italic; border-bottom: 1px solid #5dade2; margin: 20px 0 15px 0; font-size: 20px; }
        
        .info-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        .field label { font-weight: bold; color: #f1c40f; margin-bottom: 5px; }
        
        input, select, textarea { background: #000; border: 1px solid #555; color: #39d353; font-family: 'Almendra'; font-size: 16px; padding: 8px; border-radius: 4px; }
        textarea { width: 100%; height: 100px; resize: none; }

        .btn-row { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; text-transform: uppercase; border: none; }
        .btn-approve { background: #39d353; color: #000; }
        .btn-delete { background: #ff3131; color: #fff; }
        .btn-contact { background: #f1c40f; color: #000; }
        .btn-back { background: #555; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Blacklist Warteschlange</h1>

    <div class="list-section">
        <table>
            <thead>
                <tr>
                    <th>Gegner (ID | Name)</th>
                    <th>Verstoß</th>
                    <th>Melder</th>
                    <th>Datum</th>
                </tr>
            </thead>
            <tbody id="queueBody">
                <tr><td colspan="4" style="text-align:center;">Lade Meldungen...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="editMask">
        <div class="section-title">Eintrag bearbeiten & freigeben</div>
        <div class="info-grid">
            <div class="field"><label>Spielername ID | Name</label><input type="text" id="mTarget"></div>
            <div class="field"><label>Allianz</label><input type="text" id="mAlli"></div>
            <div class="field"><label>Punktestand</label><input type="text" id="mPunkte"></div>
            <div class="field"><label>Map</label><input type="text" id="mMap"></div>
            <div class="field"><label>Verstoß</label><input type="text" id="mVerstoss"></div>
            <div class="field"><label>Beweise?</label><input type="text" id="mBeweise"></div>
        </div>

        <label style="color:#f1c40f; font-weight:bold;">Beschreibung:</label>
        <textarea id="mDesc"></textarea>

        <div class="info-grid" style="margin-top:15px;">
            <div class="field"><label>Melder</label><input type="text" id="mMelder" readonly></div>
            <div class="field"><label>Zeugen</label><input type="text" id="mZeugen"></div>
        </div>

        <div class="btn-row">
            <button class="btn btn-approve" onclick="action('approveMeldung')">In Blacklist eintragen</button>
            <button class="btn btn-contact" onclick="contactMelder()">Melder kontaktieren</button>
            <button class="btn btn-delete" onclick="action('rejectMeldung')">Löschen</button>
            <button class="btn btn-back" onclick="location.reload()">Abbrechen</button>
        </div>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let selectedMeldung = null;

    async function loadQueue() {
        const res = await fetch(API + "?action=listMeldungen");
        const data = await res.json();
        const tbody = document.getElementById("queueBody");
        tbody.innerHTML = "";
        
        if(data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Keine neuen Meldungen vorhanden.</td></tr>";
            return;
        }

        data.forEach(m => {
            const tr = document.createElement("tr");
            tr.onclick = () => openEdit(m);
            tr.innerHTML = `<td>${m.target}</td><td>${m.verstoss}</td><td>${m.melder}</td><td>${new Date(m.datum).toLocaleDateString()}</td>`;
            tbody.appendChild(tr);
        });
    }

    function openEdit(m) {
        selectedMeldung = m;
        document.getElementById("editMask").style.display = "block";
        document.getElementById("mTarget").value = m.target;
        document.getElementById("mAlli").value = m.alli || "";
        document.getElementById("mPunkte").value = m.punkte || "";
        document.getElementById("mMap").value = m.map || "";
        document.getElementById("mVerstoss").value = m.verstoss;
        document.getElementById("mBeweise").value = m.beweise || "Ja";
        document.getElementById("mDesc").value = m.desc || m.beschreibung;
        document.getElementById("mMelder").value = m.melder;
        document.getElementById("mZeugen").value = m.zeugen || "";
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function action(act) {
        const confirmMsg = act === 'approveMeldung' ? "Eintrag final in die Blacklist übernehmen?" : "Meldung wirklich löschen?";
        if(!confirm(confirmMsg)) return;

        const payload = {
            action: act,
            target: document.getElementById("mTarget").value,
            alli: document.getElementById("mAlli").value,
            punkte: document.getElementById("mPunkte").value,
            map: document.getElementById("mMap").value,
            verstoss: document.getElementById("mVerstoss").value,
            beweise: document.getElementById("mBeweise").value,
            desc: document.getElementById("mDesc").value,
            zeugen: document.getElementById("mZeugen").value,
            melder: document.getElementById("mMelder").value
        };

        await fetch(API, { method: "POST", body: JSON.stringify(payload) });
        alert("Aktion ausgeführt!");
        location.reload();
    }

    function contactMelder() {
        localStorage.setItem('bulls_messenger_tab', 'PN');
        localStorage.setItem('bulls_messenger_partner', document.getElementById("mMelder").value);
        window.location.href = 'messenger.html';
    }

    window.onload = loadQueue;
</script>
</body>
</html>
