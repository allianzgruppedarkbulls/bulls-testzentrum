<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - SICHERHEITSKOPF</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Almendra', serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* Das rote Leuchten im Hintergrund wurde hier massiv verstärkt */
        .container { 
            width: 480px; 
            background-color: #0f0f0f; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 45px; 
            box-shadow: 0 0 60px 10px rgba(255, 49, 49, 0.3); 
            text-align: center; 
            position: relative; 
        }
        
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 10px rgba(255, 49, 49, 0.5); }
        
        /* Nur noch der Name, kein "Bulle" mehr */
        .user-tag { color: #39d353; font-size: 24px; margin-bottom: 35px; font-weight: bold; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; color: #888; margin-bottom: 8px; font-size: 14px; margin-left: 5px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 16px; background: #000; color: #39d353; 
            border: 1px solid #444; font-family: 'Almendra'; font-size: 20px; 
            text-align: center; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ff3131; box-shadow: 0 0 15px rgba(255, 49, 49, 0.4); }

        .btn-save { 
            width: 100%; padding: 20px; background: #39d353; color: #000; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; 
            font-size: 22px; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
            box-shadow: 0 4px 15px rgba(57, 211, 83, 0.3);
        }
        .btn-save:hover { background: #fff; color: #000; transform: scale(1.02); }

        /* Erfolgsmeldung ohne den störenden Kasten */
        #successBox { 
            display: none; background: #0f0f0f; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; border-radius: 15px; flex-direction: column; 
            justify-content: center; align-items: center; padding: 40px; box-sizing: border-box; z-index: 10;
        }
        .success-icon { font-size: 80px; color: #39d353; margin-bottom: 25px; text-shadow: 0 0 20px rgba(57, 211, 83, 0.5); }
        .success-text { color: #39d353; font-size: 28px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        
        /* Viel Platz für den Text, kein Rahmen mehr */
        .success-info { color: #eeeeee; font-size: 18px; line-height: 1.6; margin-bottom: 35px; }
        
        .btn-back { display: block; margin-top: 35px; color: #666; text-decoration: none; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="formContent">
        <h1>PIN-ZENTRALE</h1>
        <div class="user-tag" id="displayUser">...</div>
        
        <div class="input-group">
            <label>Aktuelle Verifizierung</label>
            <input type="password" id="oldPin" placeholder="ALTE PIN">
        </div>

        <div style="height: 1px; background: #333; margin: 30px 0;"></div>

        <div class="input-group">
            <label>Neue Identifikation</label>
            <input type="password" id="newPin1" placeholder="NEUE PIN">
        </div>

        <div class="input-group">
            <label>Bestätigung</label>
            <input type="password" id="newPin2" placeholder="PIN WIEDERHOLEN">
        </div>
        
        <button class="btn-save" id="saveBtn" onclick="changePin()">DATEN AKTUALISIEREN</button>
        <a href="dashboard.html" class="btn-back">ZURÜCK ZUM HAUPTMENÜ</a>
    </div>

    <div id="successBox">
        <div class="success-icon">✓</div>
        <div class="success-text">SYSTEM AKTUALISIERT</div>
        <div class="success-info">
            Hallo <span id="finalUser" style="color:#39d353; font-weight: bold;"></span>, deine neue PIN wurde sicher im Panzer-System verschlüsselt.<br><br>
            Gehe sorgfältig mit deinen Daten um und gib sie niemals an Dritte weiter. Sicherheit ist unser höchstes Gebot!
        </div>
        <button class="btn-save" onclick="window.location.href='dashboard.html'">VERSTANDEN</button>
    </div>
</div>

<script>
    const myName = localStorage.getItem('bulls_user');
    if (!myName) { 
        window.location.href = 'index.html'; 
    } else { 
        document.getElementById('displayUser').innerText = myName; 
        document.getElementById('finalUser').innerText = myName;
    }

    async function changePin() {
        const oldP = document.getElementById('oldPin').value;
        const n1 = document.getElementById('newPin1').value;
        const n2 = document.getElementById('newPin2').value;
        const btn = document.getElementById('saveBtn');

        if (!oldP || !n1 || n1.length < 4) { 
            alert("SYSTEM-FEHLER: Felder unvollständig!"); 
            return; 
        }
        if (n1 !== n2) { 
            alert("SYSTEM-FEHLER: PIN-Abgleich fehlgeschlagen!"); 
            return; 
        }

        btn.innerText = "SYNCHRONISIERE...";
        btn.disabled = true;

        try {
            const response = await fetch(window.BULLS_CONFIG.SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "updatePin",
                    playerName: myName,
                    oldPin: oldP,
                    newPin: n1
                })
            });
            const result = await response.json();
            
            if (result.ok) {
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('successBox').style.display = 'flex';
            } else {
                alert("ABBRUCH: " + result.error);
                btn.innerText = "DATEN AKTUALISIEREN";
                btn.disabled = false;
            }
        } catch (e) { 
            alert("FUNKSTÖRUNG: Server nicht erreichbar!"); 
            btn.innerText = "DATEN AKTUALISIEREN";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
