<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - PIN ÄNDERN</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 400px; background-color: #0f0f0f; border: 2px solid #333; border-radius: 12px; padding: 30px; box-shadow: 0 0 30px rgba(255, 49, 49, 0.2); text-align: center; }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        p { color: #39d353; font-size: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; text-align: center; border-radius: 5px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #39d353; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; text-transform: uppercase; }
        .btn-back { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 16px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>PIN ÄNDERN</h1>
    <p>Benutzer: <span id="displayUser" style="color:#fff;">...</span></p>
    
    <div id="inputArea">
        <input type="password" id="oldPin" placeholder="Alte PIN eingeben">
        <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 15px;">
        <input type="password" id="newPin1" placeholder="Neue PIN">
        <input type="password" id="newPin2" placeholder="PIN wiederholen">
        <button class="btn-save" onclick="changePin()">SPEICHERN</button>
    </div>

    <a href="dashboard.html" class="btn-back">Zurück zum Hauptmenü</a>
</div>

<script>
    const myName = localStorage.getItem('bulls_user');
    if (!myName) { 
        window.location.href = 'index.html'; 
    } else { 
        document.getElementById('displayUser').innerText = myName; 
    }

    async function changePin() {
        const oldP = document.getElementById('oldPin').value;
        const n1 = document.getElementById('newPin1').value;
        const n2 = document.getElementById('newPin2').value;

        if (!oldP || !n1 || n1.length < 4) { 
            alert("Bitte alle Felder ausfüllen (Mindestens 4 Zeichen)!"); 
            return; 
        }
        if (n1 !== n2) { 
            alert("Die neuen PINs stimmen nicht überein!"); 
            return; 
        }

        const btn = document.querySelector('.btn-save');
        btn.innerText = "VERARBEITE...";
        btn.disabled = true;

        try {
            const response = await fetch(window.BULLS_CONFIG.SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "updatePin",
                    playerName: myName,
                    oldPin: oldP,
                    newPin: n1
                })
            });
            const result = await response.json();
            
            if (result.ok) {
                alert("✓ PIN erfolgreich geändert!");
                window.location.href = 'dashboard.html';
            } else {
                alert("❌ Fehler: " + result.error);
                btn.innerText = "SPEICHERN";
                btn.disabled = false;
            }
        } catch (e) { 
            alert("❌ Verbindungsfehler zum Server!"); 
            btn.innerText = "SPEICHERN";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
