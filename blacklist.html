<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS BLACK LISTE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 950px; background-color: #0f0f0f; border: 1px solid #333; border-radius: 10px; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        h1 { color: #ff3131; text-align: center; font-size: 42px; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        
        /* Suchzeile */
        .search-bar { display: flex; align-items: center; gap: 15px; background: #000; padding: 10px 20px; border-radius: 5px; margin-bottom: 30px; border: 1px solid #444; }
        .search-bar label { font-size: 20px; white-space: nowrap; }
        .search-bar select { flex: 1; background: transparent; border: none; color: #39d353; font-family: 'Almendra'; font-size: 18px; outline: none; cursor: pointer; }
        .btn-load { background: #39d353; color: #000; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; }

        /* Sektionen */
        .section-title { color: #5dade2; font-style: italic; border-bottom: 1px solid #5dade2; margin: 20px 0 15px 0; font-size: 22px; padding-bottom: 5px; }
        
        .info-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-weight: bold; font-size: 18px; margin-bottom: 2px; }
        .field span { color: #39d353; font-size: 18px; min-height: 22px; }

        /* Beschreibungsfeld */
        .desc-label { color: #f1c40f; font-weight: bold; font-size: 20px; margin-bottom: 10px; display: block; }
        .desc-box { background: #000; border: 1px solid #333; padding: 20px; min-height: 120px; border-radius: 5px; color: #39d353; font-size: 19px; line-height: 1.4; margin-bottom: 25px; }

        /* Zeugen Grid */
        .witness-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 10px; }
        .witness-col { display: flex; flex-direction: column; gap: 5px; }

        .btn-back { display: block; width: 200px; margin: 30px auto 0; background: #f1c40f; color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>DARK BULLS BLACK LISTE</h1>

    <div class="search-bar">
        <label>Spieler auswählen</label>
        <select id="blDropdown">
            <option value="">Wähle einen Eintrag...</option>
        </select>
        <button class="btn-load" onclick="loadEntry()">Spieler Laden</button>
    </div>

    <div class="section-title">Spielerdaten vom gemeldeten Spieler</div>
    <div class="info-grid">
        <div class="field"><label>Spielername ID</label><span id="outID"></span></div>
        <div class="field"><label>Spielername</label><span id="outName"></span></div>
        <div class="field"><label>Spieler angemeldet am</label><span id="outJoin"></span></div>
        
        <div class="field"><label>Allianz bei Erstkontakt</label><span id="outAlli"></span></div>
        <div class="field"><label>Punktestand</label><span id="outPunkte"></span></div>
        <div class="field"><label>Meistgespielte Map</label><span id="outMap"></span></div>
        
        <div class="field"><label>Verstoß</label><span id="outVerstoss" style="color: #ff3131;"></span></div>
        <div class="field"></div> <div class="field"><label>Beweise vorhanden?</label><span id="outBeweise"></span></div>
        
        <div class="field"><label>Fallnummer</label><span id="outFallNr"></span></div>
        <div class="field"></div> <div class="field"><label>Datum der Meldung</label><span id="outDatum"></span></div>
    </div>

    <label class="desc-label">Was ist passiert / Beschreibung:</label>
    <div class="desc-box" id="outDesc"></div>

    <div class="section-title">Spielerdaten von Zeugen</div>
    <div class="witness-grid">
        <div class="field"><label>Melder</label><span id="outMelder"></span></div>
        <div class="witness-col">
            <div class="field"><label>Zeuge 1</label><span id="outZ1"></span></div>
            <div class="field"><label>Zeuge 2</label><span id="outZ2"></span></div>
        </div>
        <div class="witness-col">
            <div class="field"><label>Zeuge 3</label><span id="outZ3"></span></div>
            <div class="field"><label>Zeuge 4</label><span id="outZ4"></span></div>
        </div>
    </div>

    <button class="btn-back" onclick="window.location.href='dashboard.html'">Zurück</button>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let blacklistData = [];

    async function init() {
        try {
            const res = await fetch(API + "?action=getBlacklistData");
            blacklistData = await res.json();
            const drop = document.getElementById("blDropdown");
            blacklistData.forEach((item, i) => {
                const opt = document.createElement("option");
                opt.value = i;
                opt.innerText = item.target; // Hier kannst du auch ID | Name anzeigen
                drop.appendChild(opt);
            });
        } catch(e) { console.error("Ladefehler:", e); }
    }

    function loadEntry() {
        const idx = document.getElementById("blDropdown").value;
        if(idx === "") return;
        
        const d = blacklistData[idx];
        
        // Zuordnung der Datenfelder
        document.getElementById("outID").innerText = d.target.split('|')[0] || d.target;
        document.getElementById("outName").innerText = d.target.split('|')[1] || "";
        document.getElementById("outJoin").innerText = d.joinDate || "Unbekannt";
        document.getElementById("outAlli").innerText = d.alli || "Unbekannt";
        document.getElementById("outPunkte").innerText = d.punkte || "0";
        document.getElementById("outMap").innerText = d.map || "Unbekannt";
        document.getElementById("outVerstoss").innerText = d.verstoss;
        document.getElementById("outBeweise").innerText = d.beweise || "Nein";
        document.getElementById("outFallNr").innerText = d.fallNr;
        document.getElementById("outDatum").innerText = new Date(d.datum).toLocaleDateString();
        document.getElementById("outDesc").innerText = d.beschreibung;
        document.getElementById("outMelder").innerText = d.melder;
        
        // Zeugen splitten (falls als Komma-Liste gespeichert)
        const z = d.zeugen ? d.zeugen.split(',') : [];
        document.getElementById("outZ1").innerText = z[0] || "";
        document.getElementById("outZ2").innerText = z[1] || "";
        document.getElementById("outZ3").innerText = z[2] || "";
        document.getElementById("outZ4").innerText = z[3] || "";
    }

    window.onload = init;
</script>
</body>
</html>
