<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dark Bulls - Blacklist & Meldung</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3131; --bg: #000; --green: #39d353; --gold: #ffd600; }
        body { background: var(--bg); color: white; font-family: 'Almendra', serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 850px; max-width: 95vw; background: #0a0a0a; border: 2px solid var(--red); border-radius: 15px; padding: 25px; box-shadow: 0 0 30px rgba(255, 49, 49, 0.3); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: #111; color: #888; border: 1px solid #444; padding: 10px 20px; cursor: pointer; font-family: 'Almendra'; border-radius: 5px; }
        .tab-btn.active { background: var(--red); color: white; border-color: var(--red); }

        .view-section { display: none; }
        .view-section.active { display: block; }

        h1 { color: var(--red); text-align: center; text-transform: uppercase; margin: 0 0 20px 0; }
        label { color: var(--red); font-size: 14px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; font-family: 'Almendra'; border-radius: 5px; box-sizing: border-box; margin-bottom: 15px; }
        textarea { height: 100px; color: var(--green); resize: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }

        .btn-send { width: 100%; padding: 15px; background: var(--red); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-family: 'Almendra'; border-radius: 5px; }
        .data-display { padding: 12px; background: #111; border-left: 3px solid var(--red); color: var(--gold); font-size: 18px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dark Bulls Blacklist</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('view')">Spieler Anschauen</button>
        <button class="tab-btn" onclick="switchTab('report')">Spieler Melden</button>
    </div>

    <div id="viewSection" class="view-section active">
        <label>Spieler auswählen</label>
        <select id="blDropdown" onchange="showCase(this.value)">
            <option value="">-- Bitte wählen --</option>
        </select>

        <div id="caseDetails" style="display:none; border-top: 1px solid #333; pt-20">
            <div style="text-align:center; color:var(--gold); font-size:20px; margin-bottom:15px;" id="outFallNr"></div>
            <div class="grid">
                <div><label>Name / ID</label><div class="data-display" id="outTarget"></div></div>
                <div><label>Verstoß</label><div class="data-display" id="outVerstoss"></div></div>
                <div class="full"><label>Beschreibung</label><div class="data-display" id="outDesc" style="color:var(--green); min-height:60px;"></div></div>
                <div><label>Melder</label><div class="data-display" id="outMelder"></div></div>
                <div><label>Datum</label><div class="data-display" id="outDatum"></div></div>
            </div>
        </div>
    </div>

    <div id="reportSection" class="view-section">
        <div class="grid">
            <div class="field"><label>Gegner Name / ID</label><input type="text" id="mTarget"></div>
            <div class="field"><label>Map</label><input type="text" id="mMap"></div>
            <div class="field"><label>Punktestand</label><input type="text" id="mPunkte"></div>
            <div class="field"><label>Verstoß</label>
                <select id="mVerstoss">
                    <option>Spionage</option>
                    <option>Beleidigung</option>
                    <option>Verrat / Leaven</option>
                    <option>Multiaccount</option>
                </select>
            </div>
            <div class="full"><label>Was ist passiert?</label><textarea id="mDesc" placeholder="Beschreibe den Vorfall..."></textarea></div>
            <div class="full"><label>Zeugen</label><input type="text" id="mZeugen" placeholder="Melder + Zeugen"></div>
        </div>
        <button class="btn-send" onclick="submitMeldung()">Meldung an Buchhalter senden</button>
    </div>

    <button class="btn-send" style="background:#333; margin-top:20px;" onclick="window.location.href='dashboard.html'">Zurück</button>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let blacklistData = [];

    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        if(type === 'view') {
            document.getElementById('viewSection').classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            loadBlacklist();
        } else {
            document.getElementById('reportSection').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    async function loadBlacklist() {
        const res = await fetch(API + "?action=getBlacklistData");
        blacklistData = await res.json();
        const drop = document.getElementById("blDropdown");
        drop.innerHTML = '<option value="">-- Bitte wählen --</option>';
        blacklistData.forEach((item, i) => {
            drop.innerHTML += `<option value="${i}">${item.target} (${item.fallNr})</option>`;
        });
    }

    function showCase(i) {
        if(i === "") return document.getElementById("caseDetails").style.display="none";
        const d = blacklistData[i];
        document.getElementById("caseDetails").style.display="block";
        document.getElementById("outFallNr").innerText = d.fallNr;
        document.getElementById("outTarget").innerText = d.target;
        document.getElementById("outVerstoss").innerText = d.verstoss;
        document.getElementById("outDesc").innerText = d.beschreibung;
        document.getElementById("outMelder").innerText = d.melder;
        document.getElementById("outDatum").innerText = new Date(d.datum).toLocaleDateString();
    }

    async function submitMeldung() {
        const data = {
            action: "addMeldung",
            target: document.getElementById("mTarget").value,
            map: document.getElementById("mMap").value,
            punkte: document.getElementById("mPunkte").value,
            verstoss: document.getElementById("mVerstoss").value,
            beschreibung: document.getElementById("mDesc").value,
            zeugen: document.getElementById("mZeugen").value,
            melder: localStorage.getItem("bulls_user")
        };
        await fetch(API, { method: "POST", body: JSON.stringify(data) });
        alert("Meldung gesendet! Der Buchhalter prüft den Fall.");
        window.location.reload();
    }

    window.onload = loadBlacklist;
</script>
</body>
</html>
