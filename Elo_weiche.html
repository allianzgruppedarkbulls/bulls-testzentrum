<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dark Bulls - Allianz Management Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --card-bg: #252525;
            --text-color: #e0e0e0;
            --border-color: #333;
            --highlight: #d4af37;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hub-container {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border-top: 4px solid var(--highlight);
        }

        h1 {
            color: var(--highlight);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .hub-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .hub-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 25px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hub-btn:hover {
            background: var(--highlight);
            color: #000;
            border-color: var(--highlight);
            transform: translateY(-3px);
        }

        .hub-btn span {
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>Dark Bulls Hub</h1>
        <p>Wähle den gewünschten Bereich für das Allianz-Management aus:</p>
        
        <div class="hub-buttons">
            <a href="Elo_rechner.html" class="hub-btn">
                <span>📊</span>
                Rohstoff & ELO Rechner
            </a>
            <a href="Elo_map.html" class="hub-btn">
                <span>🗺️</span>
                Europakarte & Lagebild
            </a>
        </div>
    </div>

</body>
</html>
