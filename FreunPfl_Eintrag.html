<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - DIREKT EINTRAG</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .modal-box { width: 1000px; max-width: 95vw; background-color: #0f0f0f; border: 2px solid #ff3131; border-radius: 12px; padding: 30px; box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 3px; font-size: 32px; text-align: center; }
        .section-title { color: #5dade2; font-size: 18px; font-style: italic; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; text-align: left; }
        label { color: #fff; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 16px; border-radius: 5px; outline: none; }
        textarea { height: 100px; resize: none; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-action { padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; text-transform: uppercase; text-align: center; text-decoration: none; }
        .btn-yellow { background: #ffd600; color: #000; }
        .btn-red { background: #ff3131; color: #000; }
    </style>
</head>
<body>

<div class="modal-box">
    <h1>Direkt-Eintrag Blackliste</h1>
    <form id="directForm" onsubmit="submitDirect(event)">
        <div class="section-title">Spielerdaten vom gemeldeten Spieler</div>
        <div class="grid-3">
            <div class="form-group"><label>Spielername ID</label><input type="text" id="pID"></div>
            <div class="form-group"><label>Spielername</label><input type="text" id="pName" required></div>
            <div class="form-group"><label>Spieler angemeldet am</label><input type="text" id="pJoin"></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Allianz bei Erstkontakt</label><select id="pAlli"><option value="">-- Allianz wählen --</option></select></div>
            <div class="form-group"><label>Punktestand</label><input type="text" id="pPunkte"></div>
            <div class="form-group"><label>Meistgespielte Map</label><select id="pMap"><option value="">-- Map wählen --</option></select></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Verstoß</label><select id="pVerstoss" required><option value="">-- Verstoß wählen --</option></select></div>
            <div class="form-group"><label>Beweise vorhanden?</label><select id="pBeweis"><option value="Ja">Ja</option><option value="Nein">Nein</option></select></div>
            <div class="form-group"><label>Spielnummer</label><input type="text" id="pFall"></div>
        </div>

        <div class="section-title" style="margin-top: 15px;">Was ist passiert / Beschreibung</div>
        <textarea id="pDesc" required></textarea>

        <div class="section-title" style="margin-top: 15px;">Zeugen & Melder</div>
        <div class="grid-3">
            <div class="form-group"><label>Melder</label><select id="pMelder"><option value="Buchhaltung">Buchhaltung</option></select></div>
            <div class="form-group"><label>Zeuge 1</label><select id="pZ1"><option value="">-- Zeuge 1 --</option></select></div>
            <div class="form-group"><label>Zeuge 3</label><select id="pZ3"><option value="">-- Zeuge 3 --</option></select></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Datum der Meldung</label><input type="text" id="pDate"></div>
            <div class="form-group"><label>Zeuge 2</label><select id="pZ2"><option value="">-- Zeuge 2 --</option></select></div>
            <div class="form-group"><label>Zeuge 4</label><select id="pZ4"><option value="">-- Zeuge 4 --</option></select></div>
        </div>

        <div class="button-row">
            <a href="dashboard.html" class="btn-action btn-yellow">ZURÜCK</a>
            <button type="submit" class="btn-action btn-red" id="saveBtn">SPEICHERN</button>
            <a href="Per_Supp.html" class="btn-action btn-yellow">FREUNDES LISTEN SUPPORT</a>
        </div>
    </form>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    async function loadForm() {
        document.getElementById("pDate").value = new Date().toLocaleDateString("de-DE");
        const res = await fetch(API + "?action=getDropdownData");
        const data = await res.json();
        
        const fill = (id, arr) => {
            const el = document.getElementById(id);
            if(arr) arr.forEach(v => { let o = document.createElement("option"); o.value = v; o.innerText = v; el.appendChild(o); });
        };
        fill("pAlli", data.allianzen);
        fill("pVerstoss", data.verstoesse);
        fill("pMap", data.maps);
        const users = data.user ? data.user.map(u => u.name) : [];
        fill("pMelder", users);
        ["pZ1", "pZ2", "pZ3", "pZ4"].forEach(id => fill(id, users));
    }

    async function submitDirect(e) {
        e.preventDefault();
        const btn = document.getElementById("saveBtn");
        btn.innerText = "SPEICHERE..."; btn.disabled = true;

        const payload = {
            action: "submitDirectEntry",
            targetID: document.getElementById("pID").value,
            targetUser: document.getElementById("pName").value,
            regDate: document.getElementById("pJoin").value,
            targetAlli: document.getElementById("pAlli").value,
            playerPoints: document.getElementById("pPunkte").value,
            playerMap: document.getElementById("pMap").value,
            reason: document.getElementById("pVerstoss").value,
            proof: document.getElementById("pBeweis").value,
            gameNumber: document.getElementById("pFall").value,
            description: document.getElementById("pDesc").value,
            reporter: document.getElementById("pMelder").value,
            reportDate: document.getElementById("pDate").value,
            witness1: document.getElementById("pZ1").value,
            witness2: document.getElementById("pZ2").value,
            witness3: document.getElementById("pZ3").value,
            witness4: document.getElementById("pZ4").value
        };

        await fetch(API, { method: "POST", body: JSON.stringify(payload) });
        alert("Direkt-Eintrag in die Blackliste erfolgreich!");
        window.location.href = "dashboard.html";
    }
    window.onload = loadForm;
</script>
</body>
</html>
