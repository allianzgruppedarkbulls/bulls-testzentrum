<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - BLACKLIST PFLEGE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 900px; background-color: #0f0f0f; border: 1px solid #444; border-radius: 10px; padding: 30px; }
        h1 { color: #39d353; text-align: center; }
        .search-area { background: #1a1a1a; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        select, input { width: 100%; background: #000; color: #39d353; border: 1px solid #444; padding: 10px; }
        .btn-update { width: 100%; padding: 15px; background: #39d353; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #historie-liste { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h1>Blacklist Pflege (9-Block-System)</h1>
    
    <div class="search-area">
        <label>Spieler auswählen:</label>
        <select id="editDropdown" onchange="fillFields()">
            <option value="">-- Spieler wählen --</option>
        </select>
    </div>

    <div id="editForm" style="display:none;">
        <input type="hidden" id="fFall">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="field"><label>Punkte (Aktuell)</label><input type="number" id="fPunkte"></div>
            <div class="field"><label>Allianz</label><input type="text" id="fAlli"></div>
        </div>
        <button class="btn-update" onclick="updateEntry()">Kontroll-Daten speichern</button>
        
        <div id="historie-liste">
            <h3>Letzte Kontrollen:</h3>
            <ul id="historyList"></ul>
        </div>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let blacklistData = [];

    async function loadBlacklist() {
        const res = await fetch(API + "?action=getBlacklist");
        blacklistData = await res.json();
        const drop = document.getElementById("editDropdown");
        blacklistData.forEach((item, i) => {
            let opt = document.createElement("option");
            opt.value = i;
            opt.innerText = item.gameNumber + " - " + item.target;
            drop.appendChild(opt);
        });
    }

    async function fillFields() {
        const idx = document.getElementById("editDropdown").value;
        if(idx === "") return;
        const d = blacklistData[idx];
        document.getElementById("editForm").style.display = "block";
        document.getElementById("fFall").value = d.gameNumber;
        
        // Historie laden
        const res = await fetch(API + "?action=getSpielerHistorie&fallNr=" + d.gameNumber);
        const hist = await res.json();
        const list = document.getElementById("historyList");
        list.innerHTML = "";
        hist.daten.forEach(b => {
            if(b.punkte) {
                list.innerHTML += `<li>${b.datum ? new Date(b.datum).toLocaleDateString() : 'N/A'}: ${b.punkte} Punkte (${b.allianz})</li>`;
            }
        });
    }

    async function updateEntry() {
        const data = {
            action: "updatePflege",
            fallNr: document.getElementById("fFall").value,
            punkte: document.getElementById("fPunkte").value,
            alli: document.getElementById("fAlli").value
        };

        const res = await fetch(API, { method: "POST", body: JSON.stringify(data) });
        alert("Daten gespeichert! Pointer wurde rotiert.");
        location.reload();
    }

    window.onload = loadBlacklist;
</script>
</body>
</html>
