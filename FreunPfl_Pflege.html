<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - BLACKLIST PFLEGE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 950px; background-color: #0f0f0f; border: 1px solid #444; border-radius: 10px; padding: 20px; }
        h1 { color: #39d353; text-align: center; }
        
        /* Tabelle Styles */
        #playerTable { width: 100%; border-collapse: collapse; margin-top: 10px; cursor: pointer; }
        #playerTable th { color: #5dade2; text-align: left; padding: 10px; border-bottom: 2px solid #333; }
        #playerTable td { padding: 10px; border-bottom: 1px solid #222; }
        #playerTable tr:hover { background: #1a1a1a; }
        
        /* Suche & Aktionen */
        #searchInput { width: 100%; padding: 10px; background: #000; border: 1px solid #39d353; color: #fff; margin-bottom: 20px; }
        .action-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; font-family: 'Almendra'; }
        button:hover { background: #39d353; color: #000; }
        .edit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Blacklist Pflege</h1>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Spieler suchen (Name oder Fallnummer)...">

    <table id="playerTable">
        <thead><tr><th>Fall</th><th>Name</th><th>Allianz</th></tr></thead>
        <tbody id="playerBody"></tbody>
    </table>

    <div id="actionPanel" style="display:none; margin-top: 30px; border-top: 2px solid #39d353; padding-top: 20px;">
        <h2 id="selPlayerName" style="color: #39d353;"></h2>
        <input type="hidden" id="fFall">
        
        <div class="edit-fields">
            <input type="number" id="fPunkte" placeholder="Punkte">
            <input type="text" id="fAlli" placeholder="Allianz">
        </div>
        
        <button class="btn-update" style="width:100%; margin-top:10px; background:#39d353; font-weight:bold;" onclick="updateEntry()">Speichern</button>

        <div class="action-btns">
            <button onclick="alert('Diagramm folgt!')">Diagramm</button>
            <button onclick="alert('Intervall aktiv')">Intervall-Kontrolle</button>
            <button onclick="alert('Bearbeiten')">Bearbeiten</button>
            <button onclick="alert('Löschen')">Löschen</button>
        </div>

        <div id="historie-liste" style="margin-top: 20px;">
            <h3>Verlauf:</h3>
            <ul id="historyList" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let blacklistData = [];

   async function loadBlacklist() {
    const res = await fetch(API + "?action=getBlacklist");
    blacklistData = await res.json();
    const body = document.getElementById("playerBody");
    body.innerHTML = ""; // Vorher leeren

    const heute = new Date();

    blacklistData.forEach((d, i) => {
        // Angenommen, du hast ein Feld "lastDate" oder berechnest es aus den 9 Blöcken
        const lastDate = new Date(d.letzteKontrolle); // Dein Datum aus dem Sheet
        const diffMonate = (heute - lastDate) / (1000 * 60 * 60 * 24 * 30);
        
        let status = "🟢"; // Standard
        if(diffMonate > 3) status = "🔴";
        else if(diffMonate > 2) status = "🟡";

        let nextDate = new Date(lastDate);
        nextDate.setMonth(nextDate.getMonth() + 3); // Geplante Kontrolle in 3 Monaten

        let row = `<tr onclick="selectPlayer(${i})">
            <td>${d.gameNumber}</td>
            <td>${d.target}</td>
            <td>${lastDate.toLocaleDateString()}</td>
            <td>${status}</td>
            <td>${nextDate.toLocaleDateString()}</td>
        </tr>`;
        body.innerHTML += row;
    });
}

    function selectPlayer(i) {
        const d = blacklistData[i];
        document.getElementById("actionPanel").style.display = "block";
        document.getElementById("selPlayerName").innerText = d.target + " (Fall: " + d.gameNumber + ")";
        document.getElementById("fFall").value = d.gameNumber;
        loadHistory(d.gameNumber);
    }

    async function loadHistory(fallNr) {
        const res = await fetch(API + "?action=getSpielerHistorie&fallNr=" + fallNr);
        const hist = await res.json();
        const list = document.getElementById("historyList");
        list.innerHTML = "";
        const jetzt = new Date();
        const dreiMonateInMs = 90 * 24 * 60 * 60 * 1000;

        hist.daten.forEach(b => {
            if(b.punkte) {
                const date = new Date(b.datum);
                const isOld = (jetzt - date) > dreiMonateInMs;
                list.innerHTML += `<li style="color:${isOld ? '#ff3131':'#fff'}; border-bottom:1px solid #222; padding:5px;">
                    ${date.toLocaleDateString()} - ${b.punkte} Punkte (${b.allianz}) ${isOld ? '⚠️' : ''}
                </li>`;
            }
        });
    }

    async function updateEntry() {
        const data = {
            action: "updatePflege",
            fallNr: document.getElementById("fFall").value,
            punkte: document.getElementById("fPunkte").value,
            alli: document.getElementById("fAlli").value
        };
        await fetch(API, { method: "POST", body: JSON.stringify(data) });
        alert("Gespeichert!");
        location.reload();
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("playerBody").getElementsByTagName("tr");
        for (let r of rows) r.style.display = r
