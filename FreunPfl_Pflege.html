<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - BLACKLIST PFLEGE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Almendra', serif; padding: 20px; }
        .container { width: 900px; margin: auto; background: #0f0f0f; border: 1px solid #333; padding: 20px; }
        h1 { color: #39d353; text-align: center; }
        #searchInput { width: 100%; padding: 12px; background: #000; border: 1px solid #39d353; color: #fff; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #222; cursor: pointer; }
        tr:hover { background: #1a1a1a; }
        td { padding: 12px; }
        .btn-box { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
        button:hover { background: #39d353; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>Blacklist Pflege</h1>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Spieler suchen...">
    
    <table id="playerTable">
        <thead><tr><th>Fall</th><th>Name</th><th>Status</th></tr></thead>
        <tbody id="playerBody"></tbody>
    </table>

    <div id="actionPanel" style="display:none; border-top: 2px solid #39d353; margin-top: 20px; padding-top: 20px;">
        <h2 id="selPlayerName"></h2>
        <div class="btn-box">
            <button onclick="alert('Diagramm')">Diagramm</button>
            <button onclick="alert('Intervall')">Intervall</button>
            <button onclick="alert('Bearbeiten')">Bearbeiten</button>
            <button onclick="alert('Löschen')">Löschen</button>
        </div>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let blacklistData = [];

    async function loadBlacklist() {
        const res = await fetch(API + "?action=getBlacklist");
        blacklistData = await res.json();
        const body = document.getElementById("playerBody");
        
        blacklistData.forEach((d, i) => {
            // Ampel-Logik
            const lastDate = new Date(d.letzteKontrolle);
            const diffMonate = (new Date() - lastDate) / (1000 * 60 * 60 * 24 * 30);
            let status = diffMonate > 3 ? "🔴" : (diffMonate > 2 ? "🟡" : "🟢");

            let row = document.createElement("tr");
            row.onclick = () => selectPlayer(i);
            row.innerHTML = `<td>${d.gameNumber}</td><td>${d.target}</td><td>${status}</td>`;
            body.appendChild(row);
        });
    }

    function selectPlayer(i) {
        const d = blacklistData[i];
        document.getElementById("actionPanel").style.display = "block";
        document.getElementById("selPlayerName").innerText = "Aktionen für: " + d.target;
    }

    function filterTable() { /* Deine Suchfunktion */ }
    window.onload = loadBlacklist;
</script>
</body>
</html>
