<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK BULLS - SPIELER MELDEN</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* Kompakt und schmal wie früher */
        .container { 
            width: 420px; max-width: 100%; background-color: #0f0f0f; border: 1px solid #333; 
            border-radius: 12px; padding: 25px 20px; box-shadow: 0 0 50px 10px rgba(255, 49, 49, 0.2); 
            text-align: center; box-sizing: border-box;
        }
        
        h1 { color: #ff3131; text-transform: uppercase; margin-top: 0; margin-bottom: 20px; letter-spacing: 2px; font-size: 26px; text-shadow: 0 0 10px rgba(255, 49, 49, 0.4); }

        .form-group { text-align: left; margin-bottom: 12px; }
        label { color: #5dade2; display: block; margin-bottom: 4px; font-size: 15px; font-style: italic; }
        
        /* Eingabefelder kompakt halten */
        input[type="text"], select, textarea { 
            width: 100%; padding: 10px; background: #000; color: #39d353; border: 1px solid #444; 
            font-family: 'Almendra'; font-size: 16px; border-radius: 5px; box-sizing: border-box; outline: none; 
        }
        input:focus, select:focus, textarea:focus { border-color: #ff3131; }
        
        textarea { height: 75px; resize: none; }

        /* Der alte, wichtige Info-Hinweis */
        .info-text { 
            background: rgba(255, 214, 0, 0.08); border: 1px solid #ffd600; border-radius: 5px; 
            padding: 8px 10px; color: #ffd600; font-size: 13px; text-align: left; line-height: 1.3; margin-bottom: 12px;
        }

        .btn-submit { 
            width: 100%; padding: 14px; background: #ff3131; color: #000; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; 
            font-size: 18px; text-transform: uppercase; margin-top: 10px; box-shadow: 0 3px 10px rgba(255, 49, 49, 0.2);
        }
        .btn-submit:hover { background: #fff; transform: scale(1.02); }
        
        .btn-back { display: block; margin-top: 20px; color: #666; text-decoration: none; text-transform: uppercase; font-size: 14px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Spieler Melden</h1>
    
    <form id="reportForm" onsubmit="submitReport(event)">
        
        <div class="form-group">
            <label>Name des Spielers</label>
            <input type="text" id="targetUser" placeholder="In-Game Name..." required>
        </div>

        <div class="form-group">
            <label>Allianz des Spielers</label>
            <select id="targetAlli">
                <option value="">-- Bitte wählen (falls bekannt) --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Anschuldigung / Vorwurf</label>
            <select id="reason" required>
                <option value="">-- Bitte Vorwurf wählen --</option>
            </select>
        </div>

        <div class="info-text">
            ⚠️ <strong>Hinweis:</strong> Falls deine Allianz oder die Anschuldigung nicht in den Listen oben zur Auswahl steht, lass das jeweilige Dropdown einfach leer und trage die Infos stattdessen ausführlich unten bei der Beschreibung ein!
        </div>

        <div class="form-group">
            <label>Beschreibung (Was ist passiert?)</label>
            <textarea id="description" placeholder="Details, Daten, Beweise hier eintragen..." required></textarea>
        </div>

        <button class="btn-submit" type="submit">Meldung abschicken</button>
    </form>

    <a href="dashboard.html" class="btn-back">Zurück zum Hauptmenü</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    // Lädt die dynamischen Dropdowns direkt beim Start aus den Vorgaben
    async function initForm() {
        try {
            const res = await fetch(API + "?action=getDropdownData");
            const data = await res.json();
            
            // 1. Allianzen befüllen (Aus Tabelle 2)
            const alliSelect = document.getElementById("targetAlli");
            if (data.allianzen) {
                data.allianzen.sort().forEach(alli => {
                    let opt = document.createElement("option");
                    opt.value = alli;
                    opt.innerText = alli;
                    alliSelect.appendChild(opt);
                });
            }

            // 2. Anschuldigungen befüllen (Aus Spalte B)
            const reasonSelect = document.getElementById("reason");
            if (data.vorwuerfe) {
                data.vorwuerfe.sort().forEach(v => {
                    let opt = document.createElement("option");
                    opt.value = v;
                    opt.innerText = v;
                    reasonSelect.appendChild(opt);
                });
            }
        } catch(e) { console.error("Fehler beim Laden der Listen-Struktur!"); }
    }

    // Sendet die Meldung ab
    async function submitReport(e) {
        e.preventDefault();
        const btn = document.querySelector(".btn-submit");
        btn.innerText = "ÜBERMITTLE...";
        btn.disabled = true;

        const reportData = {
            action: "submitPlayerReport", // Muss in deiner gs Weiche matchen
            reporter: localStorage.getItem("bulls_user") || "Unbekannt",
            target: document.getElementById("targetUser").value.trim(),
            alliance: document.getElementById("targetAlli").value,
            reason: document.getElementById("reason").value,
            details: document.getElementById("description").value.trim()
        };

        try {
            await fetch(API, {
                method: "POST",
                body: JSON.stringify(reportData)
            });
            alert("✓ SPIELER ERFOLGREICH IN DIE BLACKLIST-WARTESCHLANGE GEBLASEN!");
            document.getElementById("reportForm").reset();
        } catch(e) {
            alert("❌ Übertragungsfehler! Verbindung abgebrochen.");
        } finally {
            btn.innerText = "Meldung abschicken";
            btn.disabled = false;
        }
    }

    window.onload = initForm;
</script>
</body>
</html>
