<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK BULLS - SPIELER MELDEN</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .modal-box { width: 1000px; max-width: 95vw; background-color: #0f0f0f; border: 2px solid #ff3131; border-radius: 12px; padding: 30px; box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); box-sizing: border-box; }
        h1 { color: #ff3131; text-transform: uppercase; margin-top: 0; margin-bottom: 25px; letter-spacing: 3px; font-size: 32px; text-align: center; }
        .section-title { color: #5dade2; font-size: 18px; font-style: italic; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; text-align: left; }
        label { color: #fff; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 16px; border-radius: 5px; box-sizing: border-box; outline: none; }
        textarea { width: 100%; height: 140px; resize: none; background: #000; border: 1px solid #444; color: #39d353; padding: 15px; font-size: 16px; border-radius: 5px; box-sizing: border-box; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-action { padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; text-transform: uppercase; transition: 0.2s; text-align: center; text-decoration: none; }
        .btn-yellow { background: #ffd600; color: #000; }
        .btn-red { background: #ff3131; color: #000; }
        .btn-action:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="modal-box">
    <h1>Dark Bulls Black Liste - Eintragung</h1>
    <form id="reportForm" onsubmit="submitReport(event)">
        <div class="section-title">Spielerdaten</div>
        <div class="grid-3">
            <div class="form-group"><label>Spieler ID</label><input type="text" id="targetID" placeholder="ID..."></div>
            <div class="form-group"><label>Spielername</label><input type="text" id="targetUser" required placeholder="Name..."></div>
            <div class="form-group"><label>Angemeldet am</label><input type="text" id="regDate" placeholder="Datum..."></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Allianz</label><select id="targetAlli"><option value="">-- Allianz wählen --</option></select></div>
            <div class="form-group"><label>Punktestand</label><input type="text" id="playerPoints"></div>
            <div class="form-group"><label>Map</label><select id="playerMap"><option value="">-- Map wählen --</option></select></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Verstoß</label><select id="reason" required><option value="">-- Verstoß wählen --</option></select></div>
            <div class="form-group"><label>Beweise</label><select id="proof"><option value="Ja">Ja</option><option value="Nein">Nein</option><option value="Auf Anfrage">Auf Anfrage</option></select></div>
            <div class="form-group"><label>Spielnummer</label><input type="text" id="gameNumber"></div>
        </div>

        <div class="section-title">Fallbeschreibung</div>
        <textarea id="description" required placeholder="Details hier dokumentieren..."></textarea>

        <div class="section-title">Zeugen & Melder</div>
        <div class="grid-3">
            <div class="form-group"><label>Melder</label><input type="text" id="reporterName" readonly></div>
            <div class="form-group"><label>Zeuge 1</label><select id="witness1"><option value="">-- Zeuge 1 --</option></select></div>
            <div class="form-group"><label>Zeuge 2</label><select id="witness2"><option value="">-- Zeuge 2 --</option></select></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>Datum</label><input type="text" id="reportDate" readonly></div>
            <div class="form-group"><label>Zeuge 3</label><select id="witness3"><option value="">-- Zeuge 3 --</option></select></div>
            <div class="form-group"><label>Zeuge 4</label><select id="witness4"><option value="">-- Zeuge 4 --</option></select></div>
        </div>

        <div class="button-row">
            <a href="dashboard.html" class="btn-action btn-yellow">Zurück</a>
            <button type="submit" class="btn-action btn-red" id="submitBtn">Spieler melden</button>
            <a href="Per_Supp.html" class="btn-action btn-yellow">Support</a>
        </div>
    </form>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    async function initForm() {
        document.getElementById("reporterName").value = localStorage.getItem("bulls_user") || "Unbekannt";
        document.getElementById("reportDate").value = new Date().toLocaleDateString("de-DE");

        try {
            const res = await fetch(API + "?action=getDropdownData");
            const data = await res.json();
            
            const fill = (id, arr) => {
                const el = document.getElementById(id);
                arr.sort().forEach(val => el.innerHTML += `<option value="${val}">${val}</option>`);
            };

            fill("targetAlli", data.allianzen || []);
            fill("playerMap", data.maps || []);
            fill("reason", data.vorwuerfe || []);
            
            const witnesses = data.user ? data.user.map(u => u.name) : [];
            ["witness1", "witness2", "witness3", "witness4"].forEach(id => fill(id, witnesses));
        } catch(e) { console.error("Daten konnten nicht geladen werden."); }
    }

    async function submitReport(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.innerText = "SENDET...";

        const payload = {
            action: "submitPlayerReport",
            targetID: document.getElementById("targetID").value,
            targetUser: document.getElementById("targetUser").value,
            regDate: document.getElementById("regDate").value,
            targetAlli: document.getElementById("targetAlli").value,
            playerPoints: document.getElementById("playerPoints").value,
            playerMap: document.getElementById("playerMap").value,
            reason: document.getElementById("reason").value,
            proof: document.getElementById("proof").value,
            gameNumber: document.getElementById("gameNumber").value,
            reportDate: document.getElementById("reportDate").value,
            description: document.getElementById("description").value,
            reporter: document.getElementById("reporterName").value,
            witness1: document.getElementById("witness1").value,
            witness2: document.getElementById("witness2").value,
            witness3: document.getElementById("witness3").value,
            witness4: document.getElementById("witness4").value
        };

        try {
            await fetch(API, { method: "POST", body: JSON.stringify(payload) });
            alert("✓ AKTE ÜBERMITTELT!");
            document.getElementById("reportForm").reset();
            initForm();
        } catch(e) { alert("Fehler!"); } finally { btn.disabled = false; btn.innerText = "Spieler melden"; }
    }
    window.onload = initForm;
</script>
</body>
</html>
