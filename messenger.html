<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Bulls - Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    body { background:#000; color:#fff; font-family:'Almendra',serif; margin:0; display:flex; flex-direction:column; height:100vh; }

    .messenger-header { background:#0a0a0a; border-bottom:2px solid #ff3131; padding:10px; }
    .tabs { display:flex; justify-content:center; gap:20px; position:relative; }
    .tab { padding:10px 20px; cursor:pointer; color:#888; text-transform:uppercase; border-bottom:3px solid transparent; transition:.3s; }
    .tab.active { color:#ff3131; border-bottom:3px solid #ff3131; font-weight:bold; }
    .tab.support-tab { color:#ff3131; display:none; }

    .main-container { display:flex; flex:1; overflow:hidden; }

    .chat-sidebar { width:320px; background:#0a0a0a; border-right:1px solid #333; overflow-y:auto; position:relative; }
    .sidebar-top { display:flex; gap:10px; padding:10px; border-bottom:1px solid #222; align-items:center; }
    .new-chat-btn { flex:1; padding:10px; background:#39d353; color:#000; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer; border-radius:6px; }
    .plus-btn { width:44px; height:44px; border-radius:8px; border:none; background:#ff3131; color:#fff; font-size:26px; cursor:pointer; }

    .chat-item { padding:14px 14px; border-bottom:1px solid #222; cursor:pointer; transition:.2s; position:relative; }
    .chat-item:hover { background:#1a1a1a; }
    .chat-item.active { background:#222; border-left:4px solid #ff3131; }
    .chat-item .name { font-weight:bold; display:block; }
    .chat-item .last-msg { font-size:12px; color:#777; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .badge { position:absolute; right:12px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:#39d353; box-shadow:0 0 10px rgba(57,211,83,.6); display:none; }

    .chat-window { flex:1; display:flex; flex-direction:column; background:#050505; }
    .chat-messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .bubble { max-width:70%; padding:10px 15px; border-radius:10px; line-height:1.4; white-space:pre-wrap; }
    .bubble.me { align-self:flex-end; background:#222; border:1px solid #444; }
    .bubble.them { align-self:flex-start; background:#111; border:1px solid #333; }
    .bubble.reported { background:rgba(255,0,0,.2)!important; border:1px solid #ff3131!important; color:#ff9999; }
    .bubble .meta { font-size:10px; color:#555; margin-top:5px; display:block; }
    .report-btn { cursor:pointer; font-size:12px; margin-left:10px; opacity:.6; }
    .report-btn:hover { opacity:1; color:red; }

    .input-area { padding:18px; background:#0a0a0a; border-top:1px solid #333; display:flex; gap:10px; }
    input { flex:1; background:#000; border:1px solid #444; color:#fff; padding:12px; border-radius:6px; font-family:'Almendra'; }
    button.send { background:#ff3131; color:#fff; border:none; padding:0 20px; cursor:pointer; font-family:'Almendra'; font-weight:bold; border-radius:6px; }

    /* Member Panel */
    .member-panel {
      position:absolute; top:0; right:-360px; width:360px; height:100%;
      background:#0b0b0b; border-left:2px solid #ff3131; box-shadow:-10px 0 30px rgba(0,0,0,.6);
      transition: .25s; z-index:50; display:flex; flex-direction:column;
    }
    .member-panel.open { right:0; }
    .mp-head { padding:12px; border-bottom:1px solid #222; display:flex; gap:10px; align-items:center; }
    .mp-head b { color:#ff3131; }
    .mp-search { flex:1; }
    .mp-search input { width:100%; box-sizing:border-box; }
    .mp-close { background:#222; color:#fff; border:none; padding:10px 12px; border-radius:6px; cursor:pointer; }
    .mp-list { overflow:auto; padding:10px; }
    .mp-item { padding:10px; border:1px solid #222; border-radius:10px; margin-bottom:8px; cursor:pointer; background:#000; }
    .mp-item:hover { border-color:#ff3131; }
    .mp-top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .mp-name { font-weight:bold; }
    .dot { width:10px; height:10px; border-radius:50%; background:#444; }
    .dot.online { background:#39d353; box-shadow:0 0 10px rgba(57,211,83,.6); }
    .mp-sub { margin-top:6px; font-size:12px; color:#aaa; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <div class="messenger-header">
    <div class="tabs">
      <div class="tab active" id="tabPN" onclick="switchMainTab(event,'PN')">PN</div>
      <div class="tab" id="tabGROUP" onclick="switchMainTab(event,'GROUP')">Gruppen</div>
      <div class="tab support-tab" id="supportTab" onclick="switchMainTab(event,'SUPPORT')">Support</div>
    </div>
  </div>

  <div class="main-container">
    <div class="chat-sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" onclick="startNewChatPrompt()">+ Neuer Chat</button>
        <button class="plus-btn" title="Spieler auswählen" onclick="toggleMemberPanel()">+</button>
      </div>

      <div id="chatList"></div>

      <!-- Seitenpanel -->
      <div class="member-panel" id="memberPanel">
        <div class="mp-head">
          <b>Spieler</b>
          <div class="mp-search"><input id="memberSearch" placeholder="Suchen..." oninput="renderMemberList()"></div>
          <button class="mp-close" onclick="toggleMemberPanel(false)">X</button>
        </div>
        <div class="mp-list" id="memberList"></div>
      </div>
    </div>

    <div class="chat-window">
      <div class="chat-messages" id="msgContainer"></div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Nachricht schreiben..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send" onclick="sendMsg()">Senden</button>
      </div>
    </div>
  </div>

  <script>
    if (!window.Bulls || !Bulls.requireLogin("index.html")) {}

    const SCRIPT_URL = (window.BULLS_CONFIG && window.BULLS_CONFIG.SCRIPT_URL) || "";
    const ME = Bulls.getUser();
    const MY_NAME = ME.name;
    const MY_ROLE = ME.role;

    function extrasList(s){ return String(s||"").split(",").map(x=>x.trim()).filter(Boolean); }
    const MY_EXTRAS = extrasList(ME.extra);

    let currentTab = "PN";
    let currentChatPartner = "";
    let allMessages = [];
    let members = []; // aus getUsers
    let lastRead = {}; // localStorage (unreads)

    // Support-Tab nur für: Admin/Offi/Ausbilder oder Extra Support
    if (["Admin","Offi","Offizier","Ausbilder"].includes(MY_ROLE) || MY_EXTRAS.includes("Support")) {
      document.getElementById("supportTab").style.display = "block";
    }

    // ---- Presence Ping ----
    async function presencePing(){
      try {
        await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({action:"presencePing", name: MY_NAME}) });
      } catch(e){}
    }
    presencePing();
    setInterval(presencePing, 60000);

    // ---- Members ----
    async function loadMembers(){
      try {
        const res = await fetch(SCRIPT_URL + "?action=getUsers&t=" + Date.now());
        members = await res.json();
        renderMemberList();
      } catch(e) {
        console.error("getUsers Fehler", e);
      }
    }

    function isOnline(lastSeen){
      if (!lastSeen) return false;
      const t = Date.parse(lastSeen);
      if (!t) return false;
      return (Date.now() - t) < 2*60*1000; // 2 Minuten
    }

    function toggleMemberPanel(force){
      const el = document.getElementById("memberPanel");
      const open = (typeof force === "boolean") ? force : !el.classList.contains("open");
      if (open) {
        el.classList.add("open");
        loadMembers();
        setTimeout(()=>document.getElementById("memberSearch").focus(), 50);
      } else {
        el.classList.remove("open");
      }
    }

    function renderMemberList(){
      const q = (document.getElementById("memberSearch").value || "").toLowerCase();
      const list = document.getElementById("memberList");
      list.innerHTML = "";

      const filtered = members
        .filter(m => m && m.name && m.name.toLowerCase() !== MY_NAME.toLowerCase())
        .filter(m => !q || (m.name.toLowerCase().includes(q) || String(m.allianz||"").toLowerCase().includes(q)));

      filtered.forEach(m => {
        const div = document.createElement("div");
        div.className = "mp-item";
        div.onclick = () => {
          currentTab = "PN";
          currentChatPartner = m.name;
          saveLastReadForCurrentChat(); // beim Öffnen als gelesen
          setActiveTabUI();
          renderChatList();
          renderMessages();
          toggleMemberPanel(false);
        };

        div.innerHTML =
          `<div class="mp-top">
            <div class="mp-name">${m.name}</div>
            <div class="dot ${isOnline(m.lastSeen) ? "online" : ""}"></div>
          </div>
          <div class="mp-sub">
            <div>${m.allianz || ""}</div>
            <div>${m.role || ""}</div>
          </div>`;

        list.appendChild(div);
      });

      if (!filtered.length) {
        list.innerHTML = `<div style="color:#777; padding:10px;">Keine Treffer.</div>`;
      }
    }

    // ---- Unread (lokal) ----
    function keyForChat(tab, partner){
      return "bulls_lastRead_" + tab + "_" + partner;
    }
    function loadLastRead(){
      // nothing to preload; per key
    }
    function saveLastReadForCurrentChat(){
      if (!currentChatPartner) return;
      localStorage.setItem(keyForChat(currentTab, currentChatPartner), new Date().toISOString());
    }
    function isUnread(partner){
      if (currentTab !== "PN") return false;
      const lr = localStorage.getItem(keyForChat("PN", partner));
      const lastReadTs = lr ? Date.parse(lr) : 0;
      // wenn es eine Nachricht vom Partner nach lastRead gibt -> unread
      for (let i = allMessages.length - 1; i >= 0; i--) {
        const m = allMessages[i];
        if (m.typ !== "PN") continue;
        const p = (m.absender === MY_NAME) ? m.ziel : m.absender;
        if (p !== partner) continue;
        const mt = Date.parse(m.zeit || "");
        if (m.absender === partner && mt > lastReadTs) return true;
        return false;
      }
      return false;
    }

    // ---- Chat ----
    function setActiveTabUI(){
      document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
      const id = currentTab === "PN" ? "tabPN" : (currentTab === "GROUP" ? "tabGROUP" : "supportTab");
      const el = document.getElementById(id);
      if (el) el.classList.add("active");
    }

    async function loadChat(){
      try {
        const res = await fetch(SCRIPT_URL + "?action=getMessages&t=" + Date.now());
        allMessages = await res.json();

        // Default Partner
        if (!currentChatPartner && currentTab === "PN") {
          const partners = getPartnersFromMessages(allMessages);
          if (partners.length) currentChatPartner = partners[0];
        }
        renderChatList();
        renderMessages();
      } catch(e) {
        console.error("getMessages Fehler", e);
      }
    }

    function getPartnersFromMessages(messages){
      const map = {};
      messages.forEach(m => {
        if (m.typ !== "PN") return;
        const partner = (m.absender === MY_NAME) ? m.ziel : m.absender;
        if (!partner || partner === MY_NAME) return;
        map[partner] = m; // letzte überschreibt
      });
      return Object.keys(map).sort((a,b)=> new Date(map[b].zeit||0) - new Date(map[a].zeit||0));
    }

    function renderChatList(){
      const list = document.getElementById("chatList");
      list.innerHTML = "";

      if (currentTab === "GROUP") {
        const div = document.createElement("div");
        div.className = `chat-item ${currentChatPartner === "Allianz" ? "active" : ""}`;
        div.onclick = () => { currentChatPartner = "Allianz"; saveLastReadForCurrentChat(); renderMessages(); renderChatList(); };
        div.innerHTML = `<span class="name">Allianz</span><span class="last-msg">Gruppenchat</span><span class="badge" style="display:none"></span>`;
        list.appendChild(div);
        return;
      }

      if (currentTab === "SUPPORT") {
        const div = document.createElement("div");
        div.className = `chat-item ${currentChatPartner === "Support" ? "active" : ""}`;
        div.onclick = () => { currentChatPartner = "Support"; saveLastReadForCurrentChat(); renderMessages(); renderChatList(); };
        div.innerHTML = `<span class="name">Support</span><span class="last-msg">Anfragen / Meldungen</span><span class="badge" style="display:none"></span>`;
        list.appendChild(div);
        return;
      }

      // PN
      const partners = getPartnersFromMessages(allMessages);
      partners.forEach(p => {
        const lastMsg = allMessages
          .filter(m => m.typ === "PN" && ((m.absender === MY_NAME && m.ziel === p) || (m.absender === p && m.ziel === MY_NAME)))
          .sort((a,b)=> new Date(b.zeit) - new Date(a.zeit))[0];

        const div = document.createElement("div");
        div.className = `chat-item ${currentChatPartner === p ? "active" : ""}`;
        div.onclick = () => { currentChatPartner = p; saveLastReadForCurrentChat(); renderMessages(); renderChatList(); };
        div.innerHTML =
          `<span class="name">${p}</span>
           <span class="last-msg">${(lastMsg && lastMsg.nachricht) ? lastMsg.nachricht : ""}</span>
           <span class="badge" style="display:${isUnread(p) ? "block" : "none"}"></span>`;
        list.appendChild(div);
      });

      if (!partners.length) {
        list.innerHTML = `<div style="color:#777; padding:12px;">Noch keine PN-Chats. Nutze „+“.</div>`;
      }
    }

    function renderMessages(){
      const container = document.getElementById("msgContainer");
      container.innerHTML = "";

      if (!currentChatPartner) {
        container.innerHTML = `<div style="color:#777">Wähle links einen Chat aus.</div>`;
        return;
      }

      // als gelesen markieren sobald angezeigt
      saveLastReadForCurrentChat();

      let filtered = allMessages.filter(m => {
        if (currentTab === "PN") return (m.absender === MY_NAME && m.ziel === currentChatPartner) || (m.absender === currentChatPartner && m.ziel === MY_NAME);
        if (currentTab === "GROUP") return m.typ === "GROUP";
        if (currentTab === "SUPPORT") return (m.typ === "SUPPORT") || (m.status === "reported") || (m.ziel === "Support");
        return false;
      });

      // Neuste oben (wie du wolltest)
      filtered.sort((a,b)=> new Date(b.zeit||0) - new Date(a.zeit||0));

      filtered.forEach(m => {
        const div = document.createElement("div");
        const isMe = m.absender === MY_NAME;
        const isReported = m.status === "reported" || m.ziel === "Support" || m.typ === "SUPPORT";

        div.className = `bubble ${isMe ? "me" : "them"} ${isReported ? "reported" : ""}`;
        const timeStr = m.zeit ? new Date(m.zeit).toLocaleString() : "";
        div.innerHTML = `
          <b>${m.absender}:</b>
${m.nachricht || ""}
          <span class="meta">${timeStr}
          ${(!isMe && currentTab === "PN" && !isReported) ? `<span class="report-btn" onclick="reportMsg('${m.zeit}')">🚨 Melden</span>` : ""}</span>
        `;
        container.appendChild(div);
      });

      container.scrollTop = 0; // weil neueste oben
    }

    async function sendMsg(){
      const inp = document.getElementById("msgInput");
      const text = (inp.value || "").trim();
      if (!text) return;

      let ziel = currentChatPartner;
      if (currentTab === "GROUP") ziel = "Allianz";
      if (currentTab === "SUPPORT") ziel = "Support";
      if (!ziel) return;

      const payload = { action:"sendChat", absender:MY_NAME, ziel:ziel, nachricht:text, typ:currentTab, status:"normal" };

      // Optimistisch
      allMessages.push({ zeit: new Date().toISOString(), typ: currentTab, absender: MY_NAME, ziel: ziel, nachricht: text, status: "normal" });
      inp.value = "";
      renderMessages();
      renderChatList();

      await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", body: JSON.stringify(payload) });
    }

    async function reportMsg(zeit){
      if (!zeit) return;
      // Lokal markieren
      allMessages = allMessages.map(m => (m.zeit === zeit ? Object.assign({}, m, { status:"reported", ziel:"Support" }) : m));
      renderMessages();
      renderChatList();
      await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ action:"reportMsg", zeit: zeit }) });
    }

    function switchMainTab(ev, t){
      currentTab = t;
      if (t === "GROUP") currentChatPartner = "Allianz";
      if (t === "SUPPORT") currentChatPartner = "Support";
      setActiveTabUI();
      renderChatList();
      renderMessages();
    }

    // Fallback Prompt (falls gewünscht)
    function startNewChatPrompt(){
      if (currentTab !== "PN") return;
      const p = prompt("Name des Spielers:");
      if (p) { currentChatPartner = p; setActiveTabUI(); renderMessages(); renderChatList(); }
    }

    // Init
    setActiveTabUI();
    setInterval(loadChat, 5000);
    loadChat();
  </script>
</body>
</html>
