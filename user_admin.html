<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Bulls - Admin Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    :root { --red:#ff3131; --gold:#ffd600; --bg:#050505; --card:#0f0f0f; --green:#39d353; }
    body { background: var(--bg); color: white; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .admin-container { width: 1100px; max-width: 95vw; background: var(--card); padding: 25px; border: 2px solid var(--red); border-radius: 15px; box-shadow: 0 0 30px rgba(255, 49, 49, 0.3); }
    h1 { color: var(--red); text-transform: uppercase; text-align: center; margin: 0 0 20px 0; text-shadow: 0 0 10px red; }

    .search-box { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--green); font-family: 'Almendra'; font-size: 18px; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; }

    .table-wrapper { max-height: 420px; overflow-y: auto; border: 1px solid #222; border-radius: 8px; background: #000; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; background: #151515; color: var(--red); text-align: left; padding: 15px; border-bottom: 2px solid var(--red); }
    td { padding: 12px 15px; border-bottom: 1px solid #111; cursor: pointer; }
    tr:hover { background: #1a1a1a; }
    .selected-row { background: rgba(255, 49, 49, 0.25) !important; border-left: 4px solid var(--red); }

    .btn-row { display: flex; gap: 15px; margin-top: 10px; }
    .btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; border-radius: 5px; text-transform: uppercase; }
    .btn-edit { background: #444; color: #fff; }
    .btn-pin { background: var(--gold); color: #000; }
    .btn-del { background: var(--red); color: #fff; }
    .btn-back { background:#222; color:white; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modal */
    .overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; }
    .modal-card {
      width: 700px; max-width: 95vw;
      background: #111; border: 2px solid var(--red); border-radius: 14px;
      box-shadow: 0 0 40px rgba(255,49,49,0.35);
      padding: 22px;
    }
    .modal-title { margin: 0 0 10px; color: var(--red); text-transform: uppercase; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .field { display:flex; flex-direction: column; gap: 6px; }
    label { color: var(--red); font-size: 12px; text-transform: uppercase; }
    input, select {
      padding: 12px; border-radius: 6px; border: 1px solid #444;
      background: #000; color: #fff; font-family: 'Almendra'; font-size: 16px;
      outline: none;
    }
    input[readonly] { opacity: 0.85; }
    .modal-actions { display:flex; gap: 12px; margin-top: 16px; }
    .btn-save { background: var(--green); color:#000; }
    .btn-cancel { background: #700; color:#fff; }
    .hint { color:#888; font-size: 12px; margin-top: 8px; text-align:center; }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1>Dark Bulls Admin Center</h1>

    <input type="text" class="search-box" id="searchInput" placeholder="Spieler suchen..." onkeyup="filterTable()">

    <div class="table-wrapper">
      <table>
        <thead><tr><th>Spieler</th><th>Allianz</th><th>Rolle</th><th>Zusatz</th></tr></thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>

    <div class="btn-row">
      <button class="btn btn-edit" id="editBtn" onclick="openEditModal()" disabled>Bearbeiten</button>
      <button class="btn btn-pin" id="pinBtn" onclick="resetPin()" disabled>PIN Reset</button>
      <button class="btn btn-del" id="delBtn" onclick="deleteUser()" disabled>Löschen</button>
      <button class="btn btn-back" onclick="goBack()">Zurück</button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="overlay" id="editModal">
    <div class="modal-card">
      <h2 class="modal-title">User bearbeiten</h2>

      <div class="grid">
        <div class="field">
          <label>Spielername</label>
          <input id="mName" readonly>
        </div>
        <div class="field">
          <label>Allianz</label>
          <input id="mAllianz" placeholder="z.B. Dark Bulls">
        </div>

        <div class="field">
          <label>Rolle</label>
          <select id="mRole">
            <option value="Gast">Gast</option>
            <option value="Gäste">Gäste</option>
            <option value="Allianz Gast">Allianz Gast</option>
            <option value="Allianz Gäste">Allianz Gäste</option>
            <option value="Mitglied">Mitglied</option>
            <option value="Kampfdivision">Kampfdivision</option>
            <option value="Ausbilder">Ausbilder</option>
            <option value="Offizier">Offizier</option>
            <option value="Admin">Admin</option>
            <option value="Buchhalter">Buchhalter</option>
          </select>
        </div>

        <div class="field">
          <label>Zusätzliche Aufgabe</label>
          <select id="mExtra" onchange="toggleExtraCustom()">
            <option value="">(keine)</option>
            <option value="Moderator">Moderator</option>
            <option value="Support">Support</option>
            <option value="Buchhalter">Buchhalter</option>
            <option value="Blackeinsicht">Blackeinsicht</option>
            <option value="ELO">ELO</option>
            <option value="Elo bearbeiter">Elo bearbeiter</option>
            <option value="Personalabteilung">Personalabteilung</option>
            <option value="__custom__">Andere…</option>
          </select>
          <input id="mExtraCustom" placeholder="Eigene Zusatzrolle" style="display:none; margin-top:8px;">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-save" onclick="saveChanges()">Speichern</button>
        <button class="btn btn-cancel" onclick="closeEditModal()">Abbruch</button>
      </div>

      <div class="hint">PIN wird hier bewusst nicht bearbeitet (nur über PIN Reset).</div>
    </div>
  </div>

  <!-- PIN MODAL -->
  <div class="overlay" id="pinModal">
    <div class="modal-card" style="width:450px;">
      <h2 class="modal-title" style="color:var(--gold);">Einmalpasswort</h2>
      <div style="text-align:center; margin-top:10px;">
        <div style="color:#aaa;">Spieler:</div>
        <div id="pinUser" style="font-size:22px; margin:8px 0;"></div>
        <div id="newPinDisplay" style="font-size:56px; letter-spacing:10px; font-weight:bold;">####</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-back" onclick="closePinModal()">Fertig</button>
      </div>
    </div>
  </div>

  <script>
    if (!window.Bulls || !Bulls.requireLogin("index.html")) {}

    const SCRIPT_URL = (window.BULLS_CONFIG && window.BULLS_CONFIG.SCRIPT_URL) || "";
    const ME = Bulls.getUser();

    // Zugriff: Admin/Offi/Ausbilder oder Zusatzrollen Moderator/Personalabteilung
    const allowedRoles = ["Admin", "Offizier", "Offi", "Ausbilder"];
    const allowedExtras = ["Moderator", "Personalabteilung"];
    if (allowedRoles.indexOf(ME.role) === -1 && allowedExtras.indexOf(ME.extra) === -1) {
      alert("Kein Zugriff.");
      window.location.href = "dashboard.html";
    }

    let selected = null; // {name, allianz, role, extra}

    function setButtons(enabled) {
      document.getElementById("editBtn").disabled = !enabled;
      document.getElementById("pinBtn").disabled = !enabled;
      document.getElementById("delBtn").disabled = !enabled;
    }

    function handleResponse(data) {
      const body = document.getElementById("userBody");
      body.innerHTML = "";

      const rows = (data && data.length) ? data : [];
      rows.forEach(function(row) {
        if (!row || !row[0] || row[0] === "Spielername ") return;

        // Format aus Apps Script: [name, allianz, "****", rolle, extra]
        const item = {
          name: row[0] || "",
          allianz: row[1] || "",
          role: row[3] || "",
          extra: row[4] || ""
        };

        const tr = document.createElement("tr");
        tr.onclick = function() {
          document.querySelectorAll("#userBody tr").forEach(function(el){ el.classList.remove("selected-row"); });
          tr.classList.add("selected-row");
          selected = item;
          setButtons(true);
        };

        tr.innerHTML =
          "<td>" + (item.name) + "</td>" +
          "<td>" + (item.allianz) + "</td>" +
          "<td>" + (item.role) + "</td>" +
          "<td>" + (item.extra) + "</td>";

        body.appendChild(tr);
      });

      setButtons(false);
      selected = null;
    }

    function loadData() {
      // JSONP
      const script = document.createElement("script");
      script.src = SCRIPT_URL + "?action=listUsers&callback=handleResponse&t=" + Date.now();
      document.body.appendChild(script);
    }

    function filterTable() {
      const val = (document.getElementById("searchInput").value || "").toLowerCase();
      document.querySelectorAll("#userBody tr").forEach(function(tr) {
        tr.style.display = tr.innerText.toLowerCase().indexOf(val) >= 0 ? "" : "none";
      });
    }

    function openEditModal() {
      if (!selected) return;

      document.getElementById("mName").value = selected.name;
      document.getElementById("mAllianz").value = selected.allianz || "";

      // Rolle setzen (wenn unbekannt -> bleibt wie es ist, sonst default)
      const roleSelect = document.getElementById("mRole");
      const roleVal = selected.role || "Gast";
      let roleFound = false;
      for (let i=0; i<roleSelect.options.length; i++) {
        if (roleSelect.options[i].value === roleVal) roleFound = true;
      }
      roleSelect.value = roleFound ? roleVal : "Gast";

      // Zusatzrolle setzen
      const extraSelect = document.getElementById("mExtra");
      const extraVal = selected.extra || "";
      let extraFound = false;
      for (let i=0; i<extraSelect.options.length; i++) {
        if (extraSelect.options[i].value === extraVal) extraFound = true;
      }
      if (extraVal && !extraFound) {
        extraSelect.value = "__custom__";
        document.getElementById("mExtraCustom").style.display = "block";
        document.getElementById("mExtraCustom").value = extraVal;
      } else {
        extraSelect.value = extraVal;
        document.getElementById("mExtraCustom").style.display = "none";
        document.getElementById("mExtraCustom").value = "";
      }

      document.getElementById("editModal").style.display = "flex";
    }

    function closeEditModal() {
      document.getElementById("editModal").style.display = "none";
    }

    function toggleExtraCustom() {
      const v = document.getElementById("mExtra").value;
      const inp = document.getElementById("mExtraCustom");
      if (v === "__custom__") {
        inp.style.display = "block";
        inp.focus();
      } else {
        inp.style.display = "none";
        inp.value = "";
      }
    }

    async function saveChanges() {
      if (!selected) return;

      const newAllianz = document.getElementById("mAllianz").value || "";
      const newRole = document.getElementById("mRole").value || "Gast";
      let newExtra = document.getElementById("mExtra").value || "";
      if (newExtra === "__custom__") newExtra = document.getElementById("mExtraCustom").value || "";

      const payload = {
        action: "fullUpdate",
        userName: selected.name,
        newAllianz: newAllianz,
        newRole: newRole,
        newExtra: newExtra
      };

      await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });

      closeEditModal();
      alert("Gespeichert!");
      location.reload();
    }

    async function resetPin() {
      if (!selected) return;
      const pin = Math.floor(1000 + Math.random() * 9000);

      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({ action: "resetPin", userName: selected.name, newPin: String(pin) })
      });

      document.getElementById("pinUser").innerText = selected.name;
      document.getElementById("newPinDisplay").innerText = pin;
      document.getElementById("pinModal").style.display = "flex";
    }

    function closePinModal() {
      document.getElementById("pinModal").style.display = "none";
      location.reload();
    }

    async function deleteUser() {
      if (!selected) return;
      if (!confirm("User wirklich löschen: " + selected.name + " ?")) return;

      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({ action: "deleteUser", userName: selected.name })
      });

      alert("Gelöscht!");
      location.reload();
    }

    function goBack() {
      window.location.href = "dashboard.html";
    }

    window.onload = loadData;
  </script>
</body>
</html>
