<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Admin Center V6</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: black; color: white; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-container { width: 1000px; max-width: 95vw; background: #0a0a0a; padding: 25px; border: 2px solid #ff3131; border-radius: 15px; box-shadow: 0 0 40px red; }
        h1 { color: #ff3131; text-transform: uppercase; text-align: center; margin: 0 0 15px 0; }
        .search-box { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #39d353; font-family: 'Almendra'; font-size: 18px; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .table-wrapper { max-height: 380px; overflow-y: auto; border: 1px solid #333; border-radius: 8px; margin-bottom: 20px; background: #000; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #111; color: #ff3131; text-align: left; padding: 12px; border-bottom: 2px solid #333; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .selected-row { background: rgba(255, 0, 0, 0.4) !important; color: #fff !important; font-weight: bold; box-shadow: inset 0 0 15px red; }
        .edit-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding: 20px; background: #111; border-radius: 10px; border: 1px solid #333; }
        .field-group { display: flex; flex-direction: column; }
        label { color: #ff3131; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; background: black; border: 1px solid #444; color: white; font-family: 'Almendra'; font-size: 16px; border-radius: 4px; outline: none; }
        .button-row { grid-column: span 3; display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; border-radius: 5px; text-transform: uppercase; }
        .btn-save { background: #39d353; color: black; }
        .btn-pin { background: #ffd600; color: black; }
        .btn-del { background: #ff3131; color: white; }
        .btn:disabled { opacity: 0.15; cursor: not-allowed; }
        #loading-text { color: #ffd600; text-align: center; padding: 20px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Mitglieder Kontrollzentrum</h1>
        <input type="text" class="search-box" id="searchInput" placeholder="Nach Spieler suchen..." onkeyup="filterTable()">
        <div class="table-wrapper">
            <div id="loading-text">Verbinde mit Google-Server...</div>
            <table id="userTable" style="display:none;">
                <thead>
                    <tr><th>Name</th><th>Hauptrolle</th><th>Zusatz</th><th>Status</th></tr>
                </thead>
                <tbody id="userBody"></tbody>
            </table>
        </div>
        <div class="edit-area">
            <div class="field-group"><label>Spieler</label><input type="text" id="editName" readonly></div>
            <div class="field-group"><label>Rolle</label><select id="editRole">
                <option value="Gast">Gast</option><option value="Mitglied">Mitglied</option><option value="Offi">Offi</option><option value="Admin">Admin</option>
            </select></div>
            <div class="field-group"><label>Zusatz</label><select id="editExtraRole">
                <option value="">Keine</option><option value="ELO">ELO</option><option value="Buchhalter">Buchhalter</option>
            </select></div>
            <div class="button-row">
                <button class="btn btn-save" id="saveBtn" onclick="saveChanges()" disabled>Speichern</button>
                <button class="btn btn-pin" id="pinBtn" onclick="resetPin()" disabled>PIN Reset</button>
                <button class="btn btn-del" id="delBtn" onclick="deleteUser()" disabled>Löschen</button>
            </div>
        </div>
    </div>

    <script>
        // DIE URL DIE DU MIR GESCHICKT HAST
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyivUyPpATTNv1muEF_U5HfT6_4Yj6QkseOvxaJX6wgIki9f-5XIzJUtDUxGAwCPeQLWw/exec';
        
        let allUsers = [];
        let selectedUser = null;

        async function loadUsers() {
            try {
                // Wir erzwingen eine frische Abfrage ohne Cache
                const response = await fetch(SCRIPT_URL + '?t=' + Date.now());
                const data = await response.json();
                
                // Wir filtern leere Zeilen und die Kopfzeile raus
                allUsers = data.filter(row => row[0] && row[0] !== "Spielername" && row[0] !== "Name");
                
                renderTable(allUsers);
                
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('userTable').style.display = 'table';
            } catch (error) {
                console.error("Fehler:", error);
                document.getElementById('loading-text').innerText = "FEHLER: Script antwortet nicht korrekt (Doppelte Variablen im Script!)";
            }
        }

        function renderTable(data) {
            const body = document.getElementById('userBody');
            body.innerHTML = "";
            data.forEach((row) => {
                const tr = document.createElement('tr');
                tr.onclick = () => {
                    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
                    tr.classList.add('selected-row');
                    selectedUser = row;
                    document.getElementById('editName').value = row[0];
                    document.getElementById('editRole').value = row[3];
                    document.getElementById('editExtraRole').value = row[4] || "";
                    document.getElementById('saveBtn').disabled = false;
                    document.getElementById('pinBtn').disabled = false;
                    document.getElementById('delBtn').disabled = false;
                };
                // Zeigt Spalte A (Name), Spalte D (Rolle) und Spalte E (Zusatz)
                tr.innerHTML = `<td>${row[0]}</td><td>${row[3]}</td><td style="color:#ffd600">${row[4]||'-'}</td><td>Aktiv</td>`;
                body.appendChild(tr);
            });
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allUsers.filter(u => u[0].toLowerCase().includes(val)));
        }

        async function saveChanges() {
            if(!selectedUser) return;
            const newName = document.getElementById('editName').value;
            const newRole = document.getElementById('editRole').value;
            const newExtra = document.getElementById('editExtraRole').value;
            
            document.getElementById('saveBtn').innerText = "...";
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "fullUpdate", oldName: selectedUser[0], newName, newRole, newExtra })
            });
            alert("Änderungen gesendet!");
            location.reload();
        }

        async function resetPin() {
            const p = Math.floor(1000 + Math.random() * 9000);
            if(!confirm("PIN wirklich auf " + p + " zurücksetzen?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "resetPin", userName: selectedUser[0], newPin: p })});
            alert("PIN wurde auf " + p + " gesetzt!");
        }

        async function deleteUser() {
            if(!confirm("Spieler wirklich löschen?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "deleteUser", userName: selectedUser[0] })});
            location.reload();
        }

        loadUsers();
    </script>
</body>
</html>
