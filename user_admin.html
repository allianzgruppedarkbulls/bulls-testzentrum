<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulls Admin - User Verwaltung</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: black; color: white; font-family: 'Almendra', serif; 
            padding: 20px; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .admin-container { 
            width: 900px; max-width: 95vw; background: #0a0a0a; 
            padding: 30px; border: 2px solid #ff3131; border-radius: 15px; 
            box-shadow: 0 0 40px red; margin-top: 20px;
        }
        h1 { color: #ff3131; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #ff3131; text-align: left; padding: 15px; border-bottom: 2px solid #333; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        tr:hover { background: rgba(255, 0, 0, 0.05); }
        select { background: #000; color: #39d353; border: 1px solid #444; padding: 8px; font-family: 'Almendra'; font-size: 16px; border-radius: 4px; outline: none; cursor: pointer; }
        .save-btn { background: #39d353; color: black; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-family: 'Almendra'; margin-left: 10px; transition: 0.3s; }
        .save-btn:hover { background: #2fb947; transform: scale(1.1); }
        .back-btn { color: #5b5bff; cursor: pointer; text-decoration: underline; font-size: 18px; margin-bottom: 20px; align-self: flex-start; }
        #loading { font-size: 24px; color: #ffd600; margin-top: 50px; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; background: #222; color: #ccc; }
    </style>
</head>
<body>

    <div style="width: 900px; max-width: 95vw; display: flex; flex-direction: column;">
        <div class="back-btn" onclick="window.location.href='dashboard.html'"><< Zurück zum Dashboard</div>
        <div class="admin-container">
            <h1>User-Verwaltung</h1>
            <div id="loading">Datenbank wird geladen...</div>
            <table id="userTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Aktuelle Rolle</th>
                        <th>Beförderung / Änderung</th>
                    </tr>
                </thead>
                <tbody id="userBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsDDQNqz3UvmHOq9u0RAN2LbMAAW8QUOT_NCWI5JryhDKiiu3xDRgA_HRfxthvdIcC2g/exec';

        if (localStorage.getItem('bulls_role') !== "Admin") {
            alert("ZUTRITT VERWEIGERT!");
            window.location.href = "dashboard.html";
        }

        async function loadUsers() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const body = document.getElementById('userBody');
                body.innerHTML = "";

                data.slice(1).forEach(row => {
                    const name = row[0];
                    const currentRole = row[3] || "Gast";
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: bold; font-size: 18px;">${name}</td>
                        <td><span class="role-badge">${currentRole}</span></td>
                        <td>
                            <select id="sel-${name}">
                                <option value="Gast" ${currentRole === 'Gast' ? 'selected' : ''}>Gast</option>
                                <option value="Allianz Gast" ${currentRole === 'Allianz Gast' ? 'selected' : ''}>Allianz Gast</option>
                                <option value="Mitglied" ${currentRole === 'Mitglied' ? 'selected' : ''}>Mitglied</option>
                                <option value="Kampfdivision" ${currentRole === 'Kampfdivision' ? 'selected' : ''}>Kampfdivision</option>
                                <option value="Ausbilder" ${currentRole === 'Ausbilder' ? 'selected' : ''}>Ausbilder</option>
                                <option value="Offi" ${currentRole === 'Offi' ? 'selected' : ''}>Offi</option>
                                <option value="Admin" ${currentRole === 'Admin' ? 'selected' : ''}>Admin</option>
                            </select>
                            <button class="save-btn" onclick="updateUser(event, '${name}')">OK</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('userTable').style.display = 'table';
            } catch (e) {
                document.getElementById('loading').innerText = "Fehler beim Laden!";
            }
        }

        async function updateUser(evt, name) {
            const newRole = document.getElementById(`sel-${name}`).value;
            if(!confirm(`${name} zum ${newRole} machen?`)) return;

            const btn = evt.target;
            btn.innerText = "...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "updateRole", userName: name, newRole: newRole })
                });
                alert("Erfolgreich gesendet!");
                setTimeout(loadUsers, 1500);
            } catch (e) {
                alert("Fehler!");
                btn.innerText = "OK";
                btn.disabled = false;
            }
        }
        loadUsers();
    </script>
</body>
</html>
