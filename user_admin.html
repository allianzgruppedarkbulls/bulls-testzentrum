<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Bulls - Admin Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    :root { --red:#ff3131; --gold:#ffd600; --bg:#050505; --card:#0f0f0f; --green:#39d353; }
    body { background: var(--bg); color: white; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .admin-container { width: 1100px; max-width: 95vw; background: var(--card); padding: 25px; border: 2px solid var(--red); border-radius: 15px; box-shadow: 0 0 30px rgba(255, 49, 49, 0.3); }
    h1 { color: var(--red); text-transform: uppercase; text-align: center; margin: 0 0 20px 0; text-shadow: 0 0 10px red; }

    .search-box { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--green); font-family: 'Almendra'; font-size: 18px; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; }

    .table-wrapper { max-height: 420px; overflow-y: auto; border: 1px solid #222; border-radius: 8px; background: #000; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; background: #151515; color: var(--red); text-align: left; padding: 15px; border-bottom: 2px solid var(--red); }
    td { padding: 12px 15px; border-bottom: 1px solid #111; cursor: pointer; }
    tr:hover { background: #1a1a1a; }
    .selected-row { background: rgba(255, 49, 49, 0.25) !important; border-left: 4px solid var(--red); }

    .btn-row { display: flex; gap: 15px; margin-top: 10px; }
    .btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; border-radius: 5px; text-transform: uppercase; }
    .btn-edit { background: #444; color: #fff; }
    .btn-pin { background: var(--gold); color: #000; }
    .btn-del { background: var(--red); color: #fff; }
    .btn-back { background:#222; color:white; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modal */
    .overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; }
    .modal-card {
      width: 760px; max-width: 95vw;
      background: #111; border: 2px solid var(--red); border-radius: 14px;
      box-shadow: 0 0 40px rgba(255,49,49,0.35);
      padding: 22px;
    }
    .modal-title { margin: 0 0 10px; color: var(--red); text-transform: uppercase; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .field { display:flex; flex-direction: column; gap: 6px; }
    label { color: var(--red); font-size: 12px; text-transform: uppercase; }
    input, select {
      padding: 12px; border-radius: 6px; border: 1px solid #444;
      background: #000; color: #fff; font-family: 'Almendra'; font-size: 16px;
      outline: none;
    }
    input[readonly] { opacity: 0.85; }
    .modal-actions { display:flex; gap: 12px; margin-top: 16px; }
    .btn-save { background: var(--green); color:#000; }
    .btn-cancel { background: #700; color:#fff; }
    .hint { color:#888; font-size: 12px; margin-top: 8px; text-align:center; }

    .checks { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
    .check { display:flex; gap: 8px; align-items: center; font-size: 14px; color:#ddd; }
    .check input { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1>Dark Bulls Admin Center</h1>

    <input type="text" class="search-box" id="searchInput" placeholder="Spieler suchen..." onkeyup="filterTable()">

    <div class="table-wrapper">
      <table>
        <thead><tr><th>Spieler</th><th>Allianz</th><th>Rolle</th><th>Zusatz</th></tr></thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>

    <div class="btn-row">
      <button class="btn btn-edit" id="editBtn" onclick="openEditModal()" disabled>Bearbeiten</button>
      <button class="btn btn-pin" id="pinBtn" onclick="resetPin()" disabled>PIN Reset</button>
      <button class="btn btn-del" id="delBtn" onclick="deleteUser()" disabled>Löschen</button>
      <button class="btn btn-back" onclick="goBack()">Zurück</button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="overlay" id="editModal">
    <div class="modal-card">
      <h2 class="modal-title">User bearbeiten</h2>

      <div class="grid">
        <div class="field">
          <label>Spielername</label>
          <input id="mName" readonly>
          <label class="check" style="margin-top:6px;">
            <input type="checkbox" id="mRenameToggle" onchange="toggleRename()"> Name ändern
          </label>
          <input id="mNameNew" placeholder="Neuer Spielername" style="display:none;">
        </div>

        <div class="field">
          <label>Allianz</label>
          <select id="mAllianzSelect" onchange="toggleAllianzCustom()">
            <option value="">(leer)</option>
            <option value="Dark Bulls">Dark Bulls</option>
            <option value="Dark bulls Unit">Dark bulls Unit</option>
            <option value="Dark bulls Unit Leitung">Dark bulls Unit Leitung</option>
            <option value="Dark Bulls Leitung">Dark Bulls Leitung</option>
            <option value="Dark Bulls plus">Dark Bulls plus</option>
            <option value="__custom__">Andere…</option>
          </select>
          <input id="mAllianzCustom" placeholder="Eigene Allianz" style="display:none; margin-top:8px;">
        </div>

        <div class="field">
          <label>Rolle</label>
          <select id="mRole">
            <option value="Gast">Gast</option>
            <option value="Gäste">Gäste</option>
            <option value="Allianz Gast">Allianz Gast</option>
            <option value="Allianz Gäste">Allianz Gäste</option>
            <option value="Mitglied">Mitglied</option>
            <option value="Kampfdivision">Kampfdivision</option>
            <option value="Ausbilder">Ausbilder</option>
            <option value="Offizier">Offizier</option>
            <option value="Admin">Admin</option>
            <option value="Buchhalter">Buchhalter</option>
          </select>
        </div>

        <div class="field">
          <label>Zusätzliche Aufgaben (mehrfach)</label>
          <div class="checks" id="extraChecks">
            <label class="check"><input type="checkbox" value="Moderator"> Moderator</label>
            <label class="check"><input type="checkbox" value="Support"> Support</label>
            <label class="check"><input type="checkbox" value="Buchhalter"> Buchhalter</label>
            <label class="check"><input type="checkbox" value="Blackeinsicht"> Blackeinsicht</label>
            <label class="check"><input type="checkbox" value="ELO"> ELO</label>
            <label class="check"><input type="checkbox" value="Elo bearbeiter"> Elo bearbeiter</label>
            <label class="check"><input type="checkbox" value="Personalabteilung"> Personalabteilung</label>
          </div>
          <input id="mExtraCustom" placeholder="Weitere (optional, komma-getrennt)" style="margin-top:8px;">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-save" onclick="saveChanges()">Speichern</button>
        <button class="btn btn-cancel" onclick="closeEditModal()">Abbruch</button>
      </div>

      <div class="hint">PIN wird hier bewusst nicht bearbeitet (nur über PIN Reset).</div>
    </div>
  </div>

  <!-- PIN MODAL -->
  <div class="overlay" id="pinModal">
    <div class="modal-card" style="width:450px;">
      <h2 class="modal-title" style="color:var(--gold);">Einmalpasswort</h2>
      <div style="text-align:center; margin-top:10px;">
        <div style="color:#aaa;">Spieler:</div>
        <div id="pinUser" style="font-size:22px; margin:8px 0;"></div>
        <div id="newPinDisplay" style="font-size:56px; letter-spacing:10px; font-weight:bold;">####</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-back" onclick="closePinModal()">Fertig</button>
      </div>
    </div>
  </div>

  <script>
    if (!window.Bulls || !Bulls.requireLogin("index.html")) {}

    const SCRIPT_URL = (window.BULLS_CONFIG && window.BULLS_CONFIG.SCRIPT_URL) || "";
    const ME = Bulls.getUser();

    // Zugriff: Admin/Offi/Ausbilder oder Zusatzrollen Moderator/Personalabteilung
    function extrasList(s) {
      return String(s||"").split(",").map(x => x.trim()).filter(Boolean);
    }
    const allowedRoles = ["Admin", "Offizier", "Offi", "Ausbilder"];
    const allowedExtras = ["Moderator", "Personalabteilung"];
    const myExtras = extrasList(ME.extra);
    const hasAllowedExtra = myExtras.some(x => allowedExtras.includes(x));

    if (allowedRoles.indexOf(ME.role) === -1 && !hasAllowedExtra) {
      alert("Kein Zugriff.");
      window.location.href = "dashboard.html";
    }

    let selected = null; // {name, allianz, role, extra}

    function setButtons(enabled) {
      document.getElementById("editBtn").disabled = !enabled;
      document.getElementById("pinBtn").disabled = !enabled;
      document.getElementById("delBtn").disabled = !enabled;
    }

    function handleResponse(data) {
      const body = document.getElementById("userBody");
      body.innerHTML = "";

      const rows = (data && data.length) ? data : [];
      rows.forEach(function(row) {
        if (!row || !row[0] || row[0] === "Spielername ") return;

        const item = {
          name: row[0] || "",
          allianz: row[1] || "",
          role: row[3] || "",
          extra: row[4] || ""
        };

        const tr = document.createElement("tr");
        tr.onclick = function() {
          document.querySelectorAll("#userBody tr").forEach(function(el){ el.classList.remove("selected-row"); });
          tr.classList.add("selected-row");
          selected = item;
          setButtons(true);
        };

        tr.innerHTML =
          "<td>" + (item.name) + "</td>" +
          "<td>" + (item.allianz) + "</td>" +
          "<td>" + (item.role) + "</td>" +
          "<td>" + (item.extra) + "</td>";

        body.appendChild(tr);
      });

      setButtons(false);
      selected = null;
    }

    function loadData() {
      const script = document.createElement("script");
      script.src = SCRIPT_URL + "?action=listUsers&callback=handleResponse&t=" + Date.now();
      document.body.appendChild(script);
    }

    function filterTable() {
      const val = (document.getElementById("searchInput").value || "").toLowerCase();
      document.querySelectorAll("#userBody tr").forEach(function(tr) {
        tr.style.display = tr.innerText.toLowerCase().indexOf(val) >= 0 ? "" : "none";
      });
    }

    function toggleRename() {
      const on = document.getElementById("mRenameToggle").checked;
      document.getElementById("mNameNew").style.display = on ? "block" : "none";
      if (!on) document.getElementById("mNameNew").value = "";
    }

    function toggleAllianzCustom() {
      const v = document.getElementById("mAllianzSelect").value;
      const inp = document.getElementById("mAllianzCustom");
      inp.style.display = (v === "__custom__") ? "block" : "none";
      if (v !== "__custom__") inp.value = "";
    }

    function openEditModal() {
      if (!selected) return;

      // Reset UI
      document.getElementById("mRenameToggle").checked = false;
      toggleRename();

      document.getElementById("mName").value = selected.name;

      // Allianz: wenn nicht in Liste -> custom
      const allSelect = document.getElementById("mAllianzSelect");
      const allVal = selected.allianz || "";
      let foundAll = false;
      for (let i=0;i<allSelect.options.length;i++) if (allSelect.options[i].value === allVal) foundAll = true;
      if (allVal && !foundAll) {
        allSelect.value = "__custom__";
        toggleAllianzCustom();
        document.getElementById("mAllianzCustom").value = allVal;
      } else {
        allSelect.value = allVal;
        toggleAllianzCustom();
      }

      // Rolle
      const roleSelect = document.getElementById("mRole");
      roleSelect.value = selected.role || "Gast";

      // Extras (mehrfach)
      const extras = String(selected.extra||"").split(",").map(x => x.trim()).filter(Boolean);
      document.querySelectorAll("#extraChecks input[type=checkbox]").forEach(cb => {
        cb.checked = extras.includes(cb.value);
      });
      // Unbekannte Extras in Custom
      const known = Array.from(document.querySelectorAll("#extraChecks input[type=checkbox]")).map(x=>x.value);
      const unknown = extras.filter(x => !known.includes(x));
      document.getElementById("mExtraCustom").value = unknown.join(", ");

      document.getElementById("editModal").style.display = "flex";
    }

    function closeEditModal() {
      document.getElementById("editModal").style.display = "none";
    }

    function getAllianzValue() {
      const v = document.getElementById("mAllianzSelect").value;
      if (v === "__custom__") return document.getElementById("mAllianzCustom").value || "";
      return v || "";
    }

    function getExtrasValue() {
      const chosen = [];
      document.querySelectorAll("#extraChecks input[type=checkbox]").forEach(cb => {
        if (cb.checked) chosen.push(cb.value);
      });
      const extraCustom = (document.getElementById("mExtraCustom").value || "")
        .split(",").map(x => x.trim()).filter(Boolean);
      return chosen.concat(extraCustom).join(", ");
    }

    async function saveChanges() {
      if (!selected) return;

      const rename = document.getElementById("mRenameToggle").checked;
      const newName = rename ? (document.getElementById("mNameNew").value || "").trim() : selected.name;

      const payload = {
        action: "fullUpdate",
        oldName: selected.name,
        newName: newName,
        newAllianz: getAllianzValue(),
        newRole: document.getElementById("mRole").value || "Gast",
        newExtra: getExtrasValue()
      };

      await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });

      closeEditModal();
      alert("Gespeichert!");
      location.reload();
    }

    async function resetPin() {
      if (!selected) return;
      const pin = Math.floor(1000 + Math.random() * 9000);

      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({ action: "resetPin", userName: selected.name, newPin: String(pin) })
      });

      document.getElementById("pinUser").innerText = selected.name;
      document.getElementById("newPinDisplay").innerText = pin;
      document.getElementById("pinModal").style.display = "flex";
    }

    function closePinModal() {
      document.getElementById("pinModal").style.display = "none";
      location.reload();
    }

    async function deleteUser() {
      if (!selected) return;
      if (!confirm("User wirklich löschen: " + selected.name + " ?")) return;

      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify({ action: "deleteUser", userName: selected.name })
      });

      alert("Gelöscht!");
      location.reload();
    }

    function goBack() { window.location.href = "dashboard.html"; }

    window.onload = loadData;
  </script>
</body>
</html>
