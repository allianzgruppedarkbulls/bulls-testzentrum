<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - DROPDOWN PFLEGE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 650px; background-color: #0f0f0f; border: 1px solid #333; border-radius: 15px; padding: 40px; box-shadow: 0 0 60px 15px rgba(255, 49, 49, 0.2); text-align: center; }
        h1 { color: #ff3131; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 3px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }
        
        label { color: #5dade2; display: block; margin-bottom: 10px; font-style: italic; font-size: 18px; }
        select, input { width: 100%; padding: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; border-radius: 5px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: #ff3131; }

        .list-box { background: #000; border: 1px solid #222; height: 300px; overflow-y: auto; text-align: left; padding: 10px; margin-bottom: 20px; border-radius: 5px; border-top: 2px solid #ff3131; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; align-items: center; transition: 0.2s; }
        .list-item:hover { background: #111; }
        .list-item span { font-size: 18px; }
        
        .btn-del { background: #ff3131; color: #fff; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-family: 'Almendra'; text-transform: uppercase; font-size: 12px; }
        .btn-add { width: 100%; padding: 18px; background: #ff3131; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 20px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3); }
        .btn-add:hover { background: #fff; transform: scale(1.02); }
        
        .btn-back { display: block; margin-top: 25px; color: #666; text-decoration: none; text-transform: uppercase; font-size: 14px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dropdown Pflege</h1>
    
    <label>Welche Liste bearbeiten?</label>
    <select id="listType" onchange="loadCurrentList()">
        <option value="Anschuldigung">Anschuldigungen (B)</option>
        <option value="Spieler master">Spieler master (C)</option>
        <option value="Daten vorhanden">Daten vorhanden (F)</option>
        <option value="intervall">Intervall (J)</option>
        <option value="aktiv?">Aktiv-Status (L)</option>
        <option value="aktivität">Aktivität (M)</option>
        <option value="Maps">Maps (R)</option>
        <option value="Allianz Rang">Allianz Rang (V)</option>
        <option value="Allianzname">Allianzname (Tabelle 2)</option>
    </select>

    <div class="list-box" id="itemContainer">
        <p style="text-align:center; color:#444; margin-top:130px;">Lade Daten aus der Datenbank...</p>
    </div>

    <input type="text" id="newValue" placeholder="Neuen Eintrag für die Liste tippen...">
    <button class="btn-add" onclick="addItem()">Eintrag hinzufügen</button>

    <a href="Ad_AllEinst.html" class="btn-back">Zurück zur Zentrale</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let allData = {};

    async function loadCurrentList() {
        const container = document.getElementById("itemContainer");
        container.innerHTML = "<p style='text-align:center; margin-top:130px;'>Synchronisiere...</p>";
        
        try {
            const res = await fetch(API + "?action=getDropdownData");
            allData = await res.json();
            renderItems();
        } catch(e) { container.innerHTML = "Fehler bei der Funkverbindung!"; }
    }

    function renderItems() {
        const type = document.getElementById("listType").value;
        const container = document.getElementById("itemContainer");
        container.innerHTML = "";
        
        // Mapping der Keys aus dem Google Script
        const keyMap = {
            "Anschuldigung": "vorwuerfe",
            "Spieler master": "spielerMaster",
            "Daten vorhanden": "datenVorhanden",
            "intervall": "intervall",
            "aktiv?": "aktivStatus",
            "aktivität": "aktivitaet",
            "Maps": "maps",
            "Allianz Rang": "allianzRang",
            "Allianzname": "allianzen"
        };

        const list = allData[keyMap[type]] || [];

        if(list.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#444; margin-top:130px;'>Liste ist leer.</p>";
            return;
        }

        list.forEach(item => {
            const div = document.createElement("div");
            div.className = "list-item";
            div.innerHTML = `<span>${item}</span><button class="btn-del" onclick="deleteItem('${item}')">Löschen</button>`;
            container.appendChild(div);
        });
    }

    async function addItem() {
        const val = document.getElementById("newValue").value.trim();
        const type = document.getElementById("listType").value;
        if(!val) return;

        await sendUpdate(type, "add", val);
        document.getElementById("newValue").value = "";
        loadCurrentList();
    }

    async function deleteItem(val) {
        if(!confirm("Eintrag '" + val + "' wirklich aus der Datenbank löschen?")) return;
        const type = document.getElementById("listType").value;
        await sendUpdate(type, "delete", val);
        loadCurrentList();
    }

    async function sendUpdate(type, mode, value) {
        try {
            await fetch(API, {
                method: "POST",
                body: JSON.stringify({ action: "updateDropdowns", type: type, mode: mode, value: value })
            });
        } catch(e) { alert("Fehler beim Speichern!"); }
    }

    window.onload = loadCurrentList;
</script>
</body>
</html>
