<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - LISTEN PFLEGE</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 600px; background-color: #0f0f0f; border: 1px solid #333; border-radius: 15px; padding: 40px; box-shadow: 0 0 50px rgba(57, 211, 83, 0.15); text-align: center; }
        h1 { color: #39d353; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        
        select, input { width: 100%; padding: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; border-radius: 5px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        
        .list-box { background: #000; border: 1px solid #222; height: 250px; overflow-y: auto; text-align: left; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .list-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; align-items: center; }
        .list-item:hover { background: #0a0a0a; }
        
        .btn-del { background: #ff3131; color: #fff; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-family: 'Almendra'; }
        .btn-add { width: 100%; padding: 15px; background: #39d353; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 18px; text-transform: uppercase; }
        
        .btn-back { display: block; margin-top: 25px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Listen-Verwaltung</h1>
    
    <label style="color: #888; display: block; margin-bottom: 10px;">Welche Liste bearbeiten?</label>
    <select id="listType" onchange="loadCurrentList()">
        <option value="Allianzen">Allianzen</option>
        <option value="Vorwürfe">Verstöße / Vorwürfe</option>
        <option value="Maps">Karten / Maps</option>
    </select>

    <div class="list-box" id="itemContainer">
        <p style="text-align:center; color:#444;">Wähle eine Liste aus...</p>
    </div>

    <hr style="border:0; border-top: 1px solid #222; margin-bottom: 20px;">
    
    <input type="text" id="newValue" placeholder="Neuen Eintrag tippen...">
    <button class="btn-add" onclick="addItem()">Eintrag hinzufügen</button>

    <a href="dashboard.html" class="btn-back">ZURÜCK ZUM HAUPTMENÜ</a>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let currentData = {};

    async function loadCurrentList() {
        const type = document.getElementById("listType").value;
        const container = document.getElementById("itemContainer");
        container.innerHTML = "<p style='text-align:center;'>Lade Daten...</p>";

        try {
            const res = await fetch(API + "?action=getDropdownData");
            currentData = await res.json();
            renderItems(type);
        } catch(e) { container.innerHTML = "Fehler beim Laden."; }
    }

    function renderItems(type) {
        const container = document.getElementById("itemContainer");
        container.innerHTML = "";
        
        let list = [];
        if(type === "Allianzen") list = currentData.allianzen;
        else if(type === "Vorwürfe") list = currentData.vorwuerfe;
        else if(type === "Maps") list = currentData.maps;

        list.forEach(item => {
            const div = document.createElement("div");
            div.className = "list-item";
            div.innerHTML = `<span>${item}</span><button class="btn-del" onclick="deleteItem('${item}')">LÖSCHEN</button>`;
            container.appendChild(div);
        });
    }

    async function addItem() {
        const val = document.getElementById("newValue").value.trim();
        const type = document.getElementById("listType").value;
        if(!val) return;

        await sendUpdate(type, "add", val);
        document.getElementById("newValue").value = "";
        loadCurrentList();
    }

    async function deleteItem(val) {
        if(!confirm("Eintrag '" + val + "' wirklich entfernen?")) return;
        const type = document.getElementById("listType").value;
        await sendUpdate(type, "delete", val);
        loadCurrentList();
    }

    async function sendUpdate(type, mode, value) {
        try {
            await fetch(API, {
                method: "POST",
                body: JSON.stringify({ action: "updateDropdowns", type: type, mode: mode, value: value })
            });
        } catch(e) { alert("Fehler beim Speichern!"); }
    }

    window.onload = loadCurrentList;
</script>
</body>
</html>
