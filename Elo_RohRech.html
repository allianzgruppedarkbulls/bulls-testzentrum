<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - ROHSTOFFRECHNER</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 600px; background-color: #0f0f0f; border: 2px solid #5dade2; border-radius: 10px; padding: 30px; box-shadow: 0 0 20px rgba(91, 155, 213, 0.2); }
        
        h1 { color: #5dade2; text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; }
        .field label { color: #888; font-size: 16px; margin-bottom: 5px; }
        
        input { background: #000; border: 1px solid #333; color: #39d353; padding: 12px; font-family: 'Almendra'; font-size: 20px; border-radius: 5px; text-align: center; }
        input:focus { border-color: #5dade2; outline: none; }

        .result-box { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #5dade2; text-align: center; margin-top: 10px; }
        .result-box h3 { margin: 0 0 10px 0; color: #5dade2; text-transform: uppercase; }
        .total-val { font-size: 32px; color: #39d353; font-weight: bold; }

        .btn-calc { width: 100%; padding: 15px; background: #5dade2; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 20px; text-transform: uppercase; margin-top: 10px; }
        .btn-calc:hover { background: #fff; }
        
        .btn-back { display: block; text-align: center; margin-top: 25px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rohstoffrechner</h1>
    
    <div class="calc-grid">
        <div class="field">
            <label>Holz Bestand</label>
            <input type="number" id="holz" value="0" oninput="calculate()">
        </div>
        <div class="field">
            <label>Stein Bestand</label>
            <input type="number" id="stein" value="0" oninput="calculate()">
        </div>
        <div class="field">
            <label>Eisen Bestand</label>
            <input type="number" id="eisen" value="0" oninput="calculate()">
        </div>
        <div class="field">
            <label>Nahrung Bestand</label>
            <input type="number" id="nahrung" value="0" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <h3>Gesamtwert Ressourcen</h3>
        <div id="totalRes" class="total-val">0</div>
    </div>

    <button class="btn-calc" onclick="resetCalc()">Rechner Leeren</button>
    
    <a href="dashboard.html" class="btn-back">Zurück zum Panzer</a>
</div>

<script>
    function calculate() {
        const h = parseFloat(document.getElementById("holz").value) || 0;
        const s = parseFloat(document.getElementById("stein").value) || 0;
        const e = parseFloat(document.getElementById("eisen").value) || 0;
        const n = parseFloat(document.getElementById("nahrung").value) || 0;
        
        // Hier kannst du die Formel anpassen, falls Ressourcen unterschiedlich gewichtet sind
        const total = h + s + e + n;
        
        // Formatierung mit Tausender-Punkt
        document.getElementById("totalRes").innerText = total.toLocaleString('de-DE');
    }

    function resetCalc() {
        document.getElementById("holz").value = 0;
        document.getElementById("stein").value = 0;
        document.getElementById("eisen").value = 0;
        document.getElementById("nahrung").value = 0;
        calculate();
    }
</script>
</body>
</html>
