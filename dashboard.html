<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz Zentrale</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: black; font-family: 'Almendra', serif; color: white; overflow: hidden; }
        #dashboard-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 750px; max-width: 95vw; filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.8)); z-index: 1; }
        
        .header { position: absolute; top: 15px; right: 20px; display: flex; align-items: center; gap: 15px; z-index: 100; }
        .user-info { color: #ff3131; font-size: 20px; }
        .logout-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: 'Almendra'; border-radius: 4px; text-transform: uppercase; }
        
        /* Die Haupt-Container Logik */
        .side-container { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; padding: 40px; box-sizing: border-box; z-index: 10; }
        .left-side, .right-side { display: flex; flex-direction: column; width: 320px; height: 90vh; }
        
        .left-side { justify-content: space-between; } 
        .right-side { justify-content: space-between; align-items: flex-end; }

        .card { background: rgba(0, 0, 0, 0.9); padding: 18px; border: 2px solid #ff3131; border-radius: 12px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); width: 100%; box-sizing: border-box; }
        
        /* Admin Box tiefer setzen */
        #box-admin { margin-top: 45px; } 

        .card h2 { color: #ff3131; margin: 0 0 12px 0; font-size: 20px; text-decoration: underline; text-align: left; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .card-btn, .admin-btn { 
            background: #39d353; color: black; border: none; padding: 12px; 
            cursor: pointer; font-family: 'Almendra'; font-weight: bold; 
            border-radius: 5px; font-size: 15px; width: 100%; transition: 0.2s; 
            text-transform: uppercase; outline: none;
        }
        .card-btn:hover, .admin-btn:hover { background: #2fb145; transform: scale(1.02); }
        
        .chat-btn-container { width: 100%; display: flex; justify-content: flex-end; }
        .chat-btn { background: #ff8c00; color: black; border: none; padding: 15px 45px; font-size: 24px; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Almendra'; box-shadow: 0 0 25px rgba(255, 140, 0, 0.5); }
        
        /* WICHTIG: Das hat gefehlt! Macht das Ausblenden erst wirksam */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <img src="bulls_dashboard.jpg" id="dashboard-bg">

    <div class="header">
        <div class="user-info" id="userDisplay">Lädt...</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

   <div class="side-container">
    <div class="left-side">
        <div class="card" id="box-perso">
            <h2>Persönlich</h2>
            <div class="btn-stack">
                <button class="card-btn" onclick="window.location.href='Per_Statistik.html'">Eigene Statistik</button>
                <button class="card-btn" onclick="window.location.href='Per_Pin.html'">Pin ändern</button>
                <button class="card-btn" onclick="window.location.href='Per_Supp.html'">Support Chat</button>
            </div>
        </div>

        <div class="card" id="box-blacklist">
            <h2>Freundschaft +</h2>
            <div class="btn-stack">
                <button class="card-btn" onclick="window.location.href='Freun_SpiMel.html'">Spieler Melden</button>
                <button class="card-btn" onclick="window.location.href='Freun_Ansch.html'">Anschauen</button>
            </div>
        </div>

        <div class="card" id="box-pflege">
            <h2>Freundschaft + Pflege</h2>
            <div class="grid-2">
                <button class="card-btn" onclick="window.location.href='FreunPfl_Gemel.html'">Gemeldete</button>
                <button class="card-btn" onclick="window.location.href='FreunPfl_Pflege.html'">Pflege</button>
                <button class="card-btn" onclick="window.location.href='FreunPfl_Eintrag.html'">Eintragen</button>
                <button class="card-btn" onclick="window.location.href='FreunPfl_VAnsicht.html'">Vollansicht</button>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="card" id="box-admin">
            <h2>Admin</h2>
            <div class="btn-stack">
                <button class="card-btn" onclick="window.location.href='Ad_UsVer.html'">User-Verwaltung</button>
                <button class="card-btn" onclick="window.location.href='Ad_ChVer.html'">Chat Verwaltung</button>
                <button class="admin-btn" onclick="window.location.href='Ad_AllEinst.html'">Allg. Einstellungen</button>
            </div>
        </div>

        <div class="card" id="box-elo"> 
            <h2>Elo Bereich</h2>
            <div class="btn-stack">
                <button class="card-btn" onclick="window.location.href='Elo_RohRech.html'">Rohstoffrechner</button>
                <button class="card-btn" onclick="window.location.href='Elo_EinRech.html'">Einheiten Rechner</button>
            </div>
        </div>

        <div class="chat-btn-container" id="box-allichat">
            <button class="chat-btn" onclick="window.location.href='Chat.html'">ALLIANZ CHAT</button>
        </div>
    </div>
</div>

    <script>
        const user = localStorage.getItem('bulls_user');
        // trim() entfernt unsichtbare Leerzeichen aus der Tabelle
        const role = localStorage.getItem('bulls_role') ? localStorage.getItem('bulls_role').trim() : "";
        const extra = localStorage.getItem('bulls_extra') || "";

        if (!user) {
            window.location.href = "index.html";
        } else {
            let displayRole = role;
            if(extra) displayRole += " | " + extra;
            document.getElementById('userDisplay').innerText = user + " (" + displayRole + ")";
            applyPermissions(role, extra);
            
            // Startet den Check für die Dashboard-Ankündigung
            checkNews(); 
        }

        async function checkNews() {
            try {
                const res = await fetch(window.BULLS_CONFIG.SCRIPT_URL + "?action=getGlobalSettings");
                const s = await res.json();
                
                if (s.newsActive && s.newsMsg) {
                    const newsDiv = document.createElement("div");
                    newsDiv.id = "newsOverlay";
                    newsDiv.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; justify-content:center; align-items:center; padding:20px; font-family:'Almendra';";
                    newsDiv.innerHTML = `
                        <div style="background:#111; border:2px solid #ff3131; padding:40px; border-radius:15px; text-align:center; max-width:500px; box-shadow:0 0 40px rgba(255,49,49,0.5);">
                            <h2 style="color:#ff3131; text-transform:uppercase; margin-top:0; letter-spacing:2px;">⚠️ System-Meldung</h2>
                            <p style="color:#fff; font-size:22px; margin:20px 0; line-height:1.4;">${s.newsMsg}</p>
                            <button onclick="document.getElementById('newsOverlay').remove()" style="background:#ff3131; color:#fff; border:none; padding:12px 40px; font-family:'Almendra'; font-weight:bold; cursor:pointer; border-radius:5px; text-transform:uppercase; font-size:18px; box-shadow:0 0 15px red;">Verstanden</button>
                        </div>
                    `;
                    document.body.appendChild(newsDiv);
                }
            } catch(e) { console.log("Ankündigungs-Fehler."); }
        }

        function applyPermissions(r, ex) {
            const boxPerso = document.getElementById('box-perso');
            const boxBlacklist = document.getElementById('box-blacklist');
            const boxPflege = document.getElementById('box-pflege');
            const boxAdmin = document.getElementById('box-admin');
            const boxElo = document.getElementById('box-elo');
            const boxAlliChat = document.getElementById('box-allichat');

            // 1. ZUERST ALLES KRITISCHE GRUNDSÄTZLICH VERSTECKEN (Sicherheits-Modus)
            boxBlacklist.classList.add('hidden');
            boxPflege.classList.add('hidden');
            boxAdmin.classList.add('hidden');
            boxElo.classList.add('hidden');
            boxAlliChat.classList.add('hidden');

            // 2. RECHTE STUFENWEISE FREISCHALTEN
            if (r === "Allianz Gast") {
                boxAlliChat.classList.remove('hidden');
            }
            else if (r === "Mitglied" || r === "Kampfdivision") {
                boxBlacklist.classList.remove('hidden');
                boxAlliChat.classList.remove('hidden');
                if (ex.includes("ELO")) boxElo.classList.remove('hidden');
            }
            else if (["Admin", "Offizier", "Offi"].includes(r)) {
                boxBlacklist.classList.remove('hidden');
                boxPflege.classList.remove('hidden');
                boxAdmin.classList.remove('hidden');
                boxElo.classList.remove('hidden');
                boxAlliChat.classList.remove('hidden');
            }

            // 3. ZUSATZROLLEN EXTRA PRÜFEN
            if (ex.includes("Buchhalter") || ex.includes("Moderator")) {
                boxPflege.classList.remove('hidden');
            }
            if (ex.includes("ELO")) {
                boxElo.classList.remove('hidden');
            }
            
            // Wenn es ein reiner "Gast" ist, bleibt oben alles blockiert (nur "Persönlich" bleibt sichtbar)
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
