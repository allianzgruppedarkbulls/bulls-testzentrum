<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* GRUND-LAYOUT (Zentriert & Stabil) */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100vh; 
            background-color: black;
            font-family: 'Almendra', serif; 
            color: white; 
            overflow: hidden; 
            display: flex; /* Zentriert alles im Body */
            align-items: center; 
            justify-content: center;
        }

        /* DAS RICHTIGE BILD (Zentriert und Größe fixiert) */
        #dashboard-bg { 
            position: fixed; 
            /* HIER IST DIE GRÖSSE, DIE WIR LASSEN */
            width: 600px; 
            max-width: 90vw; 
            height: auto; 
            object-fit: contain; 
            
            /* LEUCHTEN & SCHATTEN */
            filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.7)); 
            
            z-index: 1; /* Liegt VOR dem schwarzen Hintergrund, aber HINTER dem Grid */
        }

        /* HEADER */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .user-info { font-size: 20px; color: #eee; }
        .logout-btn { padding: 8px 15px; background: #ff3131; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-family: 'Almendra'; }

        /* BOXEN GRID (Über dem Bild) */
        .grid-container {
            display: flex;
            gap: 30px;
            z-index: 10; /* Z-Index höher als das Bild! */
        }
        .card { 
            background: rgba(0, 0, 0, 0.8); /* Starker Hintergrund für Lesbarkeit */
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid #ff3131; /* Roter Rahmen wie vorne */
            text-align: center; 
            width: 220px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        .card h2 { color: #ff3131; margin-top: 0; margin-bottom: 20px; font-size: 24px;}
        .card-btn { width: 100%; padding: 12px; background: #39d353; border: none; cursor: pointer; color: black; border-radius: 5px; font-family: 'Almendra'; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <img src="https://image-gen.com/a/darkbulls_muscular_logo.png" id="dashboard-bg">

    <div class="header">
        <div class="user-info" id="userDisplay">Lädt...</div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Persönlich</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Pin ändern</button>
        </div>
        <div class="card">
            <h2>Black Liste</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Anschauen</button>
        </div>
        <div class="card">
            <h2>Admin</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Verwaltung</button>
        </div>
    </div>

    <script>
        // Check & Anzeige (unverändert)
        if (!localStorage.getItem('bulls_user')) {
            window.location.href = "index.html";
        } else {
            document.getElementById('userDisplay').innerText = `${localStorage.getItem('bulls_user')} (${localStorage.getItem('bulls_role')})`;
        }

        function logout() {
            localStorage.removeItem('bulls_user');
            localStorage.removeItem('bulls_role');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
