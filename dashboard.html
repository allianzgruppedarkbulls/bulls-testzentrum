<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* GRUND-LAYOUT (Fixiert wie auf der Startseite) */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100vh; 
            background-color: black;
            font-family: 'Almendra', serif; 
            color: white; 
            overflow: hidden; /* Verhindert Scrollen */
        }

        /* HINTERGRUND-BILD-KONTROLLE (Das war das Problem) */
        #dashboard-bg { 
            position: fixed; 
            top: 50%; /* Ab in die Mitte */
            left: 50%;
            transform: translate(-50%, -50%); /* Exakt zentrieren */
            
            /* HIER WIRD DIE GRÖSSE EINGESTELLT */
            width: 600px; /* GLEICHE BREITE WIE AUF DER STARTSEITE */
            max-width: 90vw; /* Damit es auf Handys nicht abgeschnitten wird */
            
            height: auto; 
            object-fit: contain; /* Bild wird nicht verzerrt */
            
            /* DAS ROTE LEUCHTEN (Vom alten Code) */
            filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.6)); 
            
            z-index: -1; /* Liegt hinter den Buttons */
        }

        /* HEADER-BEREICH (Benutzer und Logout) */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .user-info { font-size: 20px; color: #eee; }
        .logout-btn { padding: 8px 15px; background: #ff3131; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-family: 'Almendra'; }

        /* BUTTONS GRID (Zentral auf der Seite) */
        .grid-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            z-index: 5;
        }
        .card { background: rgba(0, 0, 0, 0.7); padding: 25px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .card h2 { color: #ff3131; margin-top: 0; }
        .card-btn { width: 100%; padding: 12px; background: #39d353; border: none; cursor: pointer; color: black; border-radius: 5px; font-family: 'Almendra'; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <img src="https://image-gen.com/a/darkbulls_logo.png" id="dashboard-bg">

    <div class="header">
        <div class="user-info" id="userDisplay">Julian (Admin)</div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Persönlich</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Pin ändern</button>
        </div>
        <div class="card">
            <h2>Black Liste</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Anschauen</button>
        </div>
        <div class="card">
            <h2>Admin</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Verwaltung</button>
        </div>
    </div>

    <script>
        // Checken ob User eingeloggt ist (Standard-Schutz)
        if (!localStorage.getItem('bulls_user')) {
            window.location.href = "index.html";
        } else {
            // Namen anzeigen
            document.getElementById('userDisplay').innerText = `${localStorage.getItem('bulls_user')} (${localStorage.getItem('bulls_role')})`;
        }

        function logout() {
            localStorage.removeItem('bulls_user');
            localStorage.removeItem('bulls_role');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
