<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz Zentrale</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: black; font-family: 'Almendra', serif; color: white; overflow: hidden; }
        #dashboard-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 750px; max-width: 95vw; filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.8)); z-index: 1; }
        
        .header { position: absolute; top: 15px; right: 20px; display: flex; align-items: center; gap: 15px; z-index: 100; }
        .user-info { color: #ff3131; font-size: 20px; }
        .logout-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: 'Almendra'; border-radius: 4px; text-transform: uppercase; }
        
        /* Haupt-Container Logik */
        .side-container { position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-between; padding: 40px; box-sizing: border-box; z-index: 10; }
        .left-side, .right-side { display: flex; flex-direction: column; width: 320px; height: 90vh; }
        
        .left-side { justify-content: space-between; } 
        .right-side { justify-content: space-between; align-items: flex-end; }

        /* KORREKTUR: Alle Boxen und Steuerungselemente starten standardmäßig unsichtbar */
        .card, .chat-btn-container { 
            background: rgba(0, 0, 0, 0.9); padding: 18px; border: 2px solid #ff3131; border-radius: 12px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); width: 100%; box-sizing: border-box; 
            display: none; 
        }
        .chat-btn-container { display: none; width: 100%; justify-content: flex-end; border: none; background: none; box-shadow: none; padding: 0; }
        
        #box-admin { margin-top: 45px; } 

        .card h2 { color: #ff3131; margin: 0 0 12px 0; font-size: 20px; text-decoration: underline; text-align: left; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        /* KORREKTUR: Alle Buttons starten ebenfalls unsichtbar */
        .card-btn, .admin-btn { 
            display: none;
            background: #39d353; color: black; border: none; padding: 12px; 
            cursor: pointer; font-family: 'Almendra'; font-weight: bold; 
            border-radius: 5px; font-size: 15px; width: 100%; transition: 0.2s; 
            text-transform: uppercase; outline: none;
        }
        .card-btn:hover, .admin-btn:hover { background: #2fb145; transform: scale(1.02); }
        
        .chat-btn { display: block; background: #ff8c00; color: black; border: none; padding: 15px 45px; font-size: 24px; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Almendra'; box-shadow: 0 0 25px rgba(255, 140, 0, 0.5); }
        
        /* Macht das Element unwiderruflich unsichtbar */
        .hidden { display: none !important; }
        /* Macht das Element sichtbar, wenn die Berechtigung erteilt wurde */
        .visible-block { display: block !important; }
        .visible-flex { display: flex !important; }
    </style>
</head>
<body>

    <img src="bulls_dashboard.jpg" id="dashboard-bg">

    <div class="header">
        <div class="user-info" id="userDisplay">Lädt...</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

   <div class="side-container">
    <div class="left-side">
        <div class="card" id="box-perso">
            <h2>Persönlich</h2>
            <div class="btn-stack">
                <button class="card-btn" id="btn-statistik" onclick="window.location.href='Per_Statistik.html'">Eigene Statistik</button>
                <button class="card-btn" id="btn-pin" onclick="window.location.href='Per_Pin.html'">Pin ändern</button>
                <button class="card-btn" id="btn-support" onclick="window.location.href='Chat_Support.html'">Support Chat</button>
            </div>
        </div>

        <div class="card" id="box-blacklist">
            <h2>Freundschaft +</h2>
            <div class="btn-stack">
                <button class="card-btn" id="btn-melden" onclick="window.location.href='Freun_SpiMel.html'">Spieler Melden</button>
                <button class="card-btn" id="btn-anschauen" onclick="window.location.href='Freun_Ansch.html'">Anschauen</button>
            </div>
        </div>

        <div class="card" id="box-pflege">
            <h2>Freundschaft + Pflege</h2>
            <div class="grid-2">
                <button class="card-btn" id="btn-gemeldete" onclick="window.location.href='FreunPfl_Gemel.html'">Gemeldete</button>
                <button class="card-btn" id="btn-pflege" onclick="window.location.href='FreunPfl_Pflege.html'">Pflege</button>
                <button class="card-btn" id="btn-eintragen" onclick="window.location.href='FreunPfl_Eintrag.html'">Eintragen</button>
                <button class="card-btn" id="btn-vollansicht" onclick="window.location.href='FreunPfl_VAnsicht.html'">Vollansicht</button>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="card" id="box-admin">
            <h2>Admin</h2>
            <div class="btn-stack">
                <button class="card-btn" id="btn-user-ver" onclick="window.location.href='Ad_UsVer.html'">User-Verwaltung</button>
                <button class="card-btn" id="btn-chat-ver" onclick="window.location.href='Ad_ChVer.html'">Chat Verwaltung</button>
                <button class="admin-btn" id="btn-allg-einst" onclick="window.location.href='Ad_AllEinst.html'">Allg. Einstellungen</button>
            </div>
        </div>

        <div class="card" id="box-elo"> 
            <h2>Elo Bereich</h2>
            <div class="btn-stack">
                <button class="card-btn" id="btn-rohstoffe" onclick="window.location.href='Elo_RohRech.html'">Rohstoffrechner</button>
                <button class="card-btn" id="btn-einheiten" onclick="window.location.href='Elo_EinRech.html'">Einheiten Rechner</button>
                <button class="card-btn" id="btn-groupchat" onclick="window.location.href='Chat_Group.html'">Taktische Gruppen</button>
            </div>
        </div>

        <div class="chat-btn-container" id="box-allichat">
            <button class="chat-btn" id="btn-allichat" onclick="window.location.href='Chat_PN.html'">ALLIANZ CHAT</button>
        </div>
    </div>
</div>

    <script>
        const user = localStorage.getItem('bulls_user');
        const role = localStorage.getItem('bulls_role') ? localStorage.getItem('bulls_role').trim() : "";
        const extra = localStorage.getItem('bulls_extra') || "";

        if (!user) {
            window.location.href = "index.html";
        } else {
            if (role === "Anwärter") {
                window.location.href = "Chat_PN.html";
            } else {
                let displayRole = role;
                if(extra) displayRole += " | " + extra;
                document.getElementById('userDisplay').innerText = user + " (" + displayRole + ")";
                
                applyDashboardPermissions();
                checkNews(); 
            }
        }

        async function checkNews() {
            if (sessionStorage.getItem('bulls_news_seen') === 'true') return;
            try {
                const res = await fetch(window.BULLS_CONFIG.SCRIPT_URL + "?action=getGlobalSettings");
                const s = await res.json();
                if (s.newsActive && s.newsMsg) {
                    const newsDiv = document.createElement("div");
                    newsDiv.id = "newsOverlay";
                    newsDiv.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; justify-content:center; align-items:center; padding:20px; font-family:'Almendra';";
                    newsDiv.innerHTML = `
                        <div style="background:#111; border:2px solid #ff3131; padding:40px; border-radius:15px; text-align:center; max-width:500px; box-shadow:0 0 40px rgba(255,49,49,0.5);">
                            <h2 style="color:#ff3131; text-transform:uppercase; margin-top:0; letter-spacing:2px;">⚠️ System-Meldung</h2>
                            <p style="color:#fff; font-size:22px; margin:20px 0; line-height:1.4;">${s.newsMsg}</p>
                            <button onclick="confirmNews()" style="background:#ff3131; color:#fff; border:none; padding:12px 40px; font-family:'Almendra'; font-weight:bold; cursor:pointer; border-radius:5px; text-transform:uppercase; font-size:18px; box-shadow:0 0 15px red;">Verstanden</button>
                        </div>
                    `;
                    document.body.appendChild(newsDiv);
                }
            } catch(e) { console.log("Ankündigungs-Fehler."); }
        }

        function confirmNews() {
            sessionStorage.setItem('bulls_news_seen', 'true');
            const overlay = document.getElementById('newsOverlay');
            if (overlay) overlay.remove();
        }

        // ===================================================
        // DYNAMISCHER AUTOPILOT MIT ABSOLUTEM BLITZ-SCHUTZ
        // ===================================================
        async function applyDashboardPermissions() {
            const userRole = localStorage.getItem('bulls_role') || 'Mitglied';
            const userExtra = localStorage.getItem('bulls_extra') || ''; 
            const userPrivileges = [userRole, ...userExtra.split(',').map(s => s.trim())].filter(Boolean);
            
            try {
                const res = await fetch(window.BULLS_CONFIG.SCRIPT_URL + "?action=getDashboardMatrix");
                const matrix = await res.json();

                matrix.forEach(item => {
                    const element = document.getElementById(item.id);
                    if (element) {
                        if (item.status === "Deaktiviert") {
                            element.className = "card-btn hidden"; 
                            return;
                        }

                        const hasAccess = userPrivileges.includes("Admin") || item.allowed.some(role => userPrivileges.includes(role));

                        if (hasAccess) {
                            element.style.display = "block";
                        } else {
                            element.className = "card-btn hidden";
                        }
                    }
                });

                // Prüfe die Boxen-Rahmen und schalte sie erst ein, wenn sie erlaubte Inhalte enthalten
                checkCardVisibility('box-perso');
                checkCardVisibility('box-blacklist');
                checkCardVisibility('box-pflege');
                checkCardVisibility('box-admin');
                checkCardVisibility('box-elo');
                
                // Allianz-Chat Kachel am Ende aktivieren
                document.getElementById('box-allichat').classList.add('visible-flex');

            } catch (e) {
                console.error("Fehler im Dashboard-Autopiloten:", e);
                document.getElementById('box-allichat').classList.add('visible-flex');
            }
        }

        function checkCardVisibility(cardId) {
            const card = document.getElementById(cardId);
            if (!card) return;
            const buttons = card.querySelectorAll('.card-btn, .admin-btn');
            let visibleButtons = 0;
            buttons.forEach(btn => {
                if (btn.style.display === "block") {
                    visibleButtons++;
                }
            });
            if (visibleButtons > 0) {
                card.classList.add('visible-block');
            } else {
                card.className = "card hidden";
            }
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
