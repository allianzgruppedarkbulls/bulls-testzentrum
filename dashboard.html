<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Allianz System V12.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background-color: black; 
            font-family: 'Almendra', serif; color: white; overflow: hidden;
        }

        /* DAS LOGO: Zentral im Hintergrund */
        #dashboard-bg { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 750px; /* Gleiche Größe wie auf der Startseite */
            max-width: 95vw;
            filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.6));
            z-index: 1;
        }

        /* HEADER: Name und Logout */
        .header {
            position: absolute;
            top: 15px; right: 20px;
            display: flex; align-items: center; gap: 15px;
            z-index: 100;
        }
        .user-info { color: #ff3131; font-size: 18px; }
        .logout-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: 'Almendra'; border-radius: 4px; text-transform: uppercase; }

        /* BOXEN-LAYOUT: Verteilung an den Seiten */
        .side-container {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            justify-content: space-between;
            padding: 60px 40px;
            box-sizing: border-box;
            z-index: 10;
        }

        .left-side, .right-side {
            display: flex; flex-direction: column; justify-content: space-between;
            width: 280px;
        }

        .card { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 15px; 
            border: 1px solid #333; 
            border-radius: 10px; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card h2 { color: #ff3131; margin: 0 0 10px 0; font-size: 18px; text-decoration: underline; }
        .btn-stack { display: flex; flex-direction: column; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .card-btn { 
            background: #39d353; color: black; border: none; padding: 10px; 
            cursor: pointer; font-family: 'Almendra'; font-weight: bold; border-radius: 4px;
            font-size: 14px;
        }

        /* ALLIANZ CHAT BUTTON UNTEN RECHTS */
        .chat-btn {
            position: absolute;
            bottom: 30px; right: 30px;
            background: #ff8c00; color: black; border: none;
            padding: 15px 40px; font-size: 22px; font-weight: bold;
            border-radius: 8px; cursor: pointer; font-family: 'Almendra';
            z-index: 100; box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
        }
    </style>
</head>
<body>

    <img src="bulls_dashboard.jpg" id="dashboard-bg">

    <div class="header">
        <div class="user-info" id="userDisplay">Julian (Admin)</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="side-container">
        <div class="left-side">
            <div class="card">
                <h2>Persönlich</h2>
                <div class="btn-stack">
                    <button class="card-btn">Pin ändern</button>
                    <button class="card-btn">Support Chat</button>
                </div>
            </div>

            <div class="card">
                <h2>Black Liste</h2>
                <div class="btn-stack">
                    <button class="card-btn">Sp. Melden</button>
                    <button class="card-btn">Anschauen</button>
                </div>
            </div>

            <div class="card">
                <h2>Pflege Admin</h2>
                <div class="grid-2">
                    <button class="card-btn">Gemeldete</button>
                    <button class="card-btn">Pflege</button>
                    <button class="card-btn">Eintragen</button>
                    <button class="card-btn">Volle Ansicht</button>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="card">
                <h2>Admin</h2>
                <button class="card-btn" style="width: 100%;">User-Verwaltung</button>
            </div>

            <div class="card">
                <h2>Elo Bereich</h2>
                <button class="card-btn" style="width: 100%;">Rohstoffrechner</button>
            </div>
        </div>
    </div>

    <button class="chat-btn">ALLIANZ CHAT</button>

    <script>
        const user = localStorage.getItem('bulls_user');
        const role = localStorage.getItem('bulls_role');
        if (!user) {
            window.location.href = "index.html";
        } else {
            document.getElementById('userDisplay').innerText = user + " (" + role + ")";
        }

        function logout() {
            localStorage.removeItem('bulls_user');
            localStorage.removeItem('bulls_role');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
