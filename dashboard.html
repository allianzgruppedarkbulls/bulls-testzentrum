<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Almendra'; }
        #bg { position: fixed; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.4; }
        #nav { background: rgba(0,0,0,0.8); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #ff3131; }
        .container { padding: 80px 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { background: rgba(20,20,20,0.9); border: 1px solid #444; padding: 20px; border-radius: 10px; width: 250px; text-align: center; }
        .panel h2 { color: #ff3131; text-decoration: underline; }
        button { width: 100%; padding: 10px; margin: 5px 0; background: #39d353; border: none; font-weight: bold; cursor: pointer; font-family: 'Almendra'; }
    </style>
</head>
<body>
    <img src="bulls_dashboard.jpg" id="bg">
    <div id="nav">
        <div id="info"></div>
        <button onclick="location.href='index.html'" style="width:auto; background:red; color:white;">LOGOUT</button>
    </div>
    <div class="container">
        <div class="panel" id="p_perso"><h2>Persönlich</h2><button>Pin ändern</button></div>
        <div class="panel" id="p_black"><h2>Black Liste</h2><button>Anschauen</button></div>
        <div class="panel" id="p_admin"><h2>Admin</h2><button>Verwaltung</button></div>
    </div>
    <script>
        const name = localStorage.getItem('bulls_user');
        const role = localStorage.getItem('bulls_role');
        if(!name) window.location.href = "index.html";
        document.getElementById('info').innerText = name + " (" + role + ")";
        
        // RECHTE-CHECK
        if(role === "Gast") {
            document.getElementById('p_black').remove();
            document.getElementById('p_admin').remove();
        }
        if(role === "Mitglied") {
            document.getElementById('p_admin').remove();
        }
    </script>
</body>
</html>
