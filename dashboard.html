<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Bulls - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background-color: black; 
            font-family: 'Almendra', serif; color: white; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* DAS BILD: Exakt wie auf der Startseite */
        #dashboard-bg { 
            position: absolute;
            width: 750px; 
            max-width: 100vw; 
            filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); 
            z-index: 1; /* Vor dem schwarzen Hintergrund */
        }

        /* HEADER */
        .header {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .user-info { font-size: 18px; color: #fff; }
        .logout-btn { padding: 5px 15px; background: #ff0000; color: white; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; border-radius: 3px; }

        /* BOXEN GRID */
        .grid-container {
            display: flex;
            gap: 20px;
            z-index: 10; /* Über dem Bild */
        }
        
        .card { 
            background: rgba(0, 0, 0, 0.85); /* Etwas dunkler für bessere Lesbarkeit */
            padding: 20px; 
            border: 2px solid #ff3131; 
            border-radius: 15px; 
            width: 200px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); 
        }

        .card h2 { color: #ff3131; margin-bottom: 15px; text-decoration: underline; font-size: 22px; }
        .card-btn { width: 100%; padding: 10px; background: #39d353; border: none; cursor: pointer; color: black; font-family: 'Almendra'; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <img src="bulls_start.jpg" id="dashboard-bg">

    <div class="header">
        <div id="userDisplay">Lädt...</div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Persönlich</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Pin ändern</button>
        </div>
        <div class="card">
            <h2>Black Liste</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Anschauen</button>
        </div>
        <div class="card">
            <h2>Admin</h2>
            <button class="card-btn" onclick="alert('Funktion folgt')">Verwaltung</button>
        </div>
    </div>

    <script>
        // Sicherheit & Anzeige
        const user = localStorage.getItem('bulls_user');
        const role = localStorage.getItem('bulls_role');

        if (!user) {
            window.location.href = "index.html";
        } else {
            document.getElementById('userDisplay').innerText = user + " (" + role + ")";
        }

        function logout() {
            localStorage.removeItem('bulls_user');
            localStorage.removeItem('bulls_role');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
