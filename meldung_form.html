<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SPIELER MELDEN - DARK BULLS</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 950px; background-color: #0f0f0f; border: 1px solid #333; border-radius: 10px; padding: 30px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        h1 { color: #ff3131; text-align: center; font-size: 42px; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        .section-title { color: #5dade2; font-style: italic; border-bottom: 1px solid #5dade2; margin: 20px 0 15px 0; font-size: 22px; padding-bottom: 5px; }
        .info-grid { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        
        input, select, textarea { 
            background: #000; border: 1px solid #444; color: #39d353; 
            font-family: 'Almendra'; font-size: 18px; padding: 8px; border-radius: 5px; outline: none; 
        }
        input:focus, textarea:focus { border-color: #ff3131; }

        /* Kasten für Beschreibung deutlich größer */
        .desc-label { color: #f1c40f; font-weight: bold; font-size: 20px; margin-bottom: 10px; display: block; }
        .desc-sub { color: #888; font-size: 14px; font-style: italic; margin-bottom: 5px; display: block; }
        textarea { width: 100%; height: 250px; box-sizing: border-box; resize: vertical; }

        .witness-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 10px; }
        .witness-col { display: flex; flex-direction: column; gap: 10px; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 15px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Almendra'; font-size: 16px; text-transform: uppercase; border: none; min-width: 180px; }
        .btn-submit { background: #ff3131; color: white; }
        .btn-back { background: #444; color: white; }
        .btn-support { background: #f1c40f; color: black; } /* Gelber Support Button */
        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>SPIELER MELDEN</h1>

    <div class="section-title">Daten des Gegners</div>
    <div class="info-grid">
        <div class="field"><label>Spielername ID</label><input type="text" id="mID" placeholder="z.B. 1234567"></div>
        <div class="field"><label>Spielername</label><input type="text" id="mName" placeholder="Name"></div>
        <div class="field">
            <label>Allianz</label>
            <select id="mAlli">
                <option value="Ohne Allianz">Ohne Allianz</option>
                <option value="Allianz in Beschreibung geschrieben">Allianz in Beschreibung geschrieben</option>
                </select>
        </div>
        
        <div class="field"><label>Spieler angemeldet am</label><input type="date" id="mJoin"></div>
        <div class="field">
            <label>Meistgespielte Map</label>
            <select id="mMap"><option>Lädt Karten...</option></select>
        </div>
        <div class="field">
            <label>Verstoß</label>
            <select id="mVerstoss"><option>Lädt Vorwürfe...</option></select>
        </div>
        
        <div class="field"><label>Beweise vorhanden?</label>
            <select id="mBeweise">
                <option value="Ja">Ja</option>
                <option value="Nein">Nein</option>
            </select>
        </div>
    </div>

    <label class="desc-label">Was ist passiert / Beschreibung:</label>
    <span class="desc-sub">(Wenn keine Eingabe im Dropdown zutrifft, hier eintragen)</span>
    <textarea id="mDesc" placeholder="Beschreibe den Vorfall so genau wie möglich..."></textarea>

    <div class="section-title">Melder & Zeugen</div>
    <div class="witness-grid">
        <div class="field"><label>Melder (Du)</label><input type="text" id="mMelder" readonly></div>
        <div class="witness-col">
            <div class="field"><label>Zeuge 1</label><select id="mZ1" class="user-drop"></select></div>
            <div class="field"><label>Zeuge 2</label><select id="mZ2" class="user-drop"></select></div>
        </div>
        <div class="witness-col">
            <div class="field"><label>Zeuge 3</label><select id="mZ3" class="user-drop"></select></div>
            <div class="field"><label>Zeuge 4</label><select id="mZ4" class="user-drop"></select></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-back" onclick="window.location.href='dashboard.html'">Abbrechen</button>
        <button class="btn btn-support" onclick="openSupport()">Buchhaltungs Support</button>
        <button class="btn btn-submit" onclick="sendMeldung()">Meldung absenden</button>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;

    async function setupForm() {
        document.getElementById('mMelder').value = localStorage.getItem('bulls_user') || "Unbekannt";

        try {
            const res = await fetch(API + "?action=getDropdownData");
            const data = await res.json();

            // Vorwürfe
            const vDrop = document.getElementById("mVerstoss");
            vDrop.innerHTML = "";
            data.vorwuerfe.forEach(v => vDrop.innerHTML += `<option value="${v}">${v}</option>`);

            // Maps
            const mDrop = document.getElementById("mMap");
            mDrop.innerHTML = "";
            data.maps.forEach(m => mDrop.innerHTML += `<option value="${m}">${m}</option>`);

            // Zeugen
            const zDrops = document.querySelectorAll(".user-drop");
            zDrops.forEach(drop => {
                drop.innerHTML = '<option value="">Kein Zeuge</option>';
                data.user.forEach(u => drop.innerHTML += `<option value="${u}">${u}</option>`);
            });

            // Allianzen (Dynamisch an die zwei festen anhängen falls vorhanden)
            const aDrop = document.getElementById("mAlli");
            if(data.allianzen_liste) { // Falls du eine Liste in der Tabelle hast
                data.allianzen_liste.forEach(a => aDrop.innerHTML += `<option value="${a}">${a}</option>`);
            }
        } catch (e) {
            console.error("Dropdown Fehler:", e);
        }
    }

    function openSupport() {
        // Leitet zum Messenger mit dem Support-Konto weiter
        localStorage.setItem('bulls_messenger_tab', 'PN');
        localStorage.setItem('bulls_messenger_partner', 'Support'); 
        window.location.href = 'messenger.html';
    }

    async function sendMeldung() {
        const id = document.getElementById('mID').value;
        const name = document.getElementById('mName').value;
        if(!id || !name) { alert("Bitte ID und Name angeben!"); return; }

        const data = {
            action: "addMeldung",
            target: id + " | " + name,
            alli: document.getElementById('mAlli').value,
            joinDate: document.getElementById('mJoin').value,
            punkte: document.getElementById('mPunkte').value,
            map: document.getElementById('mMap').value,
            verstoss: document.getElementById('mVerstoss').value,
            beweise: document.getElementById('mBeweise').value,
            beschreibung: document.getElementById('mDesc').value,
            melder: document.getElementById('mMelder').value,
            zeugen: [
                document.getElementById('mZ1').value,
                document.getElementById('mZ2').value,
                document.getElementById('mZ3').value,
                document.getElementById('mZ4').value
            ].filter(z => z !== "").join(",")
        };

        try {
            await fetch(API, { method: "POST", body: JSON.stringify(data) });
            alert("Meldung erfolgreich gesendet!");
            window.location.href = 'dashboard.html';
        } catch (e) { alert("Fehler: " + e); }
    }

    window.onload = setupForm;
</script>
</body>
</html>
