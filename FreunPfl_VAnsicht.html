<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - BLACKLIST VOLLANSICHT</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Almendra', serif; margin: 0; padding: 10px; }
        .container { width: 98%; margin: 0 auto; background-color: #0f0f0f; border: 1px solid #444; border-radius: 10px; padding: 20px; box-shadow: 0 0 20px rgba(57, 211, 83, 0.1); }
        
        h1 { color: #39d353; text-align: center; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* Filter Bereich */
        .filter-row { display: flex; gap: 15px; margin-bottom: 20px; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .filter-row input { background: #000; border: 1px solid #444; color: #39d353; padding: 8px; font-family: 'Almendra'; font-size: 16px; flex: 1; }

        /* Die große Tabelle */
        .table-wrapper { overflow-x: auto; border: 1px solid #333; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #222; color: #ff3131; padding: 12px; text-align: left; border-bottom: 2px solid #ff3131; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; white-space: nowrap; }
        tr:hover { background: rgba(57, 211, 83, 0.05); }

        .btn-back { display: inline-block; background: #444; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-bottom: 15px; }
        .btn-back:hover { background: #ff3131; }

        /* Scrollbar Design */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #39d353; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← Zurück zum Panzer</a>
    <h1>Blacklist Master-Übersicht</h1>
    
    <div class="filter-row">
        <input type="text" id="filterName" placeholder="Nach Name oder ID suchen..." onkeyup="filterTable()">
        <input type="text" id="filterAlli" placeholder="Nach Allianz suchen..." onkeyup="filterTable()">
        <input type="text" id="filterVerstoss" placeholder="Nach Verstoß suchen..." onkeyup="filterTable()">
    </div>

    <div class="table-wrapper">
        <table id="masterTable">
            <thead>
                <tr>
                    <th>Fall-Nr</th>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Allianz</th>
                    <th>Punkte</th>
                    <th>Map</th>
                    <th>Verstoß</th>
                    <th>Beweise</th>
                    <th>Melder</th>
                    <th>Datum</th>
                </tr>
            </thead>
            <tbody id="masterBody">
                <tr><td colspan="10" style="text-align:center; padding: 50px;">Lade die gesamte Blacklist...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    let fullData = [];

    async function loadAllData() {
        try {
            const res = await fetch(API + "?action=getBlacklistData");
            fullData = await res.json();
            renderTable(fullData);
        } catch(e) { 
            console.error("Fehler beim Laden"); 
            document.getElementById("masterBody").innerHTML = '<tr><td colspan="10" style="color:red; text-align:center;">Daten konnten nicht geladen werden.</td></tr>';
        }
    }

    function renderTable(data) {
        const body = document.getElementById("masterBody");
        body.innerHTML = "";

        data.forEach(item => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td style="color:#ff3131; font-weight:bold;">${item.fallNr || '-'}</td>
                <td>${item.playerID || '-'}</td>
                <td style="color:#39d353; font-weight:bold;">${item.playerName || '-'}</td>
                <td>${item.alli || '-'}</td>
                <td>${item.punkte || '0'}</td>
                <td>${item.map || '-'}</td>
                <td>${item.verstoss || '-'}</td>
                <td>${item.beweise || 'Ja'}</td>
                <td>${item.melder || '-'}</td>
                <td>${item.datum ? new Date(item.datum).toLocaleDateString('de-DE') : '-'}</td>
            `;
            body.appendChild(row);
        });
    }

    function filterTable() {
        const fName = document.getElementById("filterName").value.toLowerCase();
        const fAlli = document.getElementById("filterAlli").value.toLowerCase();
        const fVer = document.getElementById("filterVerstoss").value.toLowerCase();

        const filtered = fullData.filter(item => {
            const matchName = (item.playerName + item.playerID).toLowerCase().includes(fName);
            const matchAlli = (item.alli || "").toLowerCase().includes(fAlli);
            const matchVer = (item.verstoss || "").toLowerCase().includes(fVer);
            return matchName && matchAlli && matchVer;
        });

        renderTable(filtered);
    }

    window.onload = loadAllData;
</script>
</body>
</html>
