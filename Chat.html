<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DARK BULLS - ALLIANZ HQ CHAT</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Almendra', serif; margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden; }
        
        /* Layout-Aufteilung */
        .sidebar-l { width: 280px; background: #0f0f0f; border-right: 2px solid #ff3131; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .sidebar-r { width: 220px; background: #0f0f0f; border-left: 2px solid #ff3131; padding: 15px; box-sizing: border-box; }

        h2 { color: #ff3131; text-transform: uppercase; font-size: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-top: 15px; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Navigations-Elemente */
        .nav-item { padding: 10px; background: #111; border: 1px solid #333; border-radius: 5px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .nav-item:hover, .nav-item.active { border-color: #ff3131; background: rgba(255, 49, 49, 0.1); color: #ff3131; }
        .plus-btn { background: #ff3131; color: #000; border: none; font-size: 16px; font-weight: bold; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Chat-Verlauf */
        .chat-header { background: #0f0f0f; padding: 15px; border-bottom: 1px solid #222; font-size: 22px; color: #ff3131; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-footer { padding: 15px; background: #0f0f0f; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        
        input[type="text"] { flex: 1; background: #050505; border: 1px solid #444; color: #39d353; padding: 12px; font-family: 'Almendra'; font-size: 16px; border-radius: 5px; outline: none; }
        input:focus { border-color: #ff3131; }
        .send-btn { background: #ff3131; color: #000; border: none; padding: 12px 25px; font-family: 'Almendra'; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; text-transform: uppercase; }

        /* Nachrichten-Stile */
        .msg { font-size: 16px; line-height: 1.4; }
        .msg .time { color: #555; margin-right: 8px; font-size: 14px; }
        .msg .sender { font-weight: bold; margin-right: 5px; }
        .role-admin { color: #ff3131; } .role-offi { color: #ffd600; } .role-member { color: #39d353; }
        
        /* Online & Status Punkte */
        .user-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 16px; }
        .status-dot { width: 100%; height: 8px; width: 8px; background: #39d353; border-radius: 50%; box-shadow: 0 0 8px #39d353; }
        #typingDisplay { color: #888; font-style: italic; font-size: 14px; position: absolute; bottom: 65px; left: 20px; }

        /* Support Ampel-Karten */
        .support-card { padding: 12px; border-radius: 5px; margin-bottom: 10px; text-align: left; font-size: 15px; color: #000; font-weight: bold; }
        .sup-green { background: #39d353; box-shadow: 0 0 10px #39d353; }
        .sup-red { background: #ff3131; color: #fff; box-shadow: 0 0 10px #ff3131; }
        .sup-yellow { background: #ffd600; box-shadow: 0 0 10px #ffd600; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar-l">
        <h1 style="color:#ff3131; font-size:24px; text-align:center; margin-top:0; letter-spacing:2px;">HQ FUNK</h1>
        <button class="nav-item active" onclick="switchChannel('global', 'Globaler Allianz Funk')">📢 Globaler Allianz Funk</button>
        
        <h2>Privat (PN) <button class="plus-btn" onclick="openNewPNModal()">+</button></h2>
        <div id="pnNavList"></div>
        
        <h2>Gruppen <button class="plus-btn" id="addGroupBtn" onclick="openGroupModal()">+</button></h2>
        <div id="groupNavList"></div>

        <h2>Zentrale</h2>
        <button class="nav-item" onclick="switchChannel('support', 'Support Ticket Center')">📬 Support Center</button>
        <button class="nav-item" style="margin-top:auto; background:#222;" onclick="window.location.href='dashboard.html'"> Zurück zum HQ</button>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <span id="currentChannelTitle">Globaler Allianz Funk</span>
            <span id="dcLinkWrapper" style="font-size:14px;"></span>
        </div>
        
        <div class="chat-body" id="chatBox"></div>
        
        <div id="typingDisplay"></div>
        
        <div class="chat-footer" id="chatFooterArea">
            <input type="text" id="msgInput" placeholder="Sende verschlüsselten Funkspruch..." oninput="handleTyping()">
            <button class="send-btn" onclick="sendMessage()">Senden</button>
        </div>
    </div>

    <div class="sidebar-r">
        <h2 id="rightSidebarTitle">Online im HQ</h2>
        <div id="rightUserList"></div>
    </div>

<script>
    const API = window.BULLS_CONFIG.SCRIPT_URL;
    const MY_NAME = localStorage.getItem('bulls_user') || "Unbekannt";
    const MY_ROLE = localStorage.getItem('bulls_role') || "Gast";
    const MY_EXTRA = localStorage.getItem('bulls_extra') || "";

    let currentMode = 'global'; // global, pn, group, support
    let currentTarget = '';     // Partner-Name oder Gruppen-Name
    let chatDataCache = {};
    let typingTimeout;

    // Berechtigungen für Gruppenbau prüfen
    if (!["Admin"].includes(MY_ROLE) && !MY_EXTRA.includes("Moderator")) {
        document.getElementById("addGroupBtn").classList.add("hidden");
    }

    async function updateLoop() {
        try {
            const res = await fetch(API + "?action=getChatData&user=" + MY_NAME);
            chatDataCache = await res.json();
            
            renderNavigation();
            renderChatContent();
            renderRightSidebar();
        } catch(e) { console.log("Verbindungsfehler im Funkkreis."); }
    }

    function renderNavigation() {
        // PNs auflisten
        const pnList = document.getElementById("pnNavList");
        pnList.innerHTML = "";
        Object.keys(chatDataCache.pns || {}).forEach(partner => {
            var div = document.createElement("div");
            div.className = `nav-item ${currentMode==='pn'&&currentTarget===partner?'active':''}`;
            div.innerText = "👤 " + partner;
            div.onclick = () => switchChannel('pn', 'PN: ' + partner, partner);
            pnList.appendChild(div);
        });

        // Gruppen auflisten
        const gList = document.getElementById("groupNavList");
        gList.innerHTML = "";
        (chatDataCache.groups || []).forEach(g => {
            var div = document.createElement("div");
            div.className = `nav-item ${currentMode==='group'&&currentTarget===g.name?'active':''}`;
            div.innerText = "🪖 " + g.name;
            div.onclick = () => switchChannel('group', 'Gruppe: ' + g.name, g.name, g.dcLink);
            gList.appendChild(div);
        });
    }

    function renderChatContent() {
        const box = document.getElementById("chatBox");
        const footer = document.getElementById("chatFooterArea");
        footer.classList.remove("hidden");
        
        let html = "";

        if (currentMode === 'global') {
            (chatDataCache.globalChat || []).forEach(m => {
                html += `<div class="msg"><span class="time">[${m[0]}]</span><span class="sender role-${getRoleClass(m[2])}">${m[1]}:</span><span>${m[3]}</span></div>`;
            });
        } 
        else if (currentMode === 'pn') {
            const msgs = chatDataCache.pns[currentTarget] || [];
            msgs.forEach(m => {
                html += `<div class="msg"><span class="time">[${m[0]}]</span><span class="sender">${m[1]}:</span><span>${m[3]}</span></div>`;
            });
        } 
        else if (currentMode === 'group') {
            const g = chatDataCache.groups.find(x => x.name === currentTarget);
            if (g) {
                g.messages.forEach(m => {
                    html += `<div class="msg"><span class="time">[${m[0]}]</span><span class="sender role-${getRoleClass(m[2])}">${m[1]}:</span><span>${m[3]}</span></div>`;
                });
            }
        } 
        else if (currentMode === 'support') {
            footer.classList.add("hidden"); // Support ist Read-Only für Admins/Buchhalter
            (chatDataCache.support || []).forEach(m => {
                let colorClass = 'sup-green';
                if(m[1] === 'SUPPORT') colorClass = 'sup-red';
                if(m[1] === 'BUCHHALTER') colorClass = 'sup-yellow';
                
                // Rechte-Sperre für Support-Ansicht
                if (["Admin"].includes(MY_ROLE) || (m[1]==='BUCHHALTER' && MY_EXTRA.includes("Buchhalter"))) {
                    html += `<div class="support-card ${colorClass}">[${m[0]}] ${m[2]} (${m[1]}):<br>${m[3]}</div>`;
                }
            });
        }

        box.innerHTML = html;
        
        // "schreibt..." Anzeige auswerten
        const typingDiv = document.getElementById("typingDisplay");
        let typers = [];
        Object.keys(chatDataCache.typing || {}).forEach(t => {
            if(t !== MY_NAME) typers.push(t);
        });
        typingDiv.innerText = typers.length > 0 ? typers.join(", ") + " schreibt gerade..." : "";
    }

    function renderRightSidebar() {
        const title = document.getElementById("rightSidebarTitle");
        const container = document.getElementById("rightUserList");
        container.innerHTML = "";

        if (currentMode === 'group') {
            title.innerText = "In der Gruppe";
            const g = chatDataCache.groups.find(x => x.name === currentTarget);
            if (g) {
                g.members.forEach(m => {
                    container.innerHTML += `<div class="user-row"><span class="status-dot" style="background:#555; box-shadow:none;"></span> ${m}</div>`;
                });
            }
        } else {
            title.innerText = "Online im HQ";
            (chatDataCache.onlineUsers || []).forEach(u => {
                container.innerHTML += `<div class="user-row"><span class="status-dot"></span> ${u}</div>`;
            });
        }
    }

    function switchChannel(mode, title, target = '', dc = '') {
        currentMode = mode; currentTarget = target;
        document.getElementById("currentChannelTitle").innerText = title;
        document.getElementById("dcLinkWrapper").innerHTML = dc ? `<a href="${dc}" target="_blank" style="color:#00cfd1; text-decoration:none;">🔗 Discord Link</a>` : "";
        document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));
        renderChatContent(); renderRightSidebar();
    }

    async function sendMessage() {
        const text = document.getElementById("msgInput").value.trim();
        if(!text) return;
        
        let targetSheet = "Chat";
        if(currentMode === 'pn') {
            // PN Tabellenname sortieren: Immer PN_Name1_Name2 (alphabetisch)
            let sorted = [MY_NAME, currentTarget].sort();
            targetSheet = "PN_" + sorted[0] + "_" + sorted[1];
        } else if(currentMode === 'group') {
            targetSheet = "GROUP_" + currentTarget;
        }

        document.getElementById("msgInput").value = "";
        
        await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "sendChatMessage", targetSheet: targetSheet, sender: MY_NAME, role: MY_ROLE, text: text })
        });
        updateLoop();
    }

    function handleTyping() {
        fetch(API, { method: "POST", body: JSON.stringify({ action: "setTyping", user: MY_NAME, isTyping: true }) });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            fetch(API, { method: "POST", body: JSON.stringify({ action: "setTyping", user: MY_NAME, isTyping: false }) });
        }, 3000);
    }

    function openNewPNModal() {
        var p = prompt("Gib den exakten Namen des Empfängers ein:");
        if(p) switchChannel('pn', 'PN: ' + p, p);
    }

    async function openGroupModal() {
        var gName = prompt("Name der neuen Gruppe:");
        if(!gName) return;
        var members = prompt("Mitglieder mit Komma trennen (z.B. Julian,User2,User3):");
        if(!members) return;
        var dc = prompt("Discord Link eintragen (Optional):");
        
        var mList = members.split(",").map(x => x.trim());
        mList.push(MY_NAME); // Du selbst bist natürlich drin

        await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "createGroup", groupName: gName, members: mList, dcLink: dc })
        });
        alert("Gruppe beantragt und einsatzbereit!");
        updateLoop();
    }

    function getRoleClass(r) {
        if(r === "Admin") return "admin";
        if(["Offizier", "Offi"].includes(r)) return "offi";
        return "member";
    }

    window.onload = () => { setInterval(updateLoop, 4000); updateLoop(); };
</script>
</body>
</html>
